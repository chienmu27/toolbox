<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上考試系統</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        .hidden { display: none; }
        .option-btn { display: block; width: 100%; margin: 10px 0; padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; background: white; font-size: 16px; }
        .option-btn:hover { background: #e0e0e0; }
        .option-btn.selected { background: #6c5ce7; color: white; border-color: #6c5ce7; }
        button#submit-btn { background: #00b894; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        h2 { color: #2d3436; }
    </style>
</head>
<body>

<div class="container" id="login-box">
    <h2>學生登入</h2>
    <input type="text" id="pin" placeholder="輸入 PIN 碼" style="padding:10px; width:80%;">
    <br><br>
    <button onclick="login()" style="padding:10px 20px;">登入</button>
</div>

<div class="container hidden" id="setup-box">
    <h2 id="welcome-msg"></h2>
    <p>請輸入要考試的單元名稱：</p>
    <input type="text" id="unit-input" placeholder="例如：第一單元" style="padding:10px; width:80%;">
    <br><br>
    <button onclick="startExam()" style="padding:10px 20px;">開始考試</button>
</div>

<div class="container hidden" id="quiz-box">
    <div id="progress">題目載入中...</div>
    <h2 id="question-text">題目</h2>
    <div id="options-container"></div>
    <button id="next-btn" class="hidden" onclick="nextQuestion()" style="margin-top:20px;">下一題</button>
    <button id="submit-btn" class="hidden" onclick="submitExam()">提交試卷</button>
</div>

<div class="container hidden" id="result-box">
    <h2>考試完成！</h2>
    <p id="final-score"></p>
    <button onclick="location.reload()">返回</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzCZWT4-jxE0wlUWknG6gA4DSAGbUsuTY--cNSwu79wgD1JgZFid_9bXxolYOvfgqqZ-w/exec"; // 填入你的 GAS 部署 URL
    let userData = {};
    let questions = [];
    let currentIdx = 0;
    let userAnswers = [];

    async function login() {
        const pin = document.getElementById('pin').value;
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'login', pin: pin })
        });
        const data = await res.json();
        if (data.success) {
            userData = data;
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('setup-box').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `你好，${data.name} (${data.className})`;
        } else {
            alert('PIN 碼錯誤');
        }
    }

    async function startExam() {
        const unit = document.getElementById('unit-input').value;
        if(!unit) return alert('請輸入單元');
        userData.unit = unit;

        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getQuestions', className: userData.className, unit: unit })
        });
        questions = await res.json();
        
        if (questions.length === 0) {
            alert('查無此單元題目');
            return;
        }

        document.getElementById('setup-box').classList.add('hidden');
        document.getElementById('quiz-box').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `第 ${currentIdx + 1} 題 / 共 ${questions.length} 題`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(index + 1, btn);
            container.appendChild(btn);
        });
    }

    function selectOption(ans, btn) {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        userAnswers[currentIdx] = {
            question: questions[currentIdx].q,
            userAns: ans,
            correctAns: questions[currentIdx].ans
        };
        
        if (currentIdx < questions.length - 1) {
            document.getElementById('next-btn').classList.remove('hidden');
        } else {
            document.getElementById('submit-btn').classList.remove('hidden');
        }
    }

    function nextQuestion() {
        currentIdx++;
        document.getElementById('next-btn').classList.add('hidden');
        showQuestion();
    }

    async function submitExam() {
        document.getElementById('quiz-box').innerText = "提交中...";
        const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'submitExam',
                name: userData.name,
                className: userData.className,
                unit: userData.unit,
                answers: userAnswers
            })
        });
        const result = await res.json();
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        document.getElementById('final-score').innerText = `您的得分：${result.score}`;
    }
</script>
</body>
</html>
