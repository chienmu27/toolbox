<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上考試工具整合系統</title>
    
    <!-- 引入外部資源 -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { 
            --primary-color: #46178f; 
            --bg-color: #f2f2f5;
            --exam-primary: #6c5ce7;
            --exam-success: #00b894;
            --exam-download: #0984e3;
            --exam-upload: #e17055;
            --exam-danger: #d63031;
        }

        body { 
            font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 95%; 
            max-width: 800px; 
            position: relative; 
            min-height: 550px;
        }

        /* 導覽頁籤按鈕置中樣式 */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        .tab-btn {
            padding: 10px 25px;
            background: #ddd;
            border-radius: 20px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* 共用元件樣式 */
        .hidden { display: none !important; }
        .main-btn { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .exam-input, .exam-select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .exam-button { color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--exam-primary); }
        .btn-upload { background: var(--exam-upload); }
        .btn-download { background: var(--exam-download); }
        .btn-danger { background: var(--exam-danger); }
        .option-btn { background: white; color: #333; border: 2px solid #eee; text-align: left; margin: 8px 0; width: 100%; padding: 15px; border-radius: 8px; }
        .option-btn.selected { background: var(--exam-primary); color: white; border-color: var(--exam-primary); }
        
        .sys-title { font-size: 1.25rem; font-weight: bold; color: var(--primary-color); border-left: 4px solid var(--primary-color); padding-left: 12px; }
        .file-upload-area { border: 2px dashed #bbb; padding: 15px; background: #fafafa; border-radius: 6px; text-align: center; }

        /* 驗證遮罩層 */
        #authOverlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; border-radius: 12px; z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; 
        }

        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        #qr-modal img { width: 90%; max-width: 500px; border: 15px solid white; border-radius: 10px; }
    </style>
</head>
<body>

<!-- 置中分頁按鈕 (僅管理端顯示) -->
<div id="adminTabs" class="tab-nav hidden">
    <button id="btn-tab-exam" class="tab-btn active" onclick="switchTab('exam')">線上考試系統</button>
    <button id="btn-tab-gen" class="tab-btn" onclick="switchTab('gen')">線上 AI 出題</button>
</div>

<div class="container">
    <!-- 管理員驗證遮罩 -->
    <div id="authOverlay">
        <h2 id="authMsg" class="text-xl font-bold mb-4">管理員請先登入 Google 帳號</h2>
        <button id="authLoginBtn" class="main-btn max-w-[250px]">登入 Google</button>
        <div id="applyForm" class="hidden w-full max-w-sm mt-4">
            <p class="mb-4">您的帳號尚未獲得管理授權：</p>
            <input type="email" id="applyEmail" class="exam-input" placeholder="Google 信箱">
            <input type="text" id="applyName" class="exam-input" placeholder="姓名">
            <button id="applyBtn" class="main-btn mt-2">送出授權申請</button>
        </div>
    </div>

    <!-- 主內容區 -->
    <div id="mainContent" class="hidden">
        <div class="flex justify-between items-center mb-4 border-b pb-3">
            <div id="display-title" class="sys-title">線上考試系統</div>
            <button id="logoutBtn" class="text-red-500 border border-red-500 px-3 py-1 rounded text-sm">登出管理員</button>
        </div>

        <!-- 1. 線上考試系統分頁 -->
        <div id="tab-exam-content">
            <div id="view-admin" class="hidden">
                <h2 class="text-xl font-bold mb-4 text-center">後台管理</h2>
                <div class="border-b border-dashed mb-4 pb-4">
                    <label class="text-sm text-gray-500">上傳新題目 (Excel):</label>
                    <input type="file" id="upload-file" accept=".xlsx, .xls" class="exam-input">
                    <button class="exam-button btn-upload" onclick="handleUpload()">上傳題目資料</button>
                </div>
                <div>
                    <select id="select-class" onchange="updateUnitDropdown()" class="exam-select"><option>載入中...</option></select>
                    <select id="select-unit" class="exam-select"><option>請先選擇班級</option></select>
                    <div class="grid grid-cols-1 gap-2 mt-2">
                        <button class="exam-button btn-primary" onclick="generateQRCode()">生成考試 QR-Code</button>
                        <button class="exam-button btn-download" onclick="downloadResults()">下載成績資料 (Excel)</button>
                        <button class="exam-button btn-danger" onclick="confirmDelete()">刪除該單元題目資料</button>
                    </div>
                </div>
                <div id="qr-container" class="hidden text-center mt-5">
                    <img id="qr-image" class="mx-auto cursor-zoom-in w-44 border-8 border-white shadow-md" src="" onclick="toggleQRModal(true)">
                    <p class="text-xs text-gray-400 mt-2">點擊圖片可放大掃描</p>
                </div>
            </div>

            <!-- 學生登入區 -->
            <div id="view-student-login" class="hidden">
                <h2 id="exam-title" class="text-2xl font-bold mb-6 text-center whitespace-pre-line">載入考試資訊...</h2>
                <div class="bg-gray-50 p-6 rounded-xl">
                    <label class="block text-gray-600 mb-2">請輸入您的 PIN 碼：</label>
                    <input type="text" id="pin-input" class="exam-input text-center text-xl" inputmode="numeric">
                    <button class="exam-button btn-primary mt-4 py-4" onclick="studentLogin()">進入測驗</button>
                </div>
            </div>

            <!-- 測驗進行區 -->
            <div id="view-quiz" class="hidden">
                <div class="text-right text-sm text-gray-500" id="quiz-progress"></div>
                <div id="question-text" class="text-xl my-5 leading-relaxed"></div>
                <div id="options-box"></div>
                <button id="btn-next" class="exam-button btn-primary hidden py-4" onclick="nextQuestion()">下一題</button>
                <button id="btn-submit" class="exam-button hidden py-4" onclick="submitExam()" style="background: var(--exam-success);">提交試卷</button>
            </div>

            <!-- 結果區 -->
            <div id="view-result" class="hidden text-center">
                <h2 class="text-2xl font-bold text-green-600">測驗已提交</h2>
                <div id="result-stat" class="text-4xl font-black my-8"></div>
                <button class="exam-button btn-primary" onclick="location.reload()">返回</button>
            </div>
        </div>

        <!-- 2. 線上出題系統分頁 -->
        <div id="tab-gen-content" class="hidden">
            <h1 class="text-2xl font-bold text-center mb-6">AI 自動出題系統</h1>
            <div class="flex gap-2">
                <div class="flex-1"><label class="font-bold">班級</label><input type="text" id="gen-className" class="exam-input" placeholder="例如：五年三班"></div>
                <div class="flex-1"><label class="font-bold">單元</label><input type="text" id="gen-unitName" class="exam-input" placeholder="例如：第一單元"></div>
            </div>
            <div class="mt-3"><label class="font-bold">1. 題目主題</label><input type="text" id="gen-topic" class="exam-input" placeholder="主題內容..."></div>
            <div class="mt-3"><label class="font-bold">2. 提示語 (選填)</label><textarea id="gen-hint" class="exam-input" rows="2"></textarea></div>
            <div class="mt-3">
                <label class="font-bold">3. 上傳檔案 (選填)</label>
                <div class="file-upload-area"><input type="file" id="gen-refFile" accept=".txt,.csv,.xlsx,.xls,.docx,.doc,image/*"></div>
            </div>
            <div class="mt-3 w-32"><label class="font-bold">4. 題數</label><input type="number" id="gen-count" class="exam-input" value="5"></div>
            <button id="generateBtn" class="main-btn mt-5" onclick="aiGenerateQuestions()">開始 AI 生成題目</button>
            <button id="reDownloadBtn" class="exam-button mt-2 hidden" style="background:#108548" onclick="reDownloadExcel()">再次下載 Excel</button>
            <div id="gen-status" class="mt-4 text-center font-bold text-gray-500">系統就緒</div>
        </div>

        <div class="mt-10 pt-5 border-t text-center text-xs text-gray-400">
            線上考試整合系統 © 2026 chienmu.tai
        </div>
    </div>
</div>

<!-- QR Code 放大 -->
<div id="qr-modal" onclick="toggleQRModal(false)"><img id="qr-image-large" src=""></div>

<!-- Loading -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[2000]">
    <div class="bg-white p-5 rounded-lg text-center shadow-lg">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent mx-auto mb-3"></div>
        <p id="loading-text">處理中...</p>
    </div>
</div>

<script>
    const GAS_AUTH_URL = "https://script.google.com/macros/s/AKfycbwHobXSaxivNtdaPynrxehum0cRalWhZrTBQYNO4s0pID4Gb21IE3n5o14S2MHL2L8Eyg/exec";
    const GAS_EXAM_URL = "https://script.google.com/macros/s/AKfycbzCZWT4-jxE0wlUWknG6gA4DSAGbUsuTY--cNSwu79wgD1JgZFid_9bXxolYOvfgqqZ-w/exec";
    const BASE_URL = window.location.href.split('?')[0];

    let userUUID = "";
    let configData = {}; 
    let currentExam = { class: "", unit: "" };
    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let studentInfo = {};
    let lastGenData = null;

    // --- 初始化與驗證 ---
    async function init() {
        const params = new URLSearchParams(window.location.search);
        const c = params.get('c');
        const u = params.get('u');

        if (c && u) {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('adminTabs').classList.add('hidden');
            currentExam = { class: decodeURIComponent(c), unit: decodeURIComponent(u) };
            showExamView('view-student-login');
            document.getElementById('exam-title').innerText = `${currentExam.class}\n${currentExam.unit}`;
        } else {
            checkAuth();
        }
    }

    async function checkAuth() {
        if (!puter.auth.isSignedIn()) return;
        const user = await puter.auth.getUser();
        userUUID = user.uuid;
        document.getElementById('authMsg').innerText = "驗證授權中...";
        try {
            const resp = await fetch(GAS_AUTH_URL, { method: "POST", body: JSON.stringify({ action: "checkStatus", uuid: userUUID }) });
            const result = await resp.json();
            if (result.status === "Approved") {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('adminTabs').classList.remove('hidden');
                fetchConfig();
            } else if (result.status === "Pending") {
                document.getElementById('authMsg').innerText = "申請審核中...";
            } else {
                document.getElementById('applyForm').classList.remove('hidden');
            }
        } catch (e) { alert("連線錯誤"); }
    }

    // --- 分頁切換 ---
    function switchTab(tab) {
        document.getElementById('btn-tab-exam').className = (tab === 'exam' ? 'tab-btn active' : 'tab-btn');
        document.getElementById('btn-tab-gen').className = (tab === 'gen' ? 'tab-btn active' : 'tab-btn');
        document.getElementById('tab-exam-content').classList.toggle('hidden', tab !== 'exam');
        document.getElementById('tab-gen-content').classList.toggle('hidden', tab !== 'gen');
        document.getElementById('display-title').innerText = (tab === 'exam' ? '線上考試系統' : '線上出題工具');
    }

    // --- 考試系統邏輯 ---
    async function fetchConfig() {
        showLoading("載入配置...");
        try {
            const res = await fetch(`${GAS_EXAM_URL}?action=getConfig`);
            configData = await res.json();
            const clsSelect = document.getElementById('select-class');
            clsSelect.innerHTML = '<option value="">選擇班級</option>';
            configData.classes.forEach(c => clsSelect.innerHTML += `<option value="${c}">${c}</option>`);
            showExamView('view-admin');
        } catch (e) { console.error(e); }
        hideLoading();
    }

    function updateUnitDropdown() {
        const cls = document.getElementById('select-class').value;
        const untSelect = document.getElementById('select-unit');
        untSelect.innerHTML = '<option value="">選擇單元</option>';
        if (configData.units[cls]) {
            configData.units[cls].forEach(u => untSelect.innerHTML += `<option value="${u}">${u}</option>`);
        }
    }

    async function handleUpload() {
        const file = document.getElementById('upload-file').files[0];
        if (!file) return alert("請選檔案");
        const reader = new FileReader();
        showLoading("正在上傳...");
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "uploadQuestions", rows: rows.slice(1) }) });
            alert("上傳成功");
            fetchConfig();
        };
        reader.readAsArrayBuffer(file);
    }

    function generateQRCode() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請先選擇");
        const url = `${BASE_URL}?c=${encodeURIComponent(c)}&u=${encodeURIComponent(u)}&openExternalBrowser=1`;
        const qr = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
        document.getElementById('qr-image').src = qr;
        document.getElementById('qr-image-large').src = qr;
        document.getElementById('qr-container').classList.remove('hidden');
    }

    async function downloadResults() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        const res = await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "getResults", className: c, unit: u }) });
        const data = await res.json();
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "成績");
        XLSX.writeFile(wb, `${c}_${u}_成績.xlsx`);
    }

    async function confirmDelete() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (confirm("確定刪除？")) {
            await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "deleteQuestions", className: c, unit: u }) });
            fetchConfig();
        }
    }

    // --- 學生測驗 ---
    async function studentLogin() {
        const pin = document.getElementById('pin-input').value;
        showLoading("驗證中...");
        const res = await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "login", pin, targetClass: currentExam.class }) });
        const data = await res.json();
        hideLoading();
        if (data.success) { studentInfo = data; startQuiz(); } else alert(data.message);
    }

    async function startQuiz() {
        showExamView('view-quiz');
        showLoading("下載題目...");
        const res = await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "getQuestions", className: currentExam.class, unit: currentExam.unit }) });
        quizData = await res.json();
        hideLoading();
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('quiz-progress').innerText = `${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.question;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-submit').classList.add('hidden');
        q.options.forEach((t, i) => {
            if (!t) return;
            const b = document.createElement('button');
            b.className = 'option-btn font-medium';
            b.innerText = t;
            b.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                userAnswers[currentIdx] = { question: q.question, userAns: i+1, correctAns: q.correct };
                if (currentIdx < quizData.length - 1) document.getElementById('btn-next').classList.remove('hidden');
                else document.getElementById('btn-submit').classList.remove('hidden');
            };
            box.appendChild(b);
        });
    }

    function nextQuestion() { currentIdx++; renderQuestion(); }

    async function submitExam() {
        showLoading("提交中...");
        const res = await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ 
            action: "submitExam", 
            seatNumber: studentInfo.seatNumber,
            name: studentInfo.name, 
            className: studentInfo.className, 
            unit: currentExam.unit, 
            answers: userAnswers 
        })});
        const result = await res.json();
        hideLoading();
        showExamView('view-result');
        document.getElementById('result-stat').innerText = `得分：${result.score}`;
    }

    // --- AI 出題 ---
    async function aiGenerateQuestions() {
        const topic = document.getElementById('gen-topic').value;
        const count = document.getElementById('gen-count').value;
        if (!topic) return alert("請輸入主題");
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('gen-status').innerText = "AI 生成中...";
        
        try {
            let prompt = `請幫我出 ${count} 題關於「${topic}」的選擇題，每題4個選項。格式 JSON 陣列: [{q, a1, a2, a3, a4, ans(1-4)}]`;
            const resp = await puter.ai.chat(prompt);
            const questions = JSON.parse(resp.toString().replace(/```json/g, '').replace(/```/g, '').trim());
            lastGenData = questions;
            reDownloadExcel();
            document.getElementById('gen-status').innerText = "生成完成！";
            document.getElementById('reDownloadBtn').classList.remove('hidden');
        } catch (e) { alert("生成失敗"); }
        document.getElementById('generateBtn').disabled = false;
    }

    function reDownloadExcel() {
        const c = document.getElementById('gen-className').value || "未設定";
        const u = document.getElementById('gen-unitName').value || "未設定";
        const header = [["班級", "單元", "題目", "選項1", "選項2", "選項3", "選項4", "正確答案"]];
        const rows = lastGenData.map(q => [c, u, q.q, q.a1, q.a2, q.a3, q.a4, q.ans]);
        const ws = XLSX.utils.aoa_to_sheet(header.concat(rows));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "題庫");
        XLSX.writeFile(wb, `AI題庫_${c}_${u}.xlsx`);
    }

    // --- 工具 ---
    function showExamView(id) {
        ['view-admin','view-student-login','view-quiz','view-result'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function showLoading(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading-overlay').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
    function toggleQRModal(s) { document.getElementById('qr-modal').style.display = (s?'flex':'none'); }

    document.getElementById('authLoginBtn').onclick = async () => { await puter.auth.signIn(); checkAuth(); };
    document.getElementById('logoutBtn').onclick = () => { puter.auth.signOut(); location.reload(); };
    document.getElementById('applyBtn').onclick = async () => {
        const email = document.getElementById('applyEmail').value;
        const name = document.getElementById('applyName').value;
        await fetch(GAS_AUTH_URL, { method: "POST", body: JSON.stringify({ action: "apply", uuid: userUUID, email, name }) });
        alert("申請已送出");
    };

    init();
</script>
</body>
</html>
