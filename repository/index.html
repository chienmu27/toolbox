<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上考試管理工具箱</title>
    
    <!-- 引入外部資源 -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { 
            --primary-color: #46178f; 
            --bg-color: #f2f2f5;
            --exam-primary: #6c5ce7;
            --exam-success: #00b894;
            --exam-download: #0984e3;
            --exam-upload: #e17055;
            --exam-danger: #d63031;
        }

        body { 
            font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頁籤樣式 */
        .tab-container {
            display: flex;
            width: 95%;
            max-width: 800px;
            margin-bottom: 0;
            z-index: 10;
        }
        .tab-button {
            padding: 12px 24px;
            background: #e2e2e7;
            border: none;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            margin-right: 4px;
            transition: 0.3s;
        }
        .tab-button.active {
            background: white;
            color: var(--primary-color);
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 0 12px 12px 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 95%; 
            max-width: 800px; 
            position: relative; 
            min-height: 550px;
        }

        @media (max-width: 768px) { 
            .container { width: 100%; border-radius: 0; padding: 1.25rem; }
            .tab-button { padding: 10px 15px; font-size: 0.9rem; }
        }

        /* 共用樣式 */
        .hidden { display: none !important; }
        .exam-input, .exam-select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .exam-button { color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--exam-primary); }
        .btn-upload { background: var(--exam-upload); }
        .btn-download { background: var(--exam-download); }
        .btn-danger { background: var(--exam-danger); }
        .main-btn { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        
        /* 驗證遮罩層 */
        #authOverlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; border-radius: 12px; z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; 
        }

        .sys-title { font-size: 1.25rem; font-weight: bold; color: var(--primary-color); border-left: 4px solid var(--primary-color); padding-left: 12px; }
        .logout-btn { background-color: #fff; color: #d9534f; border: 1px solid #d9534f; padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; cursor: pointer; }

        .option-btn { background: white; color: #333; border: 2px solid #eee; text-align: left; margin: 8px 0; width: 100%; padding: 15px; border-radius: 8px; }
        .option-btn.selected { background: var(--exam-primary); color: white; border-color: var(--exam-primary); }
        
        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        #qr-modal img { width: 90%; max-width: 500px; border: 15px solid white; border-radius: 10px; }

        .file-upload-area { border: 2px dashed #bbb; padding: 15px; background: #fafafa; border-radius: 6px; text-align: center; }
    </style>
</head>
<body>

<!-- 分頁按鈕區 -->
<div id="tabs" class="tab-container hidden">
    <button id="tab1-btn" class="tab-button active" onclick="switchTab(1)">線上考試系統</button>
    <button id="tab2-btn" class="tab-button" onclick="switchTab(2)">線上出題工具</button>
</div>

<div class="container">
    <!-- 管理員驗證遮罩 -->
    <div id="authOverlay" class="hidden">
        <h2 id="authMsg" class="text-xl font-bold mb-4">請先登入 Google 帳號</h2>
        <button id="authLoginBtn" class="main-btn max-w-xs">登入 Google</button>
        <div id="applyForm" class="hidden w-full max-w-sm mt-4">
            <p class="mb-4">您的帳號尚未獲得管理授權：</p>
            <input type="email" id="applyEmail" class="exam-input" placeholder="Google 信箱">
            <input type="text" id="applyName" class="exam-input" placeholder="姓名">
            <button id="applyBtn" class="main-btn mt-2">送出授權申請</button>
        </div>
    </div>

    <!-- 主內容區 -->
    <div id="mainContent" class="hidden">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div id="current-title" class="sys-title">線上考試系統</div>
            <button id="logoutBtn" class="logout-btn">登出管理員</button>
        </div>

        <!-- 1. 線上考試系統分頁 -->
        <div id="tab1-content">
            <div id="examView">
                <!-- 管理者設定區 -->
                <div id="view-admin" class="hidden">
                    <h2 class="text-lg font-bold mb-4 text-center text-gray-700">後台管理控制台</h2>
                    <div class="border-b-2 border-dashed border-gray-100 pb-6 mb-6">
                        <label class="text-sm text-gray-500 font-bold">上傳題目資料庫 (Excel):</label>
                        <input type="file" id="upload-file" accept=".xlsx, .xls" class="exam-input">
                        <button class="exam-button btn-upload" onclick="handleUpload()">更新題目資料</button>
                    </div>
                    <div>
                        <select id="select-class" onchange="updateUnitDropdown()" class="exam-select"><option>載入班級中...</option></select>
                        <select id="select-unit" class="exam-select"><option>請先選擇班級</option></select>
                        
                        <div class="grid grid-cols-1 gap-2 mt-4">
                            <button class="exam-button btn-primary" onclick="generateQRCode()">生成考試 QR-Code</button>
                            <button class="exam-button btn-download" onclick="downloadResults()">下載成績資料 (Excel)</button>
                            <button class="exam-button btn-danger" onclick="confirmDelete()">刪除該單元題目</button>
                        </div>
                    </div>
                    <div id="qr-container" class="hidden text-center mt-6">
                        <img id="qr-image" class="mx-auto border-8 border-white shadow-md cursor-zoom-in" width="180" src="" alt="QR Code" onclick="toggleQRModal(true)">
                        <p class="text-xs text-gray-400 mt-2">點擊圖片可放大</p>
                    </div>
                </div>

                <!-- 學生登入區 -->
                <div id="view-student-login" class="hidden">
                    <h2 id="exam-title" class="text-2xl font-bold mb-6 text-center text-gray-800 whitespace-pre-line">載入中...</h2>
                    <div class="bg-gray-50 p-6 rounded-xl">
                        <label class="block text-gray-600 mb-2 font-medium text-center">請輸入您的 PIN 碼</label>
                        <input type="text" id="pin-input" placeholder="例如：1234" inputmode="numeric" class="exam-input text-center text-xl tracking-widest">
                        <button class="exam-button btn-primary mt-4 py-4 text-lg" onclick="studentLogin()">進入測驗</button>
                    </div>
                </div>

                <!-- 測驗進行區 -->
                <div id="view-quiz" class="hidden">
                    <div class="flex justify-between text-sm text-gray-500 mb-2">
                        <span id="student-display"></span>
                        <span id="quiz-progress"></span>
                    </div>
                    <div id="question-text" class="text-xl font-bold my-6 leading-relaxed"></div>
                    <div id="options-box"></div>
                    <button id="btn-next" class="exam-button btn-primary hidden py-4 mt-4" onclick="nextQuestion()">下一題</button>
                    <button id="btn-submit" class="exam-button hidden py-4 mt-4" onclick="submitExam()" style="background: var(--exam-success);">提交試卷</button>
                </div>

                <!-- 結果區 -->
                <div id="view-result" class="hidden text-center">
                    <div class="mb-6"><svg class="w-16 h-16 text-green-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                    <h2 class="text-2xl font-bold text-green-600">測驗已提交成功</h2>
                    <div id="result-stat" class="text-4xl font-black my-8 text-gray-800"></div>
                    <button class="exam-button btn-primary" onclick="location.reload()">返回首頁</button>
                </div>
            </div>
        </div>

        <!-- 2. 線上出題工具分頁 -->
        <div id="tab2-content" class="hidden">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">AI 自動出題系統</h1>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="font-bold">班級</label><input type="text" id="gen-className" class="exam-input" placeholder="五年三班" /></div>
                <div><label class="font-bold">單元</label><input type="text" id="gen-unitName" class="exam-input" placeholder="第一單元" /></div>
            </div>
            <div class="mb-4"><label class="font-bold">1. 題目主題</label><input type="text" id="gen-topic" class="exam-input" placeholder="例如：生活科技、地理知識..." /></div>
            <div class="mb-4"><label class="font-bold">2. 出題提示 (選填)</label><textarea id="gen-hint" class="exam-input" rows="2" placeholder="例如：難度適中..."></textarea></div>
            <div class="mb-4"><label class="font-bold">3. 參考檔案 (選填)</label>
                <div class="file-upload-area"><input type="file" id="gen-refFile" accept=".txt, .csv, .xlsx, .xls, .docx, .doc, image/*" /><p class="text-xs text-gray-500 mt-1">支援文字、Word、Excel、圖片</p></div>
            </div>
            <div class="mb-6"><label class="font-bold">4. 題數</label><input type="number" id="gen-count" class="exam-input max-w-[100px]" value="5" min="1" max="20" /></div>
            <button id="generateBtn" class="main-btn">開始 AI 生成題目</button>
            <button id="reDownloadBtn" class="exam-button mt-4 hidden" style="background:#108548">再次下載 Excel</button>
            <div id="gen-status" class="mt-4 text-center text-sm font-bold text-gray-500">系統就緒</div>
        </div>

        <div class="mt-12 pt-6 border-t border-gray-100 text-center text-xs text-gray-400">
            線上考試工具箱 © 2026 chienmu.tai<br>
            Powered by Puter.js & Google Gemini
        </div>
    </div>
</div>

<!-- QR 放大視窗 -->
<div id="qr-modal" onclick="toggleQRModal(false)">
    <img id="qr-image-large" src="" alt="Large QR">
    <p class="text-white mt-4 font-bold">點擊任意處關閉</p>
</div>

<!-- Loading -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[5000]">
    <div class="bg-white p-8 rounded-2xl text-center shadow-2xl">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent mx-auto mb-4"></div>
        <p id="loading-text" class="text-gray-800 font-bold">處理中...</p>
    </div>
</div>

<script>
    // --- 常數設定 ---
    const GAS_AUTH_URL = "https://script.google.com/macros/s/AKfycbwHobXSaxivNtdaPynrxehum0cRalWhZrTBQYNO4s0pID4Gb21IE3n5o14S2MHL2L8Eyg/exec";
    const GAS_EXAM_URL = "https://script.google.com/macros/s/AKfycbzCZWT4-jxE0wlUWknG6gA4DSAGbUsuTY--cNSwu79wgD1JgZFid_9bXxolYOvfgqqZ-w/exec";
    const BASE_URL = window.location.origin + window.location.pathname;

    let userUUID = "";
    let configData = {}; 
    let currentExam = { class: "", unit: "" };
    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let studentInfo = {}; // 將包含：name, seatNumber, className
    let lastGeneratedQuestions = null;

    /** 1. 初始化與登入驗證 **/
    async function initSystem() {
        const params = new URLSearchParams(window.location.search);
        const c = params.get('c');
        const u = params.get('u');

        if (c && u) {
            // 學生掃碼模式
            document.getElementById('tabs').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            currentExam = { class: decodeURIComponent(c), unit: decodeURIComponent(u) };
            showExamSubView('view-student-login');
            document.getElementById('exam-title').innerText = `${currentExam.class}\n${currentExam.unit}`;
        } else {
            // 管理員模式
            document.getElementById('authOverlay').classList.remove('hidden');
            checkAdminAuth();
        }
    }

    async function checkAdminAuth() {
        if (!puter.auth.isSignedIn()) {
            document.getElementById('authLoginBtn').classList.remove('hidden');
            return;
        }
        const user = await puter.auth.getUser();
        userUUID = user.uuid;
        document.getElementById('authMsg').innerText = "驗證授權中...";
        try {
            const resp = await fetch(GAS_AUTH_URL, { method: "POST", body: JSON.stringify({ action: "checkStatus", uuid: userUUID }) });
            const result = await resp.json();
            if (result.status === "Approved") {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('tabs').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                fetchConfig();
            } else if (result.status === "Pending") {
                document.getElementById('authMsg').innerText = "申請審核中，請稍候。";
                document.getElementById('authLoginBtn').classList.add('hidden');
            } else {
                document.getElementById('authMsg').innerText = "未獲授權";
                document.getElementById('authLoginBtn').classList.add('hidden');
                document.getElementById('applyForm').classList.remove('hidden');
            }
        } catch (e) { alert("網路連線錯誤"); }
    }

    /** 2. 分頁切換 **/
    function switchTab(tabNum) {
        document.getElementById('tab1-content').classList.toggle('hidden', tabNum !== 1);
        document.getElementById('tab2-content').classList.toggle('hidden', tabNum !== 2);
        document.getElementById('tab1-btn').classList.toggle('active', tabNum === 1);
        document.getElementById('tab2-btn').classList.toggle('active', tabNum === 2);
        document.getElementById('current-title').innerText = tabNum === 1 ? "線上考試系統" : "線上出題工具";
    }

    /** 3. 線上考試系統 - 後台邏輯 **/
    async function fetchConfig() {
        showLoading("獲取雲端資料...");
        try {
            const res = await fetch(`${GAS_EXAM_URL}?action=getConfig`);
            configData = await res.json();
            const clsSelect = document.getElementById('select-class');
            clsSelect.innerHTML = '<option value="">選擇班級</option>';
            configData.classes.forEach(c => clsSelect.innerHTML += `<option value="${c}">${c}</option>`);
            document.getElementById('select-unit').innerHTML = '<option value="">請先選擇班級</option>';
            showExamSubView('view-admin');
        } catch (e) { console.error(e); }
        hideLoading();
    }

    function updateUnitDropdown() {
        const cls = document.getElementById('select-class').value;
        const untSelect = document.getElementById('select-unit');
        untSelect.innerHTML = '<option value="">選擇單元</option>';
        if (configData.units[cls]) {
            configData.units[cls].forEach(u => untSelect.innerHTML += `<option value="${u}">${u}</option>`);
        }
        document.getElementById('qr-container').classList.add('hidden');
    }

    async function handleUpload() {
        const fileInput = document.getElementById('upload-file');
        if (fileInput.files.length === 0) return alert("請選擇 Excel 檔案");
        const reader = new FileReader();
        showLoading("上傳題目並自動排序中...");
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            const dataRows = rows.slice(1).filter(r => r.length > 0);
            const res = await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "uploadQuestions", rows: dataRows }) });
            const result = await res.json();
            alert(result.message);
            fileInput.value = "";
            fetchConfig();
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function generateQRCode() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇班級與單元");
        // 保留原功能：預設瀏覽器開啟參數
        const examUrl = `${BASE_URL}?c=${encodeURIComponent(c)}&u=${encodeURIComponent(u)}&openExternalBrowser=1`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(examUrl)}`;
        document.getElementById('qr-image').src = qrUrl;
        document.getElementById('qr-image-large').src = qrUrl;
        document.getElementById('qr-container').classList.remove('hidden');
    }

    async function downloadResults() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇班級與單元");
        showLoading("生成成績單...");
        try {
            const res = await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "getResults", className: c, unit: u }) });
            const data = await res.json();
            // 這裡 data 的 B 欄標題在後端已經被改為「座號」
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "成績單");
            XLSX.writeFile(wb, `${c}_${u}_成績報表.xlsx`);
        } catch (e) { alert("下載失敗"); }
        hideLoading();
    }

    async function confirmDelete() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇單元");
        if (confirm(`確定要刪除「${c} - ${u}」的所有題目嗎？`)) {
            showLoading("刪除中...");
            await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "deleteQuestions", className: c, unit: u }) });
            fetchConfig();
            hideLoading();
        }
    }

    /** 4. 線上考試系統 - 學生端 **/
    async function studentLogin() {
        const pin = document.getElementById('pin-input').value.trim();
        if (!pin) return alert("請輸入 PIN 碼");
        showLoading("驗證身份...");
        const res = await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "login", pin: pin, targetClass: currentExam.class }) });
        const data = await res.json();
        hideLoading();
        if (data.success) { 
            studentInfo = data; // 這裡預期包含 seatNumber, name, className
            startQuiz(); 
        } else {
            alert(data.message);
        }
    }

    async function startQuiz() {
        showExamSubView('view-quiz');
        showLoading("下載題庫...");
        const res = await fetch(GAS_EXAM_URL, { method: "POST", body: JSON.stringify({ action: "getQuestions", className: currentExam.class, unit: currentExam.unit }) });
        quizData = await res.json();
        hideLoading();
        document.getElementById('student-display').innerText = `${studentInfo.seatNumber}號 ${studentInfo.name}`;
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('quiz-progress').innerText = `${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.question;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-submit').classList.add('hidden');
        q.options.forEach((text, i) => {
            if(!text) return;
            const btn = document.createElement('button');
            btn.className = 'option-btn font-medium';
            btn.innerText = text;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                // 紀錄答案
                userAnswers[currentIdx] = { 
                    question: q.question, 
                    userAns: i+1, 
                    correctAns: q.correct 
                };
                if (currentIdx < quizData.length - 1) document.getElementById('btn-next').classList.remove('hidden');
                else document.getElementById('btn-submit').classList.remove('hidden');
            };
            box.appendChild(btn);
        });
    }

    function nextQuestion() { currentIdx++; renderQuestion(); }

    async function submitExam() {
        showLoading("正在提交試卷...");
        // 配合後端新欄位：傳送包含 className, name, seatNumber 的資料
        const res = await fetch(GAS_EXAM_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "submitExam", 
                name: studentInfo.name, 
                seatNumber: studentInfo.seatNumber, // 傳送座號
                className: studentInfo.className,   // 傳送班級（寫入 data 工作表 C 欄）
                unit: currentExam.unit, 
                answers: userAnswers 
            })
        });
        const result = await res.json();
        hideLoading();
        showExamSubView('view-result');
        document.getElementById('result-stat').innerText = `最終得分：${result.score}`;
    }

    /** 5. AI 出題系統邏輯 **/
    async function parseFile(file) {
        const name = file.name.toLowerCase();
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            if (name.endsWith('.txt') || name.endsWith('.csv')) {
                reader.onload = (e) => resolve({ type: 'text', content: e.target.result });
                reader.readAsText(file);
            } else if (name.endsWith('.docx')) {
                reader.onload = (e) => {
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(res => resolve({ type: 'text', content: res.value })).catch(reject);
                };
                reader.readAsArrayBuffer(file);
            } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
                reader.onload = (e) => {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    let txt = "";
                    workbook.SheetNames.forEach(sn => txt += XLSX.utils.sheet_to_txt(workbook.Sheets[sn]) + "\n");
                    resolve({ type: 'text', content: txt });
                };
                reader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/')) {
                reader.onload = (e) => resolve({ type: 'image', content: e.target.result });
                reader.readAsDataURL(file);
            } else { resolve({ type: 'text', content: "" }); }
        });
    }

    document.getElementById('generateBtn').onclick = async () => {
        const btn = document.getElementById('generateBtn');
        const statusTxt = document.getElementById('gen-status');
        const topic = document.getElementById('gen-topic').value.trim();
        const className = document.getElementById('gen-className').value.trim() || "未設定班級";
        const unitName = document.getElementById('gen-unitName').value.trim() || "未設定單元";
        const count = document.getElementById('gen-count').value;
        const hint = document.getElementById('gen-hint').value.trim();
        const fileInput = document.getElementById('gen-refFile');

        if (!topic) return alert("請輸入題目主題");
        btn.disabled = true;
        statusTxt.innerText = "AI 正在分析資料並出題中...";

        try {
            let contextData = fileInput.files.length > 0 ? await parseFile(fileInput.files[0]) : null;
            let prompt = `請幫我出 ${count} 題關於「${topic}」的選擇題。每題嚴格提供 4 個選項。`;
            if (hint) prompt += `額外指令：${hint}。`;
            if (contextData && contextData.type === 'text') prompt += `參考資料：\n${contextData.content}\n`;
            prompt += `輸出格式：僅回傳一個 JSON 陣列，內含物件欄位 q, a1, a2, a3, a4, ans (1-4)。`;

            let response;
            if (contextData && contextData.type === 'image') {
                response = await puter.ai.chat([{ role: "user", content: [{ type: "text", text: prompt }, { type: "image_url", image_url: { url: contextData.content } }] }]);
            } else {
                response = await puter.ai.chat(prompt);
            }

            let raw = response.toString().replace(/```json/g, '').replace(/```/g, '').trim();
            lastGeneratedQuestions = JSON.parse(raw);
            downloadExamExcel(lastGeneratedQuestions, className, unitName);
            statusTxt.innerText = "✅ 生成成功！Excel 已自動下載。";
            document.getElementById('reDownloadBtn').classList.remove('hidden');
        } catch (e) {
            statusTxt.innerText = "❌ 發生錯誤: " + e.message;
        } finally { btn.disabled = false; }
    };

    function downloadExamExcel(questions, className, unitName) {
        const header = [["班級", "單元", "題目", "選項1", "選項2", "選項3", "選項4", "正確答案"]];
        const rows = questions.map(q => [className, unitName, q.q, q.a1, q.a2, q.a3, q.a4, q.ans.toString()]);
        const ws = XLSX.utils.aoa_to_sheet(header.concat(rows));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "題庫");
        XLSX.writeFile(wb, `AI出題_${className}_${unitName}.xlsx`);
    }

    document.getElementById('reDownloadBtn').onclick = () => {
        if(lastGeneratedQuestions) downloadExamExcel(lastGeneratedQuestions, document.getElementById('gen-className').value, document.getElementById('gen-unitName').value);
    };

    /** 通用輔助函數 **/
    function showExamSubView(id) {
        ['view-admin', 'view-student-login', 'view-quiz', 'view-result'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function showLoading(txt) { document.getElementById('loading-text').innerText = txt; document.getElementById('loading-overlay').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
    function toggleQRModal(show) { document.getElementById('qr-modal').style.display = show ? 'flex' : 'none'; }

    document.getElementById('authLoginBtn').onclick = async () => { await puter.auth.signIn(); checkAdminAuth(); };
    document.getElementById('logoutBtn').onclick = () => { puter.auth.signOut(); location.reload(); };
    document.getElementById('applyBtn').onclick = async () => {
        const email = document.getElementById('applyEmail').value.trim();
        const name = document.getElementById('applyName').value.trim();
        if(!email || !name) return alert("請填寫完整");
        await fetch(GAS_AUTH_URL, { method: "POST", body: JSON.stringify({ action: "apply", uuid: userUUID, email, name }) });
        document.getElementById('authMsg').innerText = "申請已送出，請等待審核。";
        document.getElementById('applyForm').classList.add('hidden');
    };

    // 啟動
    initSystem();
</script>
