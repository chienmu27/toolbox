<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上考試工具箱 - 整合管理版</title>
    
    <!-- 引入外部資源 -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { 
            --primary-color: #46178f; 
            --bg-color: #f2f2f5;
            --exam-primary: #6c5ce7;
            --exam-success: #00b894;
            --exam-download: #0984e3;
            --exam-upload: #e17055;
            --exam-danger: #d63031;
        }

        body { 
            font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 95%; 
            max-width: 800px; 
            position: relative; 
            min-height: 550px;
        }

        /* 頁籤樣式 - 置中 */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        .tab-btn {
            padding: 12px 24px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: white;
            color: var(--primary-color);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }

        .hidden { display: none !important; }
        .main-btn { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .main-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .exam-input, .exam-select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .exam-button { color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; transition: 0.2s; }
        
        .sys-title { font-size: 1.25rem; font-weight: bold; color: var(--primary-color); border-left: 4px solid var(--primary-color); padding-left: 12px; }
        .option-btn { background: white; color: #333; border: 2px solid #eee; text-align: left; margin: 8px 0; width: 100%; padding: 15px; border-radius: 8px; }
        .option-btn.selected { background: var(--exam-primary); color: white; border-color: var(--exam-primary); }

        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        #qr-modal img { width: 90%; max-width: 500px; border: 15px solid white; border-radius: 10px; }
    </style>
</head>
<body>

<!-- 頁籤選單 -->
<div id="topNav" class="tab-nav hidden">
    <button id="tab-btn-exam" class="tab-btn active" onclick="switchTab('exam')">線上考試系統</button>
    <button id="tab-btn-gen" class="tab-btn" onclick="switchTab('gen')">線上 AI 出題</button>
</div>

<div class="container">
    <!-- 驗證遮罩 -->
    <div id="authOverlay">
        <h2 id="authMsg" class="text-xl font-bold mb-4 text-center">管理員請先登入 Google 帳號</h2>
        <div class="flex justify-center">
            <button id="authLoginBtn" class="main-btn max-w-[200px]">登入 Google</button>
        </div>
        <div id="applyForm" class="hidden w-full max-w-sm mt-6 mx-auto">
            <p class="mb-4 text-red-600 font-bold">尚未獲得授權，請申請：</p>
            <input type="email" id="applyEmail" class="exam-input" placeholder="Google 信箱">
            <input type="text" id="applyName" class="exam-input" placeholder="姓名">
            <button id="applyBtn" class="main-btn mt-2">送出申請</button>
        </div>
    </div>

    <!-- 主內容區 -->
    <div id="mainContent" class="hidden">
        <div class="flex justify-between items-center mb-6 pb-4 border-b">
            <div id="sysIndicator" class="sys-title">線上考試系統</div>
            <button id="logoutBtn" class="text-red-500 text-sm border border-red-500 px-3 py-1 rounded">登出管理員</button>
        </div>

        <!-- 分頁 1: 考試系統 -->
        <div id="view-exam-tab">
            <div id="view-admin" class="hidden">
                <div class="mb-6 p-4 bg-purple-50 rounded-lg">
                    <label class="text-sm font-bold text-purple-700">1. 上傳題目庫 (Excel):</label>
                    <input type="file" id="upload-file" accept=".xlsx, .xls" class="exam-input">
                    <button class="exam-button" style="background:var(--exam-upload)" onclick="handleUpload()">上傳並自動排序</button>
                </div>
                <div>
                    <label class="text-sm font-bold">2. 選擇考試單元:</label>
                    <select id="select-class" onchange="updateUnitDropdown()" class="exam-select"><option>載入中...</option></select>
                    <select id="select-unit" class="exam-select"><option>請先選擇班級</option></select>
                    <div class="grid grid-cols-1 gap-2 mt-4">
                        <button class="exam-button" style="background:var(--exam-primary)" onclick="generateQRCode()">生成考試 QR-Code</button>
                        <button class="exam-button" style="background:var(--exam-download)" onclick="downloadResults()">下載成績資料 (Excel)</button>
                        <button class="exam-button" style="background:var(--exam-danger)" onclick="confirmDelete()">刪除該單元題目</button>
                    </div>
                </div>
                <div id="qr-container" class="hidden text-center mt-6">
                    <img id="qr-image" class="mx-auto border-8 border-white shadow-lg cursor-zoom-in w-40" src="" onclick="toggleQRModal(true)">
                    <p class="text-xs text-gray-400 mt-2">學生掃描後會自動開啟預設瀏覽器</p>
                </div>
            </div>

            <!-- 學生端 -->
            <div id="view-student-login" class="hidden">
                <h2 id="exam-title" class="text-2xl font-bold mb-6 text-center text-gray-800 whitespace-pre-line">載入中...</h2>
                <div class="bg-gray-50 p-6 rounded-xl border">
                    <label class="block text-gray-600 mb-2 font-medium">請輸入您的 PIN 碼：</label>
                    <input type="text" id="pin-input" placeholder="例如：1234" inputmode="numeric" class="exam-input text-center text-xl tracking-widest">
                    <button class="exam-button mt-4 py-4 text-lg" style="background:var(--exam-primary)" onclick="studentLogin()">驗證身分並開始測驗</button>
                </div>
            </div>

            <div id="view-quiz" class="hidden">
                <div class="text-right text-sm text-gray-500 mb-2" id="quiz-progress"></div>
                <div id="question-text" class="text-xl font-medium mb-6 text-gray-800"></div>
                <div id="options-box"></div>
                <button id="btn-next" class="exam-button hidden py-4 text-lg" style="background:var(--exam-primary)" onclick="nextQuestion()">下一題</button>
                <button id="btn-submit" class="exam-button hidden py-4 text-lg" style="background:var(--exam-success)" onclick="submitExam()">提交試卷</button>
            </div>

            <div id="view-result" class="hidden text-center">
                <h2 class="text-2xl font-bold text-green-600 mt-10">測驗提交成功！</h2>
                <div id="result-stat" class="text-5xl font-black my-8 text-gray-800"></div>
                <button class="exam-button max-w-xs mx-auto" style="background:var(--exam-primary)" onclick="location.reload()">關閉頁面</button>
            </div>
        </div>

        <!-- 分頁 2: AI 出題 -->
        <div id="view-gen-tab" class="hidden">
            <h2 class="text-xl font-bold text-center mb-6">AI 自動出題系統</h2>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="font-bold text-sm">班級</label><input type="text" id="gen-className" class="exam-input" placeholder="五年一班"></div>
                <div><label class="font-bold text-sm">單元</label><input type="text" id="gen-unitName" class="exam-input" placeholder="第一單元"></div>
            </div>
            <div class="mt-4">
                <label class="font-bold text-sm">題目主題</label>
                <input type="text" id="gen-topic" class="exam-input" placeholder="例如：自然科學">
                <label class="font-bold text-sm mt-4 block">參考檔案 (選填)</label>
                <div class="border-2 border-dashed p-4 text-center rounded bg-gray-50">
                    <input type="file" id="gen-refFile" accept=".txt, .docx, .xlsx, .xls, image/*">
                </div>
                <div class="mt-4">
                    <label class="font-bold text-sm">生成題數</label>
                    <input type="number" id="gen-count" class="exam-input" value="5" min="1" max="20">
                </div>
                <button id="generateBtn" class="main-btn mt-6">開始 AI 生成</button>
                <button id="reDownloadBtn" class="exam-button mt-2 hidden" style="background:var(--exam-success)">再次下載 Excel</button>
                <div id="gen-status" class="mt-4 text-center text-sm font-bold text-blue-600"></div>
            </div>
        </div>
    </div>
</div>

<!-- QR 放大層 -->
<div id="qr-modal" onclick="toggleQRModal(false)"><img id="qr-image-large" src=""></div>

<!-- Loading -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[2000]">
    <div class="bg-white p-8 rounded-xl text-center">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-purple-500 border-t-transparent mx-auto mb-4"></div>
        <p id="loading-text">處理中...</p>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwHobXSaxivNtdaPynrxehum0cRalWhZrTBQYNO4s0pID4Gb21IE3n5o14S2MHL2L8Eyg/exec"; // 管理員驗證與出題用的 GAS (依原程式碼)
    const GAS_EXAM_URL = "https://script.google.com/macros/s/AKfycbzCZWT4-jxE0wlUWknG6gA4DSAGbUsuTY--cNSwu79wgD1JgZFid_9bXxolYOvfgqqZ-w/exec"; // 考試邏輯用的 GAS
    const BASE_URL = window.location.origin + window.location.pathname;

    let userUUID = "", configData = {}, currentExam = {}, quizData = [], currentIdx = 0, userAnswers = [], studentInfo = {}, lastGeneratedQuestions = null;

    async function initSystem() {
        const params = new URLSearchParams(window.location.search);
        const c = params.get('c'), u = params.get('u');
        if (c && u) {
            document.getElementById('mainContent').classList.remove('hidden');
            currentExam = { class: decodeURIComponent(c), unit: decodeURIComponent(u) };
            showSubView('view-student-login');
            document.getElementById('exam-title').innerText = `${currentExam.class}\n${currentExam.unit}`;
        } else {
            checkAdminAuth();
        }
    }

    async function checkAdminAuth() {
        if (!puter.auth.isSignedIn()) {
            document.getElementById('authOverlay').classList.remove('hidden');
            return;
        }
        const user = await puter.auth.getUser();
        userUUID = user.uuid;
        document.getElementById('authMsg').innerText = "驗證授權中...";
        try {
            const resp = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "checkStatus", uuid: userUUID }) });
            const result = await resp.json();
            if (result.status === "Approved") {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('topNav').classList.remove('hidden');
                fetchConfig();
            } else {
                document.getElementById('authMsg').innerText = "未獲授權";
                document.getElementById('applyForm').classList.remove('hidden');
                document.getElementById('authLoginBtn').classList.add('hidden');
            }
        } catch (e) { alert("驗證錯誤"); }
    }

    function switchTab(tab) {
        document.getElementById('tab-btn-exam').classList.toggle('active', tab==='exam');
        document.getElementById('tab-btn-gen').classList.toggle('active', tab==='gen');
        document.getElementById('view-exam-tab').classList.toggle('hidden', tab!=='exam');
        document.getElementById('view-gen-tab').classList.toggle('hidden', tab!=='gen');
        document.getElementById('sysIndicator').innerText = tab==='exam'?"線上考試系統":"線上出題工具";
    }

    async function fetchConfig() {
        showLoading("載入配置...");
        try {
            const res = await fetch(`${GAS_EXAM_URL}?action=getConfig`);
            configData = await res.json();
            const clsSelect = document.getElementById('select-class');
            clsSelect.innerHTML = '<option value="">選擇班級</option>';
            configData.classes.forEach(c => clsSelect.innerHTML += `<option value="${c}">${c}</option>`);
            showSubView('view-admin');
        } catch(e) {}
        hideLoading();
    }

    function updateUnitDropdown() {
        const cls = document.getElementById('select-class').value;
        const untSelect = document.getElementById('select-unit');
        untSelect.innerHTML = '<option value="">選擇單元</option>';
        if (configData.units[cls]) configData.units[cls].forEach(u => untSelect.innerHTML += `<option value="${u}">${u}</option>`);
    }

    async function handleUpload() {
        const file = document.getElementById('upload-file').files[0];
        if (!file) return alert("請選擇檔案");
        showLoading("上傳中...");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type:'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header:1});
            const dataRows = rows.slice(1).filter(r => r.length > 0);
            await fetch(GAS_EXAM_URL, {method:"POST", body:JSON.stringify({action:"uploadQuestions", rows:dataRows})});
            alert("上傳成功並已自動排序");
            fetchConfig();
        };
        reader.readAsArrayBuffer(file);
    }

    function generateQRCode() {
        const c = document.getElementById('select-class').value, u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇單元");
        const url = `${BASE_URL}?c=${encodeURIComponent(c)}&u=${encodeURIComponent(u)}&openExternalBrowser=1`;
        const qr = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
        document.getElementById('qr-image').src = qr;
        document.getElementById('qr-image-large').src = qr;
        document.getElementById('qr-container').classList.remove('hidden');
    }

    async function downloadResults() {
        const c = document.getElementById('select-class').value, u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇單元");
        showLoading("獲取成績...");
        const res = await fetch(GAS_EXAM_URL, {method:"POST", body:JSON.stringify({action:"getResults", className:c, unit:u})});
        const data = await res.json();
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "成績單");
        XLSX.writeFile(wb, `${c}_${u}_成績.xlsx`);
        hideLoading();
    }

    async function studentLogin() {
        const pin = document.getElementById('pin-input').value.trim();
        if (!pin) return alert("請輸入 PIN");
        showLoading("登入中...");
        const res = await fetch(GAS_EXAM_URL, {method:"POST", body:JSON.stringify({action:"login", pin, targetClass:currentExam.class})});
        const data = await res.json();
        hideLoading();
        if (data.success) { studentInfo = data; startQuiz(); } else alert(data.message);
    }

    async function startQuiz() {
        showSubView('view-quiz');
        showLoading("下載題目...");
        const res = await fetch(GAS_EXAM_URL, {method:"POST", body:JSON.stringify({action:"getQuestions", className:currentExam.class, unit:currentExam.unit})});
        quizData = await res.json();
        hideLoading();
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('quiz-progress').innerText = `${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.question;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-submit').classList.add('hidden');
        q.options.forEach((txt, i) => {
            if(!txt) return;
            const btn = document.createElement('button');
            btn.className = 'option-btn font-medium';
            btn.innerText = txt;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                userAnswers[currentIdx] = { question: q.question, userAns: i+1, correctAns: q.correct };
                if (currentIdx < quizData.length - 1) document.getElementById('btn-next').classList.remove('hidden');
                else document.getElementById('btn-submit').classList.remove('hidden');
            };
            box.appendChild(btn);
        });
    }

    function nextQuestion() { currentIdx++; renderQuestion(); }

    async function submitExam() {
        showLoading("提交中...");
        const res = await fetch(GAS_EXAM_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "submitExam", 
                seatNo: studentInfo.seatNo, // 改為傳送座號
                className: studentInfo.className, 
                unit: currentExam.unit, 
                answers: userAnswers 
            })
        });
        const result = await res.json();
        hideLoading();
        showSubView('view-result');
        document.getElementById('result-stat').innerText = `${result.score} 分`;
    }

    // AI 出題邏輯
    document.getElementById('generateBtn').onclick = async () => {
        const topic = document.getElementById('gen-topic').value;
        if (!topic) return alert("請輸入主題");
        const status = document.getElementById('gen-status');
        const count = document.getElementById('gen-count').value;
        const className = document.getElementById('gen-className').value || "未設定";
        const unitName = document.getElementById('gen-unitName').value || "未設定";
        
        status.innerText = "AI 正在分析出題中...";
        document.getElementById('generateBtn').disabled = true;

        try {
            const fileInput = document.getElementById('gen-refFile');
            let context = "";
            if(fileInput.files.length > 0) {
               // 此處簡化處理，實際需調用 parseFile 邏輯 (同原程式碼)
            }
            
            const prompt = `請出 ${count} 題關於「${topic}」的選擇題，4個選項，回傳 JSON 陣列：[{q, a1, a2, a3, a4, ans}]，ans 為 1-4。`;
            const response = await puter.ai.chat(prompt);
            const raw = response.toString().replace(/```json/g, '').replace(/```/g, '').trim();
            lastGeneratedQuestions = JSON.parse(raw);
            
            const header = [["班級", "單元", "題目", "選項1", "選項2", "選項3", "選項4", "正確答案"]];
            const rows = lastGeneratedQuestions.map(q => [className, unitName, q.q, q.a1, q.a2, q.a3, q.a4, q.ans]);
            const ws = XLSX.utils.aoa_to_sheet(header.concat(rows));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "題庫");
            XLSX.writeFile(wb, `AI出題_${className}_${unitName}.xlsx`);
            
            status.innerText = "生成成功！Excel 已下載。";
            document.getElementById('reDownloadBtn').classList.remove('hidden');
        } catch(e) { status.innerText = "生成失敗"; }
        document.getElementById('generateBtn').disabled = false;
    };

    function showSubView(id) {
        ['view-admin', 'view-student-login', 'view-quiz', 'view-result'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function showLoading(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading-overlay').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
    function toggleQRModal(s) { document.getElementById('qr-modal').style.display = s ? 'flex' : 'none'; }
    
    document.getElementById('authLoginBtn').onclick = async () => { await puter.auth.signIn(); initSystem(); };
    document.getElementById('logoutBtn').onclick = () => { puter.auth.signOut(); location.reload(); };
    
    initSystem();
</script>

</body>
</html>
