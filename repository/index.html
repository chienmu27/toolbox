<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上考試整合工具</title>
    
    <!-- 引入外部資源 -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { 
            --primary-color: #46178f; 
            --bg-color: #f2f2f5;
            --exam-primary: #6c5ce7;
            --exam-success: #00b894;
            --exam-download: #0984e3;
            --exam-upload: #e17055;
            --exam-danger: #d63031;
        }

        body { 
            font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 0; 
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 95%; 
            max-width: 800px; 
            position: relative; 
            min-height: 500px;
        }

        /* 頁籤樣式 */
        .tab-bar {
            display: flex;
            width: 95%;
            max-width: 800px;
            margin-bottom: -2px;
            z-index: 10;
        }
        .tab-btn {
            padding: 12px 24px;
            background: #e0e0e0;
            border: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            margin-right: 5px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: white;
            color: var(--primary-color);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }

        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .sys-title { font-size: 1.25rem; font-weight: bold; color: var(--primary-color); border-left: 4px solid var(--primary-color); padding-left: 12px; }
        .logout-btn { background-color: #fff; color: #d9534f; border: 1px solid #d9534f; padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; cursor: pointer; }

        /* 遮罩層 */
        #authOverlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; border-radius: 12px; z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; 
        }

        .exam-input, .exam-select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .exam-button { color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--exam-primary); }
        .btn-upload { background: var(--exam-upload); }
        .btn-download { background: var(--exam-download); }
        .btn-danger { background: var(--exam-danger); }

        .hidden { display: none !important; }
        .option-btn { background: white; color: #333; border: 2px solid #eee; text-align: left; margin: 8px 0; width: 100%; padding: 15px; border-radius: 8px; }
        .option-btn.selected { background: var(--exam-primary); color: white; border-color: var(--exam-primary); }
        
        #qr-container img { margin: 20px auto; border: 10px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 180px; cursor: zoom-in; }
        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        #qr-modal img { width: 90%; max-width: 500px; border: 15px solid white; border-radius: 10px; }

        .footer { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div id="tabBar" class="tab-bar hidden">
    <button class="tab-btn active" id="tab-exam" onclick="switchTab('exam')">線上考試系統</button>
    <button class="tab-btn" id="tab-gen" onclick="switchTab('gen')">AI 自動出題</button>
</div>

<div class="container">
    <!-- 管理員驗證遮罩 -->
    <div id="authOverlay">
        <h2 id="authMsg" class="text-xl font-bold mb-4">管理員請先登入 Google 帳號</h2>
        <button id="authLoginBtn" class="px-8 py-3 bg-[#46178f] text-white rounded-lg font-bold">登入 Google</button>
        <div id="applyForm" class="hidden w-full max-w-sm">
            <p class="mb-4">尚未獲得授權：</p>
            <input type="email" id="applyEmail" class="exam-input" placeholder="Google 信箱">
            <input type="text" id="applyName" class="exam-input" placeholder="姓名">
            <button id="applyBtn" class="exam-button btn-primary mt-2">送出授權申請</button>
        </div>
    </div>

    <!-- 主內容區 -->
    <div id="mainContent" class="hidden">
        <div class="nav-header">
            <div id="tabTitle" class="sys-title">線上考試系統</div>
            <button id="logoutBtn" class="logout-btn">登出</button>
        </div>

        <!-- 考試系統分頁 -->
        <div id="tabContent-exam">
            <div id="view-admin" class="hidden">
                <div class="border-b-2 border-dashed pb-4 mb-4">
                    <label class="text-sm text-gray-500">上傳題目 (Excel):</label>
                    <input type="file" id="upload-file" accept=".xlsx, .xls" class="exam-input">
                    <button class="exam-button btn-upload" onclick="handleUpload()">上傳題目資料</button>
                </div>
                <div>
                    <select id="select-class" onchange="updateUnitDropdown()" class="exam-select"><option>載入中...</option></select>
                    <select id="select-unit" class="exam-select"><option>請選擇單元</option></select>
                    <div class="grid grid-cols-1 gap-2 mt-2">
                        <button class="exam-button btn-primary" onclick="generateQRCode()">生成考試 QR-Code</button>
                        <button class="exam-button btn-download" onclick="downloadResults()">下載成績資料</button>
                        <button class="exam-button btn-danger" onclick="confirmDelete()">刪除該單元題目</button>
                    </div>
                </div>
                <div id="qr-container" class="hidden text-center"><img id="qr-image" src="" onclick="toggleQRModal(true)"></div>
            </div>

            <div id="view-student-login" class="hidden">
                <h2 id="exam-title" class="text-2xl font-bold mb-6 text-center whitespace-pre-line">載入中...</h2>
                <input type="text" id="pin-input" placeholder="輸入 PIN 碼" inputmode="numeric" class="exam-input text-center text-xl">
                <button class="exam-button btn-primary mt-4 py-4" onclick="studentLogin()">進入測驗</button>
            </div>

            <div id="view-quiz" class="hidden">
                <div class="progress text-right text-gray-500 text-sm mb-2" id="quiz-progress"></div>
                <div id="question-text" class="text-lg font-bold mb-4"></div>
                <div id="options-box"></div>
                <button id="btn-next" class="exam-button btn-primary hidden mt-4" onclick="nextQuestion()">下一題</button>
                <button id="btn-submit" class="exam-button hidden mt-4" onclick="submitExam()" style="background: var(--exam-success);">提交試卷</button>
            </div>

            <div id="view-result" class="hidden text-center">
                <h2 class="text-2xl font-bold text-green-600">測驗已提交</h2>
                <div id="result-stat" class="text-4xl font-black my-6"></div>
                <button class="exam-button btn-primary" onclick="location.reload()">返回首頁</button>
            </div>
        </div>

        <!-- AI 出題分頁 -->
        <div id="tabContent-gen" class="hidden">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="gen-class" placeholder="班級" class="exam-input">
                <input type="text" id="gen-unit" placeholder="單元" class="exam-input">
            </div>
            <input type="text" id="gen-topic" placeholder="題目主題 (例如：地理、英文)" class="exam-input">
            <textarea id="gen-hint" rows="2" placeholder="額外要求 (選填)" class="exam-input"></textarea>
            <div class="file-upload-area border-2 border-dashed p-4 text-center bg-gray-50 rounded-lg">
                <input type="file" id="gen-file" accept=".txt,.docx,.xlsx,image/*">
                <p class="text-xs text-gray-400 mt-2">可上傳文件或圖片識圖出題</p>
            </div>
            <div class="mt-4">
                <span class="text-sm">題數：</span>
                <input type="number" id="gen-count" value="5" min="1" max="20" class="exam-input w-24 inline-block">
            </div>
            <button id="generateBtn" class="exam-button btn-primary mt-4 py-4" onclick="generateAIQuestions()">AI 生成題目並下載 Excel</button>
            <div id="gen-status" class="text-center text-sm mt-2 text-gray-500">就緒</div>
        </div>

        <div class="footer">線上考試工具 © 2026 chienmu.tai</div>
    </div>
</div>

<div id="qr-modal" onclick="toggleQRModal(false)"><img id="qr-image-large" src=""></div>
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[2000]">
    <div class="bg-white p-8 rounded-2xl text-center"><div class="animate-spin h-10 w-10 border-4 border-indigo-500 border-t-transparent rounded-full mx-auto mb-4"></div><p id="loading-text">處理中...</p></div>
</div>

<script>
    // --- 配置與變數 ---
    const GAS_URL = "您的GAS部署網址"; // <--- 請務必替換為您的 GAS 網址
    const BASE_URL = window.location.href.split('?')[0];

    let userUUID = "";
    let configData = {};
    let currentExam = { class: "", unit: "" };
    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let studentInfo = {}; // 包含座號

    // --- 初始化 ---
    async function init() {
        const params = new URLSearchParams(window.location.search);
        const c = params.get('c');
        const u = params.get('u');

        if (c && u) {
            // 學生模式 (透過 QR Code 進入)
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('tabBar').classList.add('hidden');
            currentExam = { class: decodeURIComponent(c), unit: decodeURIComponent(u) };
            showView('view-student-login');
            document.getElementById('exam-title').innerText = `${currentExam.class}\n${currentExam.unit}`;
        } else {
            // 管理模式
            checkAuth();
        }
    }

    // --- 授權驗證 ---
    async function checkAuth() {
        if (!puter.auth.isSignedIn()) return;
        const user = await puter.auth.getUser();
        userUUID = user.uuid;
        document.getElementById('authMsg').innerText = "驗證授權中...";
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "checkStatus", uuid: userUUID }) });
            const result = await res.json();
            if (result.status === "Approved") {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('tabBar').classList.remove('hidden');
                fetchConfig();
            } else {
                document.getElementById('authMsg').innerText = "未獲授權";
                document.getElementById('applyForm').classList.remove('hidden');
            }
        } catch (e) { alert("連線失敗"); }
    }

    // --- 分頁切換 ---
    function switchTab(tab) {
        document.getElementById('tab-exam').classList.toggle('active', tab==='exam');
        document.getElementById('tab-gen').classList.toggle('active', tab==='gen');
        document.getElementById('tabContent-exam').classList.toggle('hidden', tab!=='exam');
        document.getElementById('tabContent-gen').classList.toggle('hidden', tab!=='gen');
        document.getElementById('tabTitle').innerText = (tab==='exam' ? "線上考試系統" : "線上出題工具");
    }

    // --- 考試系統邏輯 ---
    async function fetchConfig() {
        showLoading("讀取選單...");
        const res = await fetch(`${GAS_URL}?action=getConfig`);
        configData = await res.json();
        const clsSelect = document.getElementById('select-class');
        clsSelect.innerHTML = '<option value="">選擇班級</option>';
        configData.classes.forEach(c => clsSelect.innerHTML += `<option value="${c}">${c}</option>`);
        showView('view-admin');
        hideLoading();
    }

    function updateUnitDropdown() {
        const cls = document.getElementById('select-class').value;
        const untSelect = document.getElementById('select-unit');
        untSelect.innerHTML = '<option value="">選擇單元</option>';
        if (configData.units[cls]) configData.units[cls].forEach(u => untSelect.innerHTML += `<option value="${u}">${u}</option>`);
    }

    async function studentLogin() {
        const pin = document.getElementById('pin-input').value.trim();
        if (!pin) return alert("請輸入 PIN");
        showLoading("登入中...");
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "login", pin: pin, targetClass: currentExam.class }) });
        const data = await res.json();
        hideLoading();
        if (data.success) { 
            studentInfo = data; // 這裡拿到 name, className, seatNo
            startQuiz(); 
        } else alert(data.message);
    }

    async function startQuiz() {
        showView('view-quiz');
        showLoading("獲取題目...");
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getQuestions", className: currentExam.class, unit: currentExam.unit }) });
        quizData = await res.json();
        hideLoading();
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('quiz-progress').innerText = `題號: ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.question;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-submit').classList.add('hidden');
        q.options.forEach((text, i) => {
            if(!text) return;
            const btn = document.createElement('button');
            btn.className = 'option-btn font-medium';
            btn.innerText = text;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                userAnswers[currentIdx] = { question: q.question, userAns: i+1, correctAns: q.correct };
                if (currentIdx < quizData.length - 1) document.getElementById('btn-next').classList.remove('hidden');
                else document.getElementById('btn-submit').classList.remove('hidden');
            };
            box.appendChild(btn);
        });
    }

    function nextQuestion() { currentIdx++; renderQuestion(); }

    async function submitExam() {
        showLoading("提交中...");
        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "submitExam", 
                seatNo: studentInfo.seatNo, // 傳送座號
                className: studentInfo.className, 
                unit: currentExam.unit, 
                answers: userAnswers 
            })
        });
        const result = await res.json();
        hideLoading();
        showView('view-result');
        document.getElementById('result-stat').innerText = `得分：${result.score}`;
    }

    // --- AI 出題邏輯 ---
    async function generateAIQuestions() {
        const topic = document.getElementById('gen-topic').value;
        const cls = document.getElementById('gen-class').value || "未設定班級";
        const unt = document.getElementById('gen-unit').value || "未設定單元";
        if(!topic) return alert("請輸入主題");

        const btn = document.getElementById('generateBtn');
        const status = document.getElementById('gen-status');
        btn.disabled = true;
        status.innerText = "AI 思考中...";

        try {
            let prompt = `請幫我出 ${document.getElementById('gen-count').value} 題關於「${topic}」的選擇題。`;
            prompt += `輸出 JSON 陣列，欄位：q, a1, a2, a3, a4, ans (1-4)。`;
            
            const response = await puter.ai.chat(prompt);
            const questions = JSON.parse(response.toString().replace(/```json/g, '').replace(/```/g, ''));
            
            const header = [["班級", "單元", "題目", "選項1", "選項2", "選項3", "選項4", "正確答案"]];
            const rows = questions.map(q => [cls, unt, q.q, q.a1, q.a2, q.a3, q.a4, q.ans]);
            const ws = XLSX.utils.aoa_to_sheet(header.concat(rows));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "題庫");
            XLSX.writeFile(wb, `題庫_${cls}_${unt}.xlsx`);
            status.innerText = "生成成功並已下載！";
        } catch(e) { 
            status.innerText = "失敗: " + e.message; 
        } finally { 
            btn.disabled = false; 
        }
    }

    // --- 管理功能 ---
    function generateQRCode() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇班級單元");
        const url = `${BASE_URL}?c=${encodeURIComponent(c)}&u=${encodeURIComponent(u)}&openExternalBrowser=1`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
        document.getElementById('qr-image').src = qrUrl;
        document.getElementById('qr-image-large').src = qrUrl;
        document.getElementById('qr-container').classList.remove('hidden');
    }

    async function downloadResults() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        showLoading("獲取成績...");
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getResults", className: c, unit: u }) });
        const data = await res.json();
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "成績單");
        XLSX.writeFile(wb, `${c}_${u}_成績.xlsx`);
        hideLoading();
    }

    async function handleUpload() {
        const file = document.getElementById('upload-file').files[0];
        if(!file) return;
        const reader = new FileReader();
        showLoading("上傳中...");
        reader.onload = async (e) => {
            const workbook = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header:1}).slice(1);
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "uploadQuestions", rows }) });
            alert((await res.json()).message);
            fetchConfig();
        };
        reader.readAsArrayBuffer(file);
    }

    async function confirmDelete() {
        if(!confirm("確定刪除？")) return;
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "deleteQuestions", className: c, unit: u }) });
        fetchConfig();
    }

    // --- 工具函式 ---
    function showView(id) {
        ['view-admin', 'view-student-login', 'view-quiz', 'view-result'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function showLoading(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading-overlay').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
    function toggleQRModal(s) { document.getElementById('qr-modal').style.display = s ? 'flex' : 'none'; }

    document.getElementById('authLoginBtn').onclick = () => puter.auth.signIn().then(checkAuth);
    document.getElementById('logoutBtn').onclick = () => { puter.auth.signOut(); location.reload(); };
    document.getElementById('applyBtn').onclick = async () => {
        const name = document.getElementById('applyName').value;
        const email = document.getElementById('applyEmail').value;
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "apply", uuid: userUUID, name, email }) });
        alert("已送出申請");
    };

    init();
</script>
</body>
</html>
