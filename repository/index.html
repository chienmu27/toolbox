<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上考試系統</title>
    <!-- 引入 XLSX 函式庫 -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --download: #0984e3; --bg: #f0f2f5; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        .hidden { display: none; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-download { background: var(--download); margin-top: 5px; }
        .option-btn { background: white; color: #333; border: 2px solid #eee; text-align: left; margin: 8px 0; width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; }
        .option-btn:hover { border-color: var(--primary); background: #f9f9ff; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        #qr-container img { margin-top: 20px; border: 10px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 200px; height: 200px; }
        .progress { color: #666; font-size: 0.9rem; margin-bottom: 10px; text-align: right; }
        #question-text { font-size: 1.25rem; margin: 20px 0; line-height: 1.4; color: #2d3436; }
    </style>
</head>
<body>

<div class="card">
    <!-- 1. 管理者設定區 -->
    <div id="view-admin" class="hidden">
        <h2>管理者設定考試</h2>
        <select id="select-class" onchange="updateUnitDropdown()"><option>載入中...</option></select>
        <select id="select-unit"><option>請先選擇班級</option></select>
        <button onclick="generateQRCode()">生成考試 QR-Code</button>
        <button class="btn-download" onclick="downloadResults()">下載成績資料 (Excel)</button>
        <div id="qr-container" class="hidden">
            <img id="qr-image" src="" alt="QR Code">
            <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">請掃描 QR-Code 開始考試</p>
        </div>
    </div>

    <!-- 2. 學生登入區 -->
    <div id="view-student-login" class="hidden">
        <h2 id="exam-title">載入考試資訊...</h2>
        <p>請輸入您的 PIN 碼進入測驗</p>
        <input type="text" id="pin-input" placeholder="例如: 1234" inputmode="numeric">
        <button onclick="studentLogin()">進入測驗</button>
    </div>

    <!-- 3. 測驗進行區 -->
    <div id="view-quiz" class="hidden">
        <div class="progress" id="quiz-progress"></div>
        <div id="question-text"></div>
        <div id="options-box"></div>
        <button id="btn-next" class="hidden" onclick="nextQuestion()">下一題</button>
        <button id="btn-submit" class="hidden" onclick="submitExam()" style="background: var(--success);">提交試卷</button>
    </div>

    <!-- 4. 結果區 -->
    <div id="view-result" class="hidden">
        <h2 style="color: var(--success);">測驗結束</h2>
        <div id="result-stat" style="font-size: 1.5rem; margin: 20px 0;"></div>
        <button onclick="location.href='https://chienmu27.github.io/toolbox/repository/'">回首頁</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzCZWT4-jxE0wlUWknG6gA4DSAGbUsuTY--cNSwu79wgD1JgZFid_9bXxolYOvfgqqZ-w/exec"; // <--- 請填入 GAS 部署網址
    const BASE_URL = "https://chienmu27.github.io/toolbox/repository/";
    
    let configData = {}; 
    let currentExam = { class: "", unit: "" };
    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let studentInfo = {};

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const c = params.get('c');
        const u = params.get('u');

        if (c && u) {
            currentExam = { class: decodeURIComponent(c), unit: decodeURIComponent(u) };
            showView('view-student-login');
            document.getElementById('exam-title').innerText = `${currentExam.class} - ${currentExam.unit}`;
        } else {
            showView('view-admin');
            fetchConfig();
        }
    };

    async function fetchConfig() {
        try {
            const res = await fetch(`${GAS_URL}?action=getConfig`);
            configData = await res.json();
            const clsSelect = document.getElementById('select-class');
            clsSelect.innerHTML = '<option value="">選擇班級</option>';
            configData.classes.forEach(c => {
                clsSelect.innerHTML += `<option value="${c}">${c}</option>`;
            });
        } catch (e) {
            alert("無法連線至後端系統。");
        }
    }

    function updateUnitDropdown() {
        const cls = document.getElementById('select-class').value;
        const untSelect = document.getElementById('select-unit');
        untSelect.innerHTML = '<option value="">選擇單元</option>';
        if (configData.units[cls]) {
            configData.units[cls].forEach(u => {
                untSelect.innerHTML += `<option value="${u}">${u}</option>`;
            });
        }
    }

    function generateQRCode() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇班級與單元");
        const examUrl = `${BASE_URL}?c=${encodeURIComponent(c)}&u=${encodeURIComponent(u)}&openExternalBrowser=1`;
        const qrImg = document.getElementById('qr-image');
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(examUrl)}`;
        document.getElementById('qr-container').classList.remove('hidden');
    }

    // 下載 Excel 功能
    async function downloadResults() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇班級與單元");

        const btn = document.querySelector('.btn-download');
        btn.disabled = true;
        btn.innerText = "讀取資料中...";

        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getResults", className: c, unit: u })
            });
            const data = await res.json();

            if (data.length === 0) {
                alert("查無成績資料");
            } else {
                // 使用 SheetJS 生成 Excel
                const worksheet = XLSX.utils.json_to_sheet(data);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "成績結果");
                
                // 下載檔案
                const fileName = `${c}_${u}_成績統計.xlsx`;
                XLSX.writeFile(workbook, fileName);
            }
        } catch (e) {
            alert("下載失敗");
        } finally {
            btn.disabled = false;
            btn.innerText = "下載成績資料 (Excel)";
        }
    }

    async function studentLogin() {
        const pin = document.getElementById('pin-input').value.trim();
        if (!pin) return alert("請輸入 PIN 碼");
        const btn = document.querySelector('#view-student-login button');
        btn.disabled = true;

        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", pin: pin, targetClass: currentExam.class })
        });
        const data = await res.json();
        if (data.success) {
            studentInfo = data;
            startQuiz();
        } else {
            alert(data.message);
            btn.disabled = false;
        }
    }

    async function startQuiz() {
        showView('view-quiz');
        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getQuestions", className: currentExam.class, unit: currentExam.unit })
        });
        quizData = await res.json();
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('quiz-progress').innerText = `題號: ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.question;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-submit').classList.add('hidden');

        q.options.forEach((text, i) => {
            if(!text) return;
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = text;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                userAnswers[currentIdx] = { question: q.question, userAns: i+1, correctAns: q.correct };
                if (currentIdx < quizData.length - 1) document.getElementById('btn-next').classList.remove('hidden');
                else document.getElementById('btn-submit').classList.remove('hidden');
            };
            box.appendChild(btn);
        });
    }

    function nextQuestion() {
        currentIdx++;
        renderQuestion();
    }

    async function submitExam() {
        document.getElementById('view-quiz').innerHTML = "<h3>正在提交...</h3>";
        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "submitExam",
                name: studentInfo.name,
                className: studentInfo.className,
                unit: currentExam.unit,
                answers: userAnswers
            })
        });
        const result = await res.json();
        showView('view-result');
        document.getElementById('result-stat').innerText = `得分：${result.score}`;
    }

    function showView(viewId) {
        ['view-admin', 'view-student-login', 'view-quiz', 'view-result'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(viewId).classList.remove('hidden');
    }
</script>
</body>
</html>
