<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡管理系統</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "PingFang TC", sans-serif; background-color: #f3f4f6; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-primary { background-color: #4f46e5; color: white; padding: 0.75rem; border-radius: 0.5rem; width: 100%; font-weight: bold; transition: 0.2s; }
        .btn-primary:hover { background-color: #4338ca; }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="app" class="card">
        <!-- 載入中 -->
        <div id="view-loading" class="text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="mt-4 text-gray-600">系統載入中...</p>
        </div>

        <!-- 1. 登入頁面 -->
        <div id="view-login" class="hidden text-center">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">打卡管理系統</h2>
            <p class="mb-6 text-gray-500">請先登入 Google 帳號以進行管理</p>
            <button id="btnLogin" class="btn-primary">登入 Google 帳號</button>
        </div>

        <!-- 2. 註冊申請頁面 -->
        <div id="view-register" class="hidden">
            <h2 class="text-xl font-bold mb-4">帳號申請</h2>
            <p class="text-sm text-red-500 mb-4">您的帳號尚未註冊，請填寫基本資料：</p>
            <input type="email" id="regEmail" class="input-field" placeholder="Google 信箱" readonly>
            <input type="text" id="regName" class="input-field" placeholder="姓名 (必填)">
            <button id="btnApply" class="btn-primary">送出申請</button>
            <p id="pendingMsg" class="hidden text-center text-orange-600 font-bold mt-4">申請審核中，請稍候再試。</p>
        </div>

        <!-- 3. 管理員功能：生成 QR Code -->
        <div id="view-admin" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="adminName" class="font-bold"></span>
                <button id="btnLogout" class="text-xs text-red-500 underline">登出</button>
            </div>
            <h2 class="text-lg font-bold mb-4">產生打卡 QR-Code</h2>
            <label class="block text-sm text-gray-600 mb-1">選擇打卡項目：</label>
            <select id="projectSelect" class="input-field"></select>
            <button id="btnGenQR" class="btn-primary">生成 QR-Code</button>
            
            <div id="qrResult" class="hidden mt-6 text-center">
                <p class="text-xs text-gray-400 mb-2" id="scanIdDisplay"></p>
                <img id="qrImage" class="mx-auto border p-2 bg-white mb-4">
                <button onclick="window.print()" class="text-sm text-indigo-600 border border-indigo-600 px-4 py-1 rounded">列印 QR Code</button>
            </div>
        </div>

        <!-- 4. 使用者報到頁面 (掃碼後進入) -->
        <div id="view-checkin" class="hidden text-center">
            <h2 class="text-2xl font-bold mb-2">打卡報到</h2>
            <p id="checkinProjectName" class="text-indigo-600 font-bold mb-6"></p>
            <input type="text" id="checkinUserName" class="input-field" placeholder="請輸入您的姓名">
            <button id="btnSubmitCheckIn" class="btn-primary">送出報到</button>
        </div>

        <!-- 5. 完成報到 -->
        <div id="view-success" class="hidden text-center">
            <div class="text-5xl mb-4">✅</div>
            <h2 class="text-2xl font-bold text-green-600">報到成功</h2>
            <p class="mt-2 text-gray-500">您可以關閉此視窗</p>
        </div>
    </div>

<script>
    // --- 務必修改此處 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbweVh3vEeiQIIGPnizEFhNzTwxG_fxiSbR6YqydBgbhU-1LGKFtB7R0h9v_Yt_jUX_p/exec"; 
    const GITHUB_URL = window.location.origin + window.location.pathname;

    let currentUser = null;
    let currentScanId = "";
    let currentProject = "";

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const pid = params.get('pid'); // Project Name
        const sid = params.get('sid'); // Scan ID

        // 如果 URL 帶有參數，顯示報到頁面
        if (pid && sid) {
            currentProject = decodeURIComponent(pid);
            currentScanId = sid;
            showView('view-checkin');
            document.getElementById('checkinProjectName').innerText = "項目：" + currentProject;
            return;
        }

        // 否則進入管理端流程
        checkAuth();
    }

    async function checkAuth() {
        if (!puter.auth.isSignedIn()) {
            showView('view-login');
            return;
        }

        const user = await puter.auth.getUser();
        currentUser = user;
        
        // 檢查後端狀態
        const resp = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'checkStatus', uuid: user.uuid })
        });
        const result = await resp.json();

        if (result.status === "Approved") {
            document.getElementById('adminName').innerText = "管理者：" + result.userName;
            loadProjects();
            showView('view-admin');
        } else if (result.status === "Pending") {
            document.getElementById('regEmail').value = user.email;
            document.getElementById('regName').classList.add('hidden');
            document.getElementById('btnApply').classList.add('hidden');
            document.getElementById('pendingMsg').classList.remove('hidden');
            showView('view-register');
        } else {
            document.getElementById('regEmail').value = user.email;
            showView('view-register');
        }
    }

    // 載入打卡項目下拉選單
    async function loadProjects() {
        const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getProjectList' }) });
        const data = await resp.json();
        const select = document.getElementById('projectSelect');
        select.innerHTML = "";
        data.projects.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.innerText = name;
            select.appendChild(opt);
        });
    }

    // 申請帳號
    document.getElementById('btnApply').onclick = async () => {
        const name = document.getElementById('regName').value;
        if (!name) return alert("請輸入姓名");
        
        showView('view-loading');
        await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'apply',
                uuid: currentUser.uuid,
                email: currentUser.email,
                name: name
            })
        });
        alert("申請已送出，請待管理員核可。");
        location.reload();
    };

    // 生成 QR Code
    document.getElementById('btnGenQR').onclick = () => {
        const projectName = document.getElementById('projectSelect').value;
        const scanId = "ID-" + Date.now();
        const checkinUrl = `${GITHUB_URL}?pid=${encodeURIComponent(projectName)}&sid=${scanId}`;
        const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(checkinUrl)}`;
        
        document.getElementById('qrImage').src = qrApi;
        document.getElementById('scanIdDisplay').innerText = "掃碼 ID: " + scanId;
        document.getElementById('qrResult').classList.remove('hidden');
    };

    // 報到送出
    document.getElementById('btnSubmitCheckIn').onclick = async () => {
        const userName = document.getElementById('checkinUserName').value;
        if (!userName) return alert("請輸入姓名");
        
        showView('view-loading');
        const resp = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'submitCheckIn',
                projectName: currentProject,
                userName: userName,
                scanId: currentScanId
            })
        });
        const result = await resp.json();
        if (result.success) {
            showView('view-success');
        } else {
            alert("報到失敗：" + result.message);
            showView('view-checkin');
        }
    };

    // 工具函式
    function showView(id) {
        ['view-loading', 'view-login', 'view-register', 'view-admin', 'view-checkin', 'view-success'].forEach(v => {
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    document.getElementById('btnLogin').onclick = () => puter.auth.signIn().then(() => location.reload());
    document.getElementById('btnLogout').onclick = () => { puter.auth.signOut(); location.reload(); };

    init();
</script>
</body>
</html>
