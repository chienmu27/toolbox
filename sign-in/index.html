<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡管理系統</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f3f4f6; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { transition: all 0.3s; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .btn-primary { background-color: #4f46e5; color: white; }
        .btn-primary:hover { background-color: #4338ca; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-top: 8px; margin-bottom: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 登入主頁面 -->
    <div id="view-login">
        <h2 class="text-2xl font-bold text-center mb-6">打卡管理系統</h2>
        <p class="text-center text-gray-600 mb-8">請先登入 Google 帳號以繼續使用</p>
        <button onclick="login()" class="btn btn-primary">登入 Google 帳號</button>
    </div>

    <!-- 2. 申請資料頁面 -->
    <div id="view-apply" class="hidden">
        <h2 class="text-xl font-bold mb-4 text-red-600">帳號尚未註冊</h2>
        <p class="mb-4 text-gray-500">請填寫以下資訊申請授權：</p>
        <label>電子信箱</label>
        <input type="email" id="apply-email" class="input-field" readonly>
        <label>姓名 (必要)</label>
        <input type="text" id="apply-name" class="input-field" placeholder="請輸入真實姓名">
        <button onclick="submitApplication()" class="btn btn-primary">送出申請</button>
    </div>

    <!-- 3. 等待核可頁面 -->
    <div id="view-pending" class="hidden text-center">
        <div class="text-yellow-500 text-5xl mb-4">⏳</div>
        <h2 class="text-xl font-bold mb-2">申請審核中</h2>
        <p class="text-gray-500">管理者尚未核可您的權限，請稍後再試。</p>
        <button onclick="location.reload()" class="btn btn-primary mt-6">重新整理狀態</button>
    </div>

    <!-- 4. 打卡主功能頁面 -->
    <div id="view-main" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <span id="display-user" class="font-bold text-indigo-600"></span>
            <button onclick="logout()" class="text-sm text-red-400">登出</button>
        </div>
        <h2 class="text-xl font-bold mb-4">生成打卡 QR-Code</h2>
        <label>選擇打卡項目</label>
        <select id="project-list" class="input-field"></select>
        <button onclick="generateQR()" class="btn btn-primary">生成 QR-code</button>
        
        <div id="qr-display" class="mt-8 text-center hidden">
            <p class="text-sm text-gray-400 mb-2" id="scan-id-text"></p>
            <img id="qr-img" class="mx-auto border-4 border-white shadow-md">
            <p class="mt-4 text-xs text-blue-500">請掃描上方 QR-Code 進行報到</p>
        </div>
    </div>

    <!-- 5. 掃描後報到頁面 -->
    <div id="view-checkin" class="hidden">
        <h2 class="text-2xl font-bold text-center mb-2" id="checkin-project-name">項目報到</h2>
        <p id="checkin-scan-id" class="text-center text-gray-400 text-xs mb-6"></p>
        <label>報到姓名</label>
        <input type="text" id="checkin-name" class="input-field" placeholder="請輸入姓名">
        <button onclick="submitCheckIn()" class="btn btn-primary">送出報到資料</button>
    </div>

    <!-- 6. 成功訊息 -->
    <div id="view-success" class="hidden text-center">
        <div class="text-green-500 text-5xl mb-4">✅</div>
        <h2 class="text-2xl font-bold">報到成功！</h2>
        <p class="text-gray-500 mt-2">您的打卡資料已寫入資料庫。</p>
        <button onclick="goToHome()" class="btn btn-primary mt-6">返回主畫面</button>
    </div>
</div>

<script>
    // --- 請替換為您的 GAS 部署網址 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbweVh3vEeiQIIGPnizEFhNzTwxG_fxiSbR6YqydBgbhU-1LGKFtB7R0h9v_Yt_jUX_p/exec";
    
    let currentUser = { uuid: "", name: "", email: "" };
    let currentScanInfo = { project: "", scanId: "" };

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const p = params.get('p'); // Project
        const sid = params.get('sid'); // Scan ID

        // 如果網址含有打卡參數，進入報到模式
        if (p && sid) {
            currentScanInfo.project = decodeURIComponent(p);
            currentScanInfo.scanId = sid;
            showView('view-checkin');
            document.getElementById('checkin-project-name').innerText = currentScanInfo.project + " - 報到";
            document.getElementById('checkin-scan-id').innerText = "ID: " + sid;
            return;
        }

        if (puter.auth.isSignedIn()) {
            checkUserStatus();
        } else {
            showView('view-login');
        }
    }

    async function login() {
        await puter.auth.signIn();
        checkUserStatus();
    }

    async function logout() {
        puter.auth.signOut();
        location.reload();
    }

    async function checkUserStatus() {
        const user = await puter.auth.getUser();
        currentUser.uuid = user.uuid;
        currentUser.email = user.email || "";

        const resp = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'checkStatus', uuid: currentUser.uuid })
        });
        const result = await resp.json();

        if (result.status === "Approved") {
            currentUser.name = result.name;
            document.getElementById('display-user').innerText = "Hi, " + result.name;
            showView('view-main');
            loadProjects();
        } else if (result.status === "Pending") {
            showView('view-pending');
        } else {
            document.getElementById('apply-email').value = currentUser.email;
            showView('view-apply');
        }
    }

    async function submitApplication() {
        const name = document.getElementById('apply-name').value.trim();
        if (!name) return alert("請填寫姓名");

        const resp = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: 'apply', 
                uuid: currentUser.uuid, 
                email: currentUser.email, 
                name: name 
            })
        });
        const result = await resp.json();
        if (result.status === "Success") {
            alert("申請已送出，請等待管理者核可");
            showView('view-pending');
        }
    }

    async function loadProjects() {
        const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getProjectList' }) });
        const result = await resp.json();
        const select = document.getElementById('project-list');
        select.innerHTML = "";
        result.projects.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p;
            opt.innerText = p;
            select.appendChild(opt);
        });
    }

    function generateQR() {
        const project = document.getElementById('project-list').value;
        const scanId = "SID-" + Math.floor(Date.now() / 1000);
        const baseUrl = window.location.origin + window.location.pathname;
        const checkinUrl = `${baseUrl}?p=${encodeURIComponent(project)}&sid=${scanId}`;
        
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(checkinUrl)}`;
        
        document.getElementById('qr-img').src = qrUrl;
        document.getElementById('scan-id-text').innerText = "掃描 ID: " + scanId;
        document.getElementById('qr-display').classList.remove('hidden');
    }

    async function submitCheckIn() {
        const name = document.getElementById('checkin-name').value.trim();
        if (!name) return alert("請輸入姓名");

        // 如果是掃碼進入的，uuid 可以為匿名或系統臨時 ID，這裡為求簡化，報到時寫入姓名即可
        const resp = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: 'clockIn', 
                project: currentScanInfo.project,
                scanId: currentScanInfo.scanId,
                name: name,
                uuid: "SCANNER"
            })
        });
        const result = await resp.json();
        if (result.success) {
            showView('view-success');
        } else {
            alert("報到失敗：" + result.message);
        }
    }

    function showView(viewId) {
        ['view-login', 'view-apply', 'view-pending', 'view-main', 'view-checkin', 'view-success'].forEach(v => {
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(viewId).classList.remove('hidden');
    }

    function goToHome() {
        window.location.href = window.location.origin + window.location.pathname;
    }

    init();
</script>

</body>
</html>
