<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上考試系統 - 授權版</title>
    
    <!-- 引入外部資源 -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { 
            --primary-color: #46178f; 
            --bg-color: #f2f2f2;
            --exam-primary: #6c5ce7;
            --exam-success: #00b894;
            --exam-download: #0984e3;
            --exam-upload: #e17055;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 0; 
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 600px; 
            position: relative; 
            min-height: 500px;
        }

        /* 導覽列與標題 */
        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            margin-bottom: 25px; 
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .system-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 12px;
        }

        .logout-btn { 
            background-color: #fff; 
            color: #d9534f; 
            border: 1px solid #d9534f; 
            padding: 6px 12px; 
            font-size: 0.85rem; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .logout-btn:hover { background-color: #fdf7f7; }

        /* 驗證遮罩層 */
        #authOverlay { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: white; 
            border-radius: 12px; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 20px; 
        }

        .form-group { margin-bottom: 1.2rem; text-align: left; width: 100%; max-width: 350px; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .input-field { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .main-btn { 
            width: 100%; padding: 12px; 
            background-color: var(--primary-color); 
            color: white; border: none; border-radius: 6px; 
            font-size: 1.1rem; cursor: pointer; font-weight: bold; 
            margin-top: 10px; 
        }

        /* 考試系統內部元件樣式 */
        .hidden { display: none !important; }
        select, input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .exam-button { background: var(--exam-primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; transition: 0.3s; }
        .exam-button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-download { background: var(--exam-download); margin-top: 5px; }
        .btn-upload { background: var(--exam-upload); margin-top: 5px; }
        .admin-section { border-bottom: 2px dashed #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .option-btn { background: white; color: #333; border: 2px solid #eee; text-align: left; margin: 8px 0; width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; transition: 0.2s; }
        .option-btn:hover { border-color: var(--exam-primary); background: #f9f9ff; }
        .option-btn.selected { background: var(--exam-primary); color: white; border-color: var(--exam-primary); }
        #qr-container img { margin: 20px auto; border: 10px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 200px; height: 200px; }
        .progress { color: #666; font-size: 0.9rem; margin-bottom: 10px; text-align: right; }
        #question-text { font-size: 1.25rem; margin: 20px 0; line-height: 1.4; color: #2d3436; text-align: left; }
        .file-label { display: block; text-align: left; font-size: 0.85rem; color: #666; margin-top: 10px; }

        /* Loader */
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .footer { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <!-- 身份驗證遮罩層 -->
    <div id="authOverlay">
        <h2 id="authMsg" class="text-xl font-bold mb-4">請先登入 Google 帳號以使用系統</h2>
        <button id="authLoginBtn" class="main-btn" style="width:200px">登入 Google</button>
        
        <div id="applyForm" class="hidden" style="width:100%; max-width: 400px;">
            <p class="mb-4">您的帳號尚未獲得授權，請填寫申請資料：</p>
            <div class="form-group">
                <label>您的 Google 信箱</label>
                <input type="email" id="applyEmail" class="input-field" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>申請人姓名</label>
                <input type="text" id="applyName" class="input-field" placeholder="請輸入姓名">
            </div>
            <button id="applyBtn" class="main-btn">送出申請</button>
        </div>
    </div>

    <!-- 登入後顯示的主內容 -->
    <div id="mainContent" class="hidden">
        <div class="nav-header">
            <div class="system-title">線上考試系統</div>
            <button id="logoutBtn" class="logout-btn">登出帳號</button>
        </div>

        <!-- 考試系統檢視區 -->
        <div id="exam-container">
            <!-- 1. 管理者設定區 -->
            <div id="view-admin" class="hidden">
                <h2 class="text-xl font-bold mb-4 text-center">管理者設定</h2>
                <div class="admin-section">
                    <span class="file-label">上傳新題目 (Excel):</span>
                    <input type="file" id="upload-file" accept=".xlsx, .xls" class="mt-2 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100">
                    <button class="exam-button btn-upload" id="btn-do-upload" onclick="handleUpload()">上傳題目資料</button>
                </div>

                <div class="admin-section">
                    <select id="select-class" onchange="updateUnitDropdown()"><option>載入中...</option></select>
                    <select id="select-unit"><option>請先選擇班級</option></select>
                    <button class="exam-button" onclick="generateQRCode()">生成考試 QR-Code</button>
                    <button class="exam-button btn-download" onclick="downloadResults()">下載成績資料 (Excel)</button>
                </div>

                <div id="qr-container" class="hidden text-center">
                    <img id="qr-image" src="" alt="QR Code" class="mx-auto">
                    <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">請掃描 QR-Code 開始考試</p>
                </div>
            </div>

            <!-- 2. 學生登入區 -->
            <div id="view-student-login" class="hidden">
                <h2 id="exam-title" class="text-xl font-bold mb-4 text-center">載入考試資訊...</h2>
                <input type="text" id="pin-input" placeholder="請輸入您的 PIN 碼" inputmode="numeric">
                <button class="exam-button" onclick="studentLogin()">進入測驗</button>
            </div>

            <!-- 3. 測驗進行區 -->
            <div id="view-quiz" class="hidden">
                <div class="progress" id="quiz-progress"></div>
                <div id="question-text"></div>
                <div id="options-box"></div>
                <button id="btn-next" class="exam-button hidden" onclick="nextQuestion()">下一題</button>
                <button id="btn-submit" class="exam-button hidden" onclick="submitExam()" style="background: var(--exam-success);">提交試卷</button>
            </div>

            <!-- 4. 結果區 -->
            <div id="view-result" class="hidden text-center">
                <h2 style="color: var(--exam-success);" class="text-2xl font-bold">測驗結束</h2>
                <div id="result-stat" style="font-size: 1.5rem; margin: 20px 0;"></div>
                <button class="exam-button" onclick="location.reload()">返回首頁</button>
            </div>
        </div>

        <div class="footer">
            Powered by SheetJS & Puter.js<br>
            © 2026 chienmu.tai 保留所有權利
        </div>
    </div>
</div>

<!-- 載入中狀態 -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[2000]">
    <div class="bg-white p-8 rounded-2xl text-center shadow-2xl max-w-xs w-full">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mb-4 mx-auto"></div>
        <p id="loading-text" class="text-gray-800 font-bold">正在處理...</p>
    </div>
</div>

<script>
    // --- 授權驗證 GAS 與 考試系統 GAS ---
    const GAS_AUTH_URL = "https://script.google.com/macros/s/AKfycbwHobXSaxivNtdaPynrxehum0cRalWhZrTBQYNO4s0pID4Gb21IE3n5o14S2MHL2L8Eyg/exec"; 
    const GAS_EXAM_URL = "https://script.google.com/macros/s/AKfycbzCZWT4-jxE0wlUWknG6gA4DSAGbUsuTY--cNSwu79wgD1JgZFid_9bXxolYOvfgqqZ-w/exec"; 
    const BASE_URL = window.location.origin + window.location.pathname;

    let userUUID = "";
    let configData = {}; 
    let currentExam = { class: "", unit: "" };
    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let studentInfo = {};

    // --- 身份驗證邏輯 ---
    async function initAuth() {
        if (!puter.auth.isSignedIn()) {
            document.getElementById('authOverlay').classList.remove('hidden');
            return;
        }
        const user = await puter.auth.getUser();
        userUUID = user.uuid; 
        checkPermission(userUUID);
    }

    async function checkPermission(uuid) {
        document.getElementById('authMsg').innerText = "驗證授權中...";
        try {
            const resp = await fetch(GAS_AUTH_URL, {
                method: "POST",
                body: JSON.stringify({ action: "checkStatus", uuid: uuid })
            });
            const result = await resp.json();
            if (result.status === "Approved") {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                initExamSystem(); // 授權通過，啟動考試系統
            } else if (result.status === "Pending") {
                document.getElementById('authMsg').innerText = "申請審核中，請稍候。";
                document.getElementById('authLoginBtn').classList.add('hidden');
            } else {
                document.getElementById('authMsg').innerText = "帳號尚未獲得授權";
                document.getElementById('authLoginBtn').classList.add('hidden');
                document.getElementById('applyForm').classList.remove('hidden');
            }
        } catch (e) { console.error(e); }
    }

    document.getElementById('authLoginBtn').onclick = async () => { await puter.auth.signIn(); initAuth(); };
    document.getElementById('logoutBtn').onclick = () => { puter.auth.signOut(); location.reload(); };

    document.getElementById('applyBtn').onclick = async () => {
        const email = document.getElementById('applyEmail').value.trim();
        const name = document.getElementById('applyName').value.trim();
        if(!email || !name) return alert("請填寫完整資料");
        try {
            await fetch(GAS_AUTH_URL, {
                method: "POST",
                body: JSON.stringify({ action: "apply", uuid: userUUID, email: email, name: name })
            });
            document.getElementById('authMsg').innerText = "申請已送出！請等待管理員審核。";
            document.getElementById('applyForm').classList.add('hidden');
        } catch (e) { alert("提交失敗"); }
    };

    // --- 考試系統邏輯 ---
    function initExamSystem() {
        const params = new URLSearchParams(window.location.search);
        const c = params.get('c');
        const u = params.get('u');

        if (c && u) {
            currentExam = { class: decodeURIComponent(c), unit: decodeURIComponent(u) };
            showView('view-student-login');
            document.getElementById('exam-title').innerText = `${currentExam.class} - ${currentExam.unit}`;
        } else {
            showView('view-admin');
            fetchConfig();
        }
    }

    async function fetchConfig() {
        try {
            const res = await fetch(`${GAS_EXAM_URL}?action=getConfig`);
            configData = await res.json();
            const clsSelect = document.getElementById('select-class');
            clsSelect.innerHTML = '<option value="">選擇班級</option>';
            configData.classes.forEach(c => {
                clsSelect.innerHTML += `<option value="${c}">${c}</option>`;
            });
        } catch (e) { console.error(e); }
    }

    function updateUnitDropdown() {
        const cls = document.getElementById('select-class').value;
        const untSelect = document.getElementById('select-unit');
        untSelect.innerHTML = '<option value="">選擇單元</option>';
        if (configData.units[cls]) {
            configData.units[cls].forEach(u => {
                untSelect.innerHTML += `<option value="${u}">${u}</option>`;
            });
        }
    }

    function handleUpload() {
        const fileInput = document.getElementById('upload-file');
        if (fileInput.files.length === 0) return alert("請先選擇 Excel 檔案");
        const file = fileInput.files[0];
        const reader = new FileReader();
        const btn = document.getElementById('btn-do-upload');
        btn.disabled = true;
        btn.innerText = "處理中...";

        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            const dataRows = rows.slice(1).filter(r => r.length > 0);

            try {
                const res = await fetch(GAS_EXAM_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "uploadQuestions", rows: dataRows })
                });
                const result = await res.json();
                alert(result.message);
                if (result.success) location.reload();
            } catch (err) { alert("連線錯誤"); }
            finally { btn.disabled = false; btn.innerText = "上傳題目資料"; }
        };
        reader.readAsArrayBuffer(file);
    }

    function generateQRCode() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇班級與單元");
        const examUrl = `${BASE_URL}?c=${encodeURIComponent(c)}&u=${encodeURIComponent(u)}`;
        const qrImg = document.getElementById('qr-image');
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(examUrl)}`;
        document.getElementById('qr-container').classList.remove('hidden');
    }

    async function downloadResults() {
        const c = document.getElementById('select-class').value;
        const u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選擇班級與單元");
        const res = await fetch(GAS_EXAM_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getResults", className: c, unit: u })
        });
        const data = await res.json();
        if (data.length === 0) return alert("無成績資料");
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Results");
        XLSX.writeFile(wb, `${c}_${u}_成績.xlsx`);
    }

    async function studentLogin() {
        const pin = document.getElementById('pin-input').value.trim();
        const res = await fetch(GAS_EXAM_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", pin: pin, targetClass: currentExam.class })
        });
        const data = await res.json();
        if (data.success) {
            studentInfo = data;
            startQuiz();
        } else alert(data.message);
    }

    async function startQuiz() {
        showView('view-quiz');
        const res = await fetch(GAS_EXAM_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getQuestions", className: currentExam.class, unit: currentExam.unit })
        });
        quizData = await res.json();
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('quiz-progress').innerText = `題號: ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.question;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-submit').classList.add('hidden');
        q.options.forEach((text, i) => {
            if(!text) return;
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = text;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                userAnswers[currentIdx] = { question: q.question, userAns: i+1, correctAns: q.correct };
                if (currentIdx < quizData.length - 1) document.getElementById('btn-next').classList.remove('hidden');
                else document.getElementById('btn-submit').classList.remove('hidden');
            };
            box.appendChild(btn);
        });
    }

    function nextQuestion() { currentIdx++; renderQuestion(); }

    async function submitExam() {
        document.getElementById('view-quiz').innerHTML = "<h3 class='text-center'>正在提交...</h3>";
        const res = await fetch(GAS_EXAM_URL, {
            method: "POST",
            body: JSON.stringify({ action: "submitExam", name: studentInfo.name, className: studentInfo.className, unit: currentExam.unit, answers: userAnswers })
        });
        const result = await res.json();
        showView('view-result');
        document.getElementById('result-stat').innerText = `得分：${result.score}`;
    }

    function showView(viewId) {
        ['view-admin', 'view-student-login', 'view-quiz', 'view-result'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(viewId).classList.remove('hidden');
    }

    // 啟動身份驗證
    initAuth();
</script>

</body>
</html>
