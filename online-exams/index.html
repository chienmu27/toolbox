<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上考試工具箱 - 整合管理版</title>
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { 
            --primary-color: #46178f; --bg-color: #f2f2f5;
            --exam-primary: #6c5ce7; --exam-success: #00b894;
            --exam-download: #0984e3; --exam-upload: #e17055; --exam-danger: #d63031;
        }
        body { font-family: "Segoe UI", "PingFang TC", sans-serif; background-color: var(--bg-color); min-height: 100vh; margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 95%; max-width: 800px; position: relative; min-height: 550px; display: flex; flex-direction: column; }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; width: 95%; max-width: 800px; }
        .tab-btn { flex: 1; padding: 12px; background: #e0e0e0; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--primary-color); }
        .hidden { display: none !important; }
        .main-btn { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .main-btn:hover { opacity: 0.9; }
        .sys-title { font-size: 1.25rem; font-weight: bold; color: var(--primary-color); border-left: 4px solid var(--primary-color); padding-left: 12px; }
        .exam-input, .exam-select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .exam-button { color: white; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--exam-primary); }
        .btn-upload { background: var(--exam-upload); }
        .btn-download { background: var(--exam-download); }
        .btn-danger { background: var(--exam-danger); }
        .option-btn { background: white; border: 2px solid #eee; text-align: left; margin: 8px 0; width: 100%; padding: 15px; border-radius: 8px; }
        .option-btn.selected { background: var(--exam-primary); color: white; }
        #authOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 12px; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; box-sizing: border-box; }
        .file-upload-area { border: 3px dashed #bbb; padding: 20px; background: #fafafa; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .file-upload-area.dragover { border-color: var(--primary-color); background: #f0f0f5; transform: scale(1.02); }
        .report-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 1rem; }
        #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .template-link { font-size: 0.8rem; color: #46178f; text-decoration: underline; margin-left: 8px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 8px 12px; border-radius: 6px; margin-top: 6px; border: 1px solid #e9ecef; }
        .file-item span { font-size: 0.85rem; color: #495057; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        .file-remove { color: #d63031; cursor: pointer; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div id="topNav" class="tab-nav hidden">
    <button id="tab-btn-exam" class="tab-btn active" onclick="switchTab('exam')">線上考試系統</button>
    <button id="tab-btn-gen" class="tab-btn" onclick="switchTab('gen')">AI 自動出題</button>
    <button id="tab-btn-report" class="tab-btn" onclick="switchTab('report')">報告</button>
</div>

<div class="container">
    <div id="authOverlay">
        <div class="max-w-md w-full">
            <div id="loginArea">
                <h2 id="authMsg" class="text-2xl font-bold mb-6 text-gray-800">請先登入 Google 帳號</h2>
                <button id="authLoginBtn" class="main-btn max-w-[280px] mx-auto block">登入 Google 帳號</button>
            </div>
            <div id="applyForm" class="hidden w-full mt-6 pt-6 border-t border-gray-100">
                <p class="mb-4 text-red-600 font-medium">您的帳號尚未獲得管理授權：</p>
                <input type="email" id="applyEmail" class="exam-input" placeholder="Google 信箱">
                <input type="text" id="applyName" class="exam-input" placeholder="姓名">
                <button id="applyBtn" class="main-btn mt-4">送出授權申請</button>
                <button id="backToLoginBtn" class="mt-4 text-gray-500 hover:text-gray-700 text-sm font-medium">返回登入頁面</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div id="topHeaderUI" class="flex justify-between items-center mb-6 border-bottom pb-4 border-b-2 border-gray-100">
            <div id="sysIndicator" class="sys-title">線上考試工具箱</div>
            <div class="flex items-center gap-3">
                <span id="userNameDisplay" class="text-sm font-bold text-gray-600"></span>
                <button id="logoutBtn" class="text-red-500 text-sm border border-red-500 px-3 py-1 rounded hover:bg-red-50 transition">登出</button>
            </div>
        </div>

        <div id="view-exam-tab">
            <div id="examView">
                <div id="view-admin" class="hidden">
                    <h2 class="text-xl font-bold mb-4 text-center">後台管理</h2>
                    <div class="border-b-2 border-dashed border-gray-100 pb-4 mb-4">
                        <div class="flex items-center mb-2">
                            <label class="text-sm font-bold text-gray-600">上傳資料 (Excel):</label>
                            <a href="https://docs.google.com/spreadsheets/d/1dlSe0vY3mp0FDEVAJl7xdDsIZnCRFzy8/edit?usp=drive_link&ouid=108254074880701854581&rtpof=true&sd=true" target="_blank" class="template-link">題庫範本</a>
                            <a href="https://docs.google.com/spreadsheets/d/1-5Vo-i3Hy0XgsKVIqiedGIIYvi3JMLLN/edit?usp=drive_link&ouid=108254074880701854581&rtpof=true&sd=true" target="_blank" class="template-link">名單範本</a>
                        </div>
                        <div class="flex gap-4 mb-2">
                            <label class="flex items-center text-sm cursor-pointer"><input type="radio" name="uploadType" value="questions" checked class="mr-1"> 上傳新題目</label>
                            <label class="flex items-center text-sm cursor-pointer"><input type="radio" name="uploadType" value="users" class="mr-1"> 上傳學生名單</label>
                        </div>
                        <input type="file" id="upload-file" accept=".xlsx, .xls" class="exam-input">
                        <button class="exam-button btn-upload" onclick="handleUpload()">執行資料上傳</button>
                    </div>
                    <div>
                        <select id="select-class" onchange="updateUnitDropdown()" class="exam-select"><option>載入中...</option></select>
                        <select id="select-unit" class="exam-select"><option>請選擇班級</option></select>
                        <div class="grid grid-cols-1 gap-2 mt-2">
                            <button class="exam-button btn-primary" onclick="generateQRCode()">生成考試 QR-Code</button>
                            <button class="exam-button btn-danger" onclick="confirmDelete()">刪除該單元題庫資料</button>
                        </div>
                    </div>
                    <div id="qr-container" class="hidden text-center mt-4">
                        <p class="text-xs text-indigo-600 font-bold mb-2" id="qr-id-display"></p>
                        <img id="qr-image" class="mx-auto border-8 border-white shadow-lg cursor-zoom-in w-44" onclick="toggleQRModal(true)">
                    </div>
                </div>

                <div id="view-student-login" class="hidden">
                    <h2 id="exam-title" class="text-2xl font-bold mb-6 text-center text-gray-800 whitespace-pre-line">載入中...</h2>
                    <div class="bg-gray-50 p-6 rounded-xl">
                        <label class="block text-gray-600 mb-2 font-medium">請輸入您的 PIN 碼：</label>
                        <input type="text" id="pin-input" placeholder="班級+座號，例如：50319" class="exam-input text-center text-xl tracking-widest">
                        <button class="exam-button btn-primary mt-4 py-4 text-lg" onclick="studentLogin()">進入測驗</button>
                    </div>
                </div>

                <div id="view-quiz" class="hidden">
                    <div class="text-right text-sm text-gray-500 mb-2" id="quiz-progress"></div>
                    <div id="question-text" class="text-xl font-medium mb-6 leading-relaxed"></div>
                    <div id="options-box"></div>
                    <button id="btn-next" class="exam-button btn-primary hidden py-4" onclick="nextQuestion()">下一題</button>
                    <button id="btn-submit" class="exam-button hidden py-4" onclick="submitExam()" style="background: var(--exam-success);">提交試卷</button>
                </div>

                <div id="view-result" class="hidden text-center">
                    <h2 class="text-2xl font-bold text-green-600">測驗已提交</h2>
                    <div id="result-stat" class="text-4xl font-black my-6"></div>
                    <p class="text-gray-500 mb-4">若需重新測驗，請重新掃描 QR-Code</p>
                </div>
            </div>
        </div>

        <!-- AI 出題分頁 (雙模式修正) -->
        <div id="view-gen-tab" class="hidden">
            <h1 class="text-2xl font-bold text-indigo-900 text-center mb-6">AI 出題工具 (Gemini 引擎)</h1>
            
            <!-- 模式切換 -->
            <div class="mb-4 p-4 bg-indigo-50 rounded-lg border border-indigo-100">
                <label class="font-bold block mb-2 text-indigo-800">出題模式：</label>
                <div class="flex gap-6">
                    <label class="flex items-center cursor-pointer text-sm font-medium">
                        <input type="radio" name="aiOpMode" value="generate" checked class="mr-2" onchange="toggleAiUI()"> AI 主動生成題目
                    </label>
                    <label class="flex items-center cursor-pointer text-sm font-medium">
                        <input type="radio" name="aiOpMode" value="convert" class="mr-2" onchange="toggleAiUI()"> 轉換上傳題目
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><label class="font-bold block mb-1">班級</label><input type="text" id="gen-className" class="exam-input" placeholder="例如：503" /></div>
                <div><label class="font-bold block mb-1">單元</label><input type="text" id="gen-unitName" class="exam-input" placeholder="例如：第一單元" /></div>
            </div>

            <!-- 動態顯示區域 -->
            <div id="area-generate">
                <div class="mb-4">
                    <label class="font-bold block mb-1">1. 題目主題</label>
                    <input type="text" id="gen-topic" class="exam-input" placeholder="例如：國語、數學、自然科學..." />
                </div>
                <div class="mb-4">
                    <label class="font-bold block mb-1">2. 出題提示語 (選填)</label>
                    <textarea id="gen-hint" class="exam-input" rows="2" placeholder="國小六年級、難度適中..."></textarea>
                </div>
                <div class="mb-6">
                    <label class="font-bold block mb-1">3. 設定題數</label>
                    <input type="number" id="gen-count" class="exam-input w-24" value="5" min="1" max="20" />
                </div>
            </div>

            <div id="area-convert" class="hidden">
                <div class="mb-4 p-4 bg-yellow-50 text-yellow-800 text-xs rounded border border-yellow-200">
                    💡 提示：此模式會從您上傳的檔案中【提取】已存在的題目與解答，不需輸入主題。
                </div>
            </div>

            <div class="mb-4">
                <label class="font-bold block mb-1">上傳參考/原始檔案 (支援拖曳)</label>
                <div id="gen-drop-zone" class="file-upload-area">
                    <p class="text-gray-600 font-bold mb-1">點擊或拖放檔案至此區域</p>
                    <p class="text-xs text-gray-400">支援：TXT, PDF, Word, Excel, 圖片</p>
                    <input type="file" id="gen-refFile" class="hidden" multiple accept=".txt, .csv, .xlsx, .xls, .docx, .doc, .pdf, image/*" />
                </div>
                <div id="gen-file-list" class="mt-2 space-y-1"></div>
            </div>

            <button id="generateBtn" class="main-btn">開始 AI 處理並下載 Excel</button>
            <div id="gen-status" class="mt-4 text-center text-sm font-bold text-gray-600">系統就緒</div>
        </div>

        <div id="view-report-tab" class="hidden">
            <h2 class="text-xl font-bold mb-6 text-center">答題報告</h2>
            <div id="report-container" class="space-y-4"></div>
        </div>

        <div id="footerUI" class="mt-auto pt-6 border-t border-gray-100 text-center text-xs text-gray-400">
            線上考試工具箱 © 2025 chienmu.tai<br>Powered by Puter.js & Google Gemini
        </div>
    </div>
</div>

<div id="qr-modal" onclick="toggleQRModal(false)"><img id="qr-image-large" src=""></div>
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[2000]"><div class="bg-white p-8 rounded-2xl text-center shadow-2xl"><div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mx-auto mb-4"></div><p id="loading-text" class="text-gray-800 font-bold">處理中...</p></div></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwUMawcsle5jrve_w-LbAhG7-OZyVIArf6SZqbrL4yGq2nROfty6dnAFX2xsIy-ZW0f/exec"; 
    const BASE_URL = window.location.origin + window.location.pathname;

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let userUUID = "", userSSID = "", configData = {}, currentExam = { class: "", unit: "", qrId: "" };
    let quizData = [], currentIdx = 0, userAnswers = [], studentInfo = {};
    let genAttachedFiles = [];

    async function initSystem() {
        const params = new URLSearchParams(window.location.search);
        const c = params.get('c'), u = params.get('u'), qid = params.get('qid'), sid = params.get('sid');
        if (c && u && sid) {
            userSSID = sid;
            document.getElementById('topNav').classList.add('hidden');
            document.getElementById('topHeaderUI').classList.add('hidden');
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            currentExam = { class: decodeURIComponent(c), unit: decodeURIComponent(u), qrId: qid || "MANUAL" };
            showExamSubView('view-student-login');
            document.getElementById('exam-title').innerText = `${currentExam.class}\n${currentExam.unit}`;
        } else { checkAdminAuth(); }
    }

    async function checkAdminAuth() {
        if (!puter.auth.isSignedIn()) { 
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('loginArea').classList.remove('hidden');
            document.getElementById('applyForm').classList.add('hidden');
            return; 
        }
        const user = await puter.auth.getUser(); userUUID = user.uuid;
        showLoading("驗證權限中...");
        try {
            const resp = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "checkStatus", uuid: userUUID }) });
            const result = await resp.json();
            hideLoading();
            if (result.status === "Approved") {
                userSSID = result.ssId;
                document.getElementById('userNameDisplay').innerText = result.userName || "管理員";
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('topNav').classList.remove('hidden');
                fetchConfig();
            } else { 
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('applyForm').classList.remove('hidden');
                document.getElementById('authMsg').innerText = (result.status === "Pending") ? "您的帳號授權申請正在審核中" : "您的帳號尚未獲得管理授權";
            }
        } catch (e) { hideLoading(); alert("連線錯誤"); }
    }

    function switchTab(tab) {
        ['exam', 'gen', 'report'].forEach(t => {
            document.getElementById(`tab-btn-${t}`).classList.toggle('active', tab === t);
            document.getElementById(`view-${t}-tab`).classList.toggle('hidden', tab !== t);
        });
        if (tab === 'report') loadReports();
    }

    async function fetchConfig() {
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getConfig", ssId: userSSID }) });
            configData = await res.json();
            const clsSelect = document.getElementById('select-class');
            clsSelect.innerHTML = '<option value="">選擇班級</option>';
            if (configData.classes) configData.classes.forEach(c => clsSelect.innerHTML += `<option value="${c}">${c}</option>`);
            showExamSubView('view-admin');
        } catch (e) { console.error(e); }
    }

    function updateUnitDropdown() {
        const cls = document.getElementById('select-class').value;
        const untSelect = document.getElementById('select-unit');
        untSelect.innerHTML = '<option value="">選擇單元</option>';
        if (configData.units && configData.units[cls]) configData.units[cls].forEach(u => untSelect.innerHTML += `<option value="${u}">${u}</option>`);
    }

    async function handleUpload() {
        const fileInput = document.getElementById('upload-file');
        const uploadType = document.querySelector('input[name="uploadType"]:checked').value;
        if (fileInput.files.length === 0) return alert("請選擇 Excel 檔案");
        const reader = new FileReader();
        showLoading("資料處理中...");
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 }).filter(r => r.length > 0);
            const dataRows = rows.slice(1);
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "uploadData", ssId: userSSID, type: uploadType, rows: dataRows }) });
                const result = await res.json();
                hideLoading();
                alert(result.message || "處理成功");
                if (uploadType === 'questions') fetchConfig();
            } catch (err) { hideLoading(); alert("上傳失敗"); }
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function generateQRCode() {
        const c = document.getElementById('select-class').value, u = document.getElementById('select-unit').value;
        if (!c || !u) return alert("請選取單元");
        const qrId = "QR" + Date.now();
        const examUrl = `${BASE_URL}?c=${encodeURIComponent(c)}&u=${encodeURIComponent(u)}&sid=${userSSID}&qid=${qrId}?openExternalBrowser=1`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(examUrl)}`;
        document.getElementById('qr-image').src = qrUrl;
        document.getElementById('qr-image-large').src = qrUrl;
        document.getElementById('qr-id-display').innerText = "考試編號：" + qrId;
        document.getElementById('qr-container').classList.remove('hidden');
    }

    async function studentLogin() {
        const pin = document.getElementById('pin-input').value.trim();
        if (!pin) return alert("請輸入 PIN 碼");
        showLoading("驗證中...");
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "login", ssId: userSSID, pin: pin, targetClass: currentExam.class }) });
        const data = await res.json(); hideLoading();
        if (data.success) { studentInfo = data; startQuiz(); } else alert(data.message);
    }

    async function startQuiz() {
        showExamSubView('view-quiz'); showLoading("載入中...");
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getQuestions", ssId: userSSID, className: currentExam.class, unit: currentExam.unit }) });
        quizData = await res.json(); hideLoading(); renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('quiz-progress').innerText = `題號: ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.question;
        const box = document.getElementById('options-box'); box.innerHTML = "";
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-submit').classList.add('hidden');
        q.options.forEach((text, i) => {
            if(!text) return;
            const btn = document.createElement('button');
            btn.className = 'option-btn font-medium';
            btn.innerText = text;
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                userAnswers[currentIdx] = { question: q.question, userAns: i+1, correctAns: q.correct };
                if (currentIdx < quizData.length - 1) document.getElementById('btn-next').classList.remove('hidden');
                else document.getElementById('btn-submit').classList.remove('hidden');
            };
            box.appendChild(btn);
        });
    }

    function nextQuestion() { currentIdx++; renderQuestion(); }

    async function submitExam() {
        showLoading("提交中...");
        const localScore = Math.round((userAnswers.filter(a => String(a.userAns)===String(a.correctAns)).length/quizData.length)*100);
        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "submitExam", ssId: userSSID, name: studentInfo.name, seatNumber: studentInfo.seatNumber, className: studentInfo.className, unit: currentExam.unit, qrId: currentExam.qrId, answers: userAnswers })
            });
            const result = await response.json();
            hideLoading(); 
            if (result.success) {
                showExamSubView('view-result');
                document.getElementById('result-stat').innerText = `得分：${result.score !== undefined ? result.score : localScore}`;
            } else alert("提交失敗：" + result.message);
        } catch (e) { hideLoading(); alert("寫入失敗"); }
    }

    async function loadReports() {
        const container = document.getElementById('report-container');
        container.innerHTML = "<p class='text-center'>載入中...</p>";
        try {
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getReportSummary", ssId: userSSID }) });
            const data = await res.json(); container.innerHTML = "";
            if (!data || data.length === 0) { container.innerHTML = "<p class='text-center'>尚無資料</p>"; return; }
            data.forEach(rep => {
                const card = document.createElement('div');
                card.className = "report-card";
                card.innerHTML = `<div class="mb-4"><div class="text-xs font-bold text-indigo-500">${rep.qrId}</div><div class="text-lg font-bold text-gray-800">${rep.className} - ${rep.unit}</div><div class="text-sm text-gray-500">時間：${rep.time} | 作答人數：${rep.count}</div></div><div class="grid grid-cols-3 gap-2"><button class="exam-button btn-download text-xs" onclick="downloadReportById('${rep.qrId}', 'results')">成績表</button><button class="exam-button btn-download text-xs" onclick="downloadReportById('${rep.qrId}', 'logs')">答題紀錄</button><button class="exam-button btn-danger text-xs" onclick="deleteReportRecord('${rep.qrId}')">刪除紀錄</button></div>`;
                container.appendChild(card);
            });
        } catch (e) { container.innerHTML = "載入失敗"; }
    }

    async function downloadReportById(qrId, type) {
        showLoading("準備檔案...");
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "downloadById", ssId: userSSID, qrId: qrId, type: type }) });
        saveExcel(await res.json(), `報告_${qrId}.xlsx`);
        hideLoading();
    }

    async function deleteReportRecord(qrId) {
        if (!confirm(`確定要刪除紀錄 ${qrId}？`)) return;
        showLoading("刪除中...");
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "deleteByQrId", ssId: userSSID, qrId: qrId }) });
        loadReports(); hideLoading();
    }

    async function confirmDelete() {
        const c = document.getElementById('select-class').value, u = document.getElementById('select-unit').value;
        if (!c || !u || !confirm(`刪除 ${c} - ${u} 題庫？`)) return;
        showLoading("刪除中...");
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "deleteQuestions", ssId: userSSID, className: c, unit: u }) });
        fetchConfig(); hideLoading();
    }

    function saveExcel(data, filename) {
        const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sheet1"); XLSX.writeFile(wb, filename);
    }

    function downloadExamExcel(qs, cls, unt) {
        if (!qs || qs.length === 0) {
            alert("AI 未能解析到有效題目，請檢查參考檔案內容。");
            return;
        }
        const rows = qs.map(q => [cls, unt, q.q, q.a1, q.a2, q.a3, q.a4, q.ans]);
        const ws = XLSX.utils.aoa_to_sheet([["班級", "單元", "題目", "選項1", "選項2", "選項3", "選項4", "正確答案"], ...rows]);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "題庫");
        XLSX.writeFile(wb, `題庫_${cls}_${unt}.xlsx`);
    }

    // --- AI 出題模式切換與拖曳處理 ---

    function toggleAiUI() {
        const mode = document.querySelector('input[name="aiOpMode"]:checked').value;
        document.getElementById('area-generate').classList.toggle('hidden', mode !== 'generate');
        document.getElementById('area-convert').classList.toggle('hidden', mode !== 'convert');
    }

    const dropZone = document.getElementById('gen-drop-zone');
    const fileInput = document.getElementById('gen-refFile');

    dropZone.onclick = () => fileInput.click();

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
    });

    ['dragenter', 'dragover'].forEach(name => {
        dropZone.addEventListener(name, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        handleAIReferenceFiles(files);
    }, false);

    fileInput.onchange = (e) => handleAIReferenceFiles(e.target.files);

    async function handleAIReferenceFiles(files) {
        if (!files.length) return;
        showLoading("解析檔案中...");
        for (let file of Array.from(files)) {
            const parsed = await parseFileContent(file);
            genAttachedFiles.push(parsed);
        }
        renderGenFileList();
        hideLoading();
    }

    async function parseFileContent(file) {
        const name = file.name.toLowerCase();
        return new Promise((resolve) => {
            const reader = new FileReader();
            if (name.endsWith('.pdf')) {
                reader.onload = async (e) => {
                    const typedarray = new Uint8Array(e.target.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(s => s.str).join(" ") + "\n";
                    }
                    resolve({ type: 'text', name: file.name, content: fullText });
                };
                reader.readAsArrayBuffer(file);
            } else if (name.endsWith('.docx')) {
                reader.onload = (e) => mammoth.extractRawText({ arrayBuffer: e.target.result }).then(r => resolve({ type: 'text', name: file.name, content: r.value }));
                reader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/')) {
                reader.onload = (e) => resolve({ type: 'image', name: file.name, content: e.target.result });
                reader.readAsDataURL(file);
            } else {
                reader.onload = (e) => resolve({ type: 'text', name: file.name, content: e.target.result });
                reader.readAsText(file);
            }
        });
    }

    function renderGenFileList() {
        const listDiv = document.getElementById('gen-file-list');
        listDiv.innerHTML = "";
        genAttachedFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = "file-item";
            item.innerHTML = `<span>📄 ${file.name}</span><span class="file-remove" onclick="removeGenFile(${index})">×</span>`;
            listDiv.appendChild(item);
        });
    }

    window.removeGenFile = (index) => {
        genAttachedFiles.splice(index, 1);
        renderGenFileList();
    };

    document.getElementById('generateBtn').onclick = async () => {
        const opMode = document.querySelector('input[name="aiOpMode"]:checked').value;
        const topic = document.getElementById('gen-topic').value.trim();
        const hint = document.getElementById('gen-hint').value.trim();
        const count = document.getElementById('gen-count').value;
        const cls = document.getElementById('gen-className').value || "未命名班級";
        const unt = document.getElementById('gen-unitName').value || "未命名單元";

        if (opMode === 'generate' && !topic && genAttachedFiles.length === 0) return alert("主動生成模式請輸入主題或上傳參考檔");
        if (opMode === 'convert' && genAttachedFiles.length === 0) return alert("轉換模式請至少上傳一個包含題目的檔案");

        const status = document.getElementById('gen-status');
        status.innerText = "Gemini AI 處理中，請稍候...";
        
        try {
            let textContext = "";
            let images = [];
            genAttachedFiles.forEach(f => {
                if (f.type === 'text') textContext += `\n--- 內容來自 (${f.name}) ---\n${f.content}`;
                else if (f.type === 'image') images.push(f.content);
            });

            let prompt = "";
            if (opMode === 'generate') {
                prompt = `你是一位專業老師。請根據參考內容或主題出 ${count} 題「全新」選擇題。
【要求】隨機分配正確答案編號(ans)在1-4之間。
格式：直接輸出 JSON 陣列。
[{"q":"題目","a1":"選項1","a2":"選項2","a3":"選項3","a4":"選項4","ans":1-4}]
主題：${topic}
提示：${hint}
內容：${textContext || "通用知識"}`;
            } else {
                prompt = `你是一個文件提取專家。請從提供的參考內容中【提取所有既有的選擇題】。
【嚴格要求】
1. 完整提取原始題目、四個選項及正確答案。
2. 若題目未標註正確答案，請根據內容判斷正確的一項。
3. 不要產生新題目，僅做整理。
格式：直接輸出 JSON 陣列。
[{"q":"題目","a1":"選項1","a2":"選項2","a3":"選項3","a4":"選項4","ans":1-4}]
內容：${textContext}`;
            }

            let response;
            if (images.length > 0) {
                const messages = [{ role: "user", content: [{ type: "text", text: prompt }, ...images.map(img => ({ type: "image_url", image_url: { url: img } }))] }];
                response = await puter.ai.chat(messages);
            } else {
                response = await puter.ai.chat(prompt);
            }

            let raw = response.toString().trim();
            const jsonMatch = raw.match(/\[[\s\S]*\]/);
            if (!jsonMatch) throw new Error("AI 回傳格式不正確");
            
            const parsedData = JSON.parse(jsonMatch[0]);
            downloadExamExcel(parsedData, cls, unt);
            status.innerText = "✅ 處理成功！";
        } catch (e) {
            console.error(e);
            status.innerText = "❌ 失敗：" + e.message;
        }
    };

    function showExamSubView(id) {
        ['view-admin', 'view-student-login', 'view-quiz', 'view-result'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function showLoading(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading-overlay').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
    function toggleQRModal(s) { document.getElementById('qr-modal').style.display = s ? 'flex' : 'none'; }
    
    document.getElementById('authLoginBtn').onclick = async () => {
        try { await puter.auth.signIn(); checkAdminAuth(); } catch (e) { console.error(e); }
    };
    
    document.getElementById('logoutBtn').onclick = () => { puter.auth.signOut(); location.reload(); };
    document.getElementById('backToLoginBtn').onclick = () => {
        document.getElementById('applyForm').classList.add('hidden');
        document.getElementById('loginArea').classList.remove('hidden');
        document.getElementById('authMsg').innerText = "請先登入 Google 帳號";
    };
    document.getElementById('applyBtn').onclick = async () => {
        const email = document.getElementById('applyEmail').value;
        const name = document.getElementById('applyName').value;
        if(!email || !name) return alert("請填寫資訊");
        showLoading("送出中...");
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "apply", uuid: userUUID, email, name }) });
        hideLoading(); alert("申請已送出"); location.reload();
    };

    initSystem();
</script>
