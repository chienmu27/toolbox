<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot 綜合工具箱</title>
    <!-- 引入外部資源 -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary-color: #46178f; 
            --secondary-color: #250850; 
            --success-color: #108548; 
            --danger-color: #e21b3c; 
            --bg-color: #f2f2f2;
        }

        body { 
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 0; 
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 700px; 
            position: relative; 
            min-height: 500px;
        }

        /* 導覽列與按鈕樣式 */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px; /* 加大與下方內容的間距 */
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .tab-group {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: 2px solid var(--primary-color);
            background: white;
            color: var(--primary-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .logout-btn { 
            background-color: #fff; 
            color: #666; 
            border: 1px solid #ccc; 
            padding: 6px 12px; 
            font-size: 0.85rem; 
            border-radius: 4px; 
            cursor: pointer; 
            margin-left: 20px; /* 確保與分頁按鈕有足夠距離 */
        }
        .logout-btn:hover { background-color: #f0f0f0; }

        /* 遮罩層 */
        #authOverlay { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: white; 
            border-radius: 12px; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        h1, h2 { color: var(--primary-color); text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .main-btn { 
            width: 100%; padding: 12px; 
            background-color: var(--primary-color); 
            color: white; border: none; border-radius: 6px; 
            font-size: 1.1rem; cursor: pointer; font-weight: bold; 
            margin-top: 10px; 
        }
        .main-btn:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.8; }
        
        .download-again-btn { 
            width: 100%; padding: 12px; 
            background-color: var(--success-color); 
            color: white; border: none; border-radius: 6px; 
            font-size: 1.1rem; cursor: pointer; font-weight: bold; 
            margin-top: 10px; display: none; 
        }

        #status { margin-top: 1rem; text-align: center; color: #555; font-size: 0.9rem; }
        .footer { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #888; }
        .note { font-size: 13px; color: #666; margin-top: 15px; line-height: 1.5; }
        .hidden { display: none !important; }

        /* 成績計算器專用樣式修正 */
        #calculatorView input[type="file"] { margin: 20px 0; border: 1px dashed #ccc; padding: 20px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <!-- 身份驗證遮罩層 -->
    <div id="authOverlay">
        <h2 id="authMsg">請先登入 Google 帳號</h2>
        <button id="authLoginBtn" class="main-btn" style="width:200px">登入 Google</button>
        
        <div id="applyForm" class="hidden" style="width:100%">
            <p>您的帳號尚未獲得授權，請填寫申請資料：</p>
            <div class="form-group">
                <label>您的 Google 信箱</label>
                <input type="email" id="applyEmail" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>申請人姓名</label>
                <input type="text" id="applyName" placeholder="請輸入姓名">
            </div>
            <button id="applyBtn" class="main-btn">送出申請</button>
        </div>
    </div>

    <!-- 登入後顯示的主內容區 -->
    <div id="mainContent" class="hidden">
        <div class="nav-header">
            <div class="tab-group">
                <button class="tab-btn active" onclick="switchTab('generator')">AI 生成器</button>
                <button class="tab-btn" onclick="switchTab('calculator')">成績計算器</button>
            </div>
            <button id="logoutBtn" class="logout-btn">登出帳號</button>
        </div>

        <!-- 區塊一：AI 生成器 -->
        <div id="generatorView">
            <h1>Kahoot AI 生成器</h1>
            <div class="form-group">
                <label>題目主題</label>
                <input type="text" id="topic" placeholder="例如：自然科學、數學、社會、英語..." />
            </div>
            <div class="form-group">
                <label>出題提示語 / 額外要求 (選填)</label>
                <textarea id="hint" rows="2" placeholder="例如：國小中年級社會、難度要深一點、語氣要幽默、著重於歷史事件..."></textarea>
            </div>
            <div class="form-group">
                <label>題數</label>
                <input type="number" id="count" value="5" />
            </div>
            <div class="form-group">
                <label>答題時間</label>
                <select id="timeLimit">
                    <option value="5">5 秒</option>
                    <option value="10">10 秒</option>
                    <option value="15">15 秒</option>
                    <option value="20" selected>20 秒</option>
                    <option value="30">30 秒</option>
                    <option value="45">45 秒</option>
                    <option value="60">1 分鐘</option>
                    <option value="90">1 分鐘 30 秒</option>
                    <option value="120">2 分鐘</option>
                </select>
            </div>

            <button id="generateBtn" class="main-btn">開始 AI 生成題目</button>
            <button id="reDownloadBtn" class="download-again-btn">再次下載最後產出的 Excel 檔</button>
            <div id="status">準備就緒</div>
        </div>

        <!-- 區塊二：成績計算器 -->
        <div id="calculatorView" class="hidden">
            <h1>Kahoot 成績計算工具</h1>
            <div style="text-align: center;">
                <p>請上傳 Kahoot 原始下載的報告 Excel 檔案<br>(須包含 "Final Scores" 工作表)</p>
                <input type="file" id="upload" accept=".xlsx, .xls" />
                <button class="main-btn" onclick="processExcel()">轉換並下載計算後的 Excel</button>
                <div class="note">
                    <strong>計算邏輯：</strong><br>
                    1. 自動抓取 Final Scores 分頁數據。<br>
                    2. 計算公式：(正確數 / 總題數) * 100。<br>
                    3. 結果依 Player (學號/名稱) 由小至大排序。
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by Google Gemini & SheetJS<br>
            © 2026 chienmu.tai 保留所有權利
        </div>
    </div>
</div>

<script>
    // --- 基礎設定與授權變數 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwUMawcsle5jrve_w-LbAhG7-OZyVIArf6SZqbrL4yGq2nROfty6dnAFX2xsIy-ZW0f/exec"; 
    let userUUID = "";
    let lastGeneratedQuestions = null;

    // --- 身份驗證邏輯 ---
    async function initAuth() {
        if (!puter.auth.isSignedIn()) {
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
            return;
        }
        const user = await puter.auth.getUser();
        userUUID = user.uuid; 
        checkPermission(userUUID);
    }

    async function checkPermission(uuid) {
        document.getElementById('authMsg').innerText = "檢查授權狀態...";
        try {
            const resp = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "checkStatus", uuid: uuid })
            });
            const result = await resp.json();
            if (result.status === "Approved") {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
            } else if (result.status === "Pending") {
                document.getElementById('authMsg').innerText = "申請審核中，請稍候。";
                document.getElementById('authLoginBtn').classList.add('hidden');
            } else {
                document.getElementById('authMsg').innerText = "帳號未授權";
                document.getElementById('authLoginBtn').classList.add('hidden');
                document.getElementById('applyForm').classList.remove('hidden');
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById('authMsg').innerText = "連線檢查失敗，請重試。";
        }
    }

    document.getElementById('applyBtn').onclick = async () => {
        const email = document.getElementById('applyEmail').value.trim();
        const name = document.getElementById('applyName').value.trim();
        if(!email || !name) return alert("請填寫完整資料");

        document.getElementById('applyBtn').disabled = true;
        document.getElementById('authMsg').innerText = "提交中...";
        try {
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "apply", uuid: userUUID, email: email, name: name })
            });
            document.getElementById('authMsg').innerText = "申請已送出！請等待審核。";
            document.getElementById('applyForm').classList.add('hidden');
        } catch (e) { alert("提交失敗"); }
    };

    document.getElementById('authLoginBtn').onclick = async () => {
        await puter.auth.signIn();
        initAuth();
    };

    document.getElementById('logoutBtn').onclick = () => {
        puter.auth.signOut();
        location.reload();
    };

    // --- 分頁切換邏輯 ---
    function switchTab(tab) {
        const genView = document.getElementById('generatorView');
        const calcView = document.getElementById('calculatorView');
        const btns = document.querySelectorAll('.tab-btn');

        btns.forEach(btn => btn.classList.remove('active'));

        if (tab === 'generator') {
            genView.classList.remove('hidden');
            calcView.classList.add('hidden');
            btns[0].classList.add('active');
        } else {
            genView.classList.add('hidden');
            calcView.classList.remove('hidden');
            btns[1].classList.add('active');
        }
    }

    // --- 功能一：AI 生成題目邏輯 ---
    document.getElementById('generateBtn').onclick = async () => {
        const genBtn = document.getElementById('generateBtn');
        const statusTxt = document.getElementById('status');
        
        const topic = document.getElementById('topic').value.trim();
        const hint = document.getElementById('hint').value.trim();
        const count = document.getElementById('count').value;
        const timeLimit = document.getElementById('timeLimit').value;

        if (!topic) return alert("請輸入主題");

        genBtn.disabled = true;
        statusTxt.innerText = "AI 正在思考與生成題目中，請稍候...";
        
        try {
            const prompt = `請幫我出 ${count} 題關於「${topic}」的選擇題。${hint}。格式為 JSON 陣列，包含 q, a1, a2, a3, a4, ans(1-4)。`;
            const response = await puter.ai.chat(prompt);
            let rawData = response.toString().replace(/```json/g, '').replace(/```/g, '').trim();
            const questions = JSON.parse(rawData);
            
            lastGeneratedQuestions = questions;
            downloadKahootExcel(questions, timeLimit, topic);
            
            statusTxt.innerText = "題目生成完成並已啟動下載！";
            document.getElementById('reDownloadBtn').style.display = "block";
        } catch (e) { 
            statusTxt.innerText = "錯誤: " + e.message; 
            console.error(e);
        } finally {
            genBtn.disabled = false;
        }
    };

    function downloadKahootExcel(questions, timeLimit, topicName) {
        const header = [
            ["Quiz template", "", "", "", "", "", ""],
            ["Add questions, at least two answer alternatives, time limit and choose correct answers (at least one). Have fun creating your awesome quiz!", "", "", "", "", "", ""],
            ["Remember: questions have a limit of 95 characters and answers can have 60 characters max.", "", "", "", "", "", ""],
            ["See an example question below (don't forget to overwrite this with your first question!)", "", "", "", "", "", ""],
            ["", "", "", "", "", "", ""],["", "", "", "", "", "", ""],["", "", "", "", "", "", ""],
            ["Question - max 95 characters", "Answer 1 - max 60 characters", "Answer 2 - max 60 characters", "Answer 3 - max 60 characters", "Answer 4 - max 60 characters", "Time limit (sec) – 5, 10, 20, 30, 60, 90, 120, or 240 secs", "Correct answer(s) - choose at least one"]
        ];
        const rows = questions.map(q => [q.q, q.a1, q.a2, q.a3, q.a4, parseInt(timeLimit), q.ans.toString()]);
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(header.concat(rows));
        XLSX.utils.book_append_sheet(wb, ws, "Questions");
        XLSX.writeFile(wb, `Kahoot_${topicName}.xlsx`);
    }

    document.getElementById('reDownloadBtn').onclick = () => {
        if(lastGeneratedQuestions) downloadKahootExcel(lastGeneratedQuestions, document.getElementById('timeLimit').value, document.getElementById('topic').value);
    };

    // --- 功能二：成績計算邏輯 ---
    function processExcel() {
        const fileInput = document.getElementById('upload');
        if (fileInput.files.length === 0) {
            alert("請先選擇一個檔案！");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = "Final Scores";
                const worksheet = workbook.Sheets[sheetName];

                if (!worksheet) {
                    alert("找不到 'Final Scores' 工作表，請確認您上傳的是 Kahoot 原始報告檔案。");
                    return;
                }

                let rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                const topHeaders = rows.slice(0, 2); 
                const tableHeader = rows[2];       
                let dataRows = rows.slice(3);    

                // 增加 G 欄位標題
                tableHeader[6] = "成績";

                dataRows.forEach(row => {
                    if (row && row.length > 0) {
                        const correct = parseFloat(row[4]) || 0; 
                        const incorrect = parseFloat(row[5]) || 0; 
                        const total = correct + incorrect;
                        let accuracy = (total > 0) ? (correct / total) * 100 : 0;
                        row[6] = parseFloat(accuracy.toFixed(2));
                    }
                });

                // 依據 Player (Index 1) 排序
                dataRows.sort((a, b) => {
                    let valA = a[1] ? a[1].toString() : "";
                    let valB = b[1] ? b[1].toString() : "";
                    // 嘗試以數字排序，若非數字則以字串排序
                    return valA.localeCompare(valB, undefined, {numeric: true, sensitivity: 'base'});
                });

                const finalData = [...topHeaders, tableHeader, ...dataRows];
                const newSheet = XLSX.utils.aoa_to_sheet(finalData);
                
                if (worksheet['!merges']) newSheet['!merges'] = worksheet['!merges'];
                
                const newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newSheet, sheetName);
                XLSX.writeFile(newWorkbook, "Kahoot_分析後的成績單.xlsx");
                alert("計算完成，Excel 已開始下載！");
            } catch (err) {
                console.error(err);
                alert("處理 Excel 時發生錯誤，請檢查檔案格式。");
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // 初始化啟動
    initAuth();
</script>

</body>
</html>
