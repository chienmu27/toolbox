<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Kahoot AI Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #46178f; text-align: center; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: #46178f; color: #fff; margin-top: 10px; }
        .btn-gen:disabled { background: #aaa; }
        .btn-dl { background: #26890c; color: #fff; margin-top: 10px; display: none; }
        #msg { margin-top: 15px; font-size: 14px; text-align: center; color: #333; }
        #error-area { color: red; font-size: 12px; margin-top: 10px; background: #fff1f1; padding: 10px; border-radius: 4px; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>Kahoot AI 出題器</h2>
    <div class="field">
        <label>主題</label>
        <input id="topic" type="text" placeholder="例如：生活常識">
    </div>
    <div class="field">
        <label>題數</label>
        <input id="count" type="number" value="5">
    </div>
    <div class="field">
        <label>秒數</label>
        <input id="time" type="number" value="20">
    </div>

    <button id="genBtn" class="btn-gen" onclick="generate()">生成題目</button>
    <button id="dlBtn" class="btn-dl" onclick="download()">下載 Excel</button>

    <div id="msg"></div>
    <div id="error-area"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwoC39gokDGJ-bZ-45u26HmQZiiGQGb3zZzMFtTX1FEdAgswpciRV7eXGbq7n-jeDmL/exec"; // <--- 記得換成新的部署網址

let quiz = [];

async function generate() {
    const topic = document.getElementById("topic").value;
    const count = document.getElementById("count").value;
    const genBtn = document.getElementById("genBtn");
    const msg = document.getElementById("msg");
    const err = document.getElementById("error-area");
    const dlBtn = document.getElementById("dlBtn");

    if(!topic) { alert("請輸入主題"); return; }

    genBtn.disabled = true;
    msg.innerText = "正在生成中，大約需要 15 秒...";
    err.style.display = "none";
    dlBtn.style.display = "none";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ topic, count })
        });

        const data = await response.json();

        if (data.error) {
            throw new Error(`${data.error}\n${data.details || data.message}`);
        }

        quiz = data;
        msg.innerText = `成功生成 ${quiz.length} 題！`;
        dlBtn.style.display = "block";
    } catch (e) {
        msg.innerText = "生成失敗";
        err.innerText = e.message;
        err.style.display = "block";
        console.error(e);
    } finally {
        genBtn.disabled = false;
    }
}

function download() {
    const timeLimit = document.getElementById("time").value;
    let data = [];
    for(let i=0; i<7; i++) data.push([]); // 前 7 列空白

    data.push(["No.", "Question", "Answer 1", "Answer 2", "Answer 3", "Answer 4", "Time limit (sec)", "Correct answer(s)"]);

    quiz.forEach((q, i) => {
        data.push([
            i + 1,
            q.question,
            q.choices[0],
            q.choices[1],
            q.choices[2],
            q.choices[3],
            timeLimit,
            q.answer.toString()
        ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Quiz");
    XLSX.writeFile(wb, "Kahoot_Quiz.xlsx");
}
</script>

</body>
</html>
