<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot AI Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
        .box { max-width: 700px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #46178f; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-generate { background: #46178f; color: white; }
        .btn-generate:disabled { background: #ccc; }
        .btn-download { background: #26890c; color: white; margin-top: 10px; }
        pre { background: #333; color: #7cfc00; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 12px; max-height: 300px; }
        .status { text-align: center; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Kahoot AI 題目生成器</h2>
    
    <div class="input-group">
        <label>題目主題</label>
        <input id="topic" placeholder="例如：台灣地理、JavaScript 基礎...">
    </div>
    <div class="input-group">
        <label>題數</label>
        <input id="count" type="number" value="5" min="1" max="20">
    </div>
    <div class="input-group">
        <label>作答時間 (秒)</label>
        <input id="time" type="number" value="20">
    </div>

    <button id="genBtn" class="btn-generate" onclick="generate()">生成題目 (可能需要 10-20 秒)</button>
    <button id="dlBtn" class="btn-download" onclick="download()" style="display:none;">下載 Kahoot Excel</button>

    <div id="status" class="status"></div>
    <pre id="log" style="display:none;"></pre>
</div>

<script>
// 請更換為你部署後的 GAS 網址
const API_URL = "https://script.google.com/macros/s/AKfycbwoC39gokDGJ-bZ-45u26HmQZiiGQGb3zZzMFtTX1FEdAgswpciRV7eXGbq7n-jeDmL/exec";

let quiz = [];

async function generate(){
    const topic = document.getElementById("topic").value;
    const count = document.getElementById("count").value;
    const genBtn = document.getElementById("genBtn");
    const status = document.getElementById("status");

    if(!topic) { alert("請輸入主題"); return; }

    genBtn.disabled = true;
    genBtn.innerText = "生成中，請稍候...";
    status.innerText = "正在與 AI 通訊，請勿關閉視窗...";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ topic, count }),
            headers: { "Content-Type": "text/plain;charset=utf-8" } 
            // 注意：GAS POST 建議用 text/plain 避免 preflight 問題
        });

        quiz = await res.json();
        
        if (quiz.error) throw new Error(quiz.error);

        document.getElementById("log").style.display = "block";
        document.getElementById("log").textContent = JSON.stringify(quiz, null, 2);
        document.getElementById("dlBtn").style.display = "block";
        status.innerText = "生成成功！";
    } catch (e) {
        console.error(e);
        alert("發生錯誤：" + e.message);
        status.innerText = "生成失敗";
    } finally {
        genBtn.disabled = false;
        genBtn.innerText = "再次生成題目";
    }
}

function download(){
    if(!quiz.length){ alert("請先生成題目"); return; }

    const time = document.getElementById("time").value;
    let ws_data = [];

    // Kahoot 標準模板從第 9 列開始讀取數據
    // 前 7 列留白
    for(let i=0; i<7; i++) ws_data.push([]);

    // 第 8 列：欄位標題 (Kahoot 官方格式)
    ws_data.push([
        "No.",
        "Question",
        "Answer 1",
        "Answer 2",
        "Answer 3",
        "Answer 4",
        "Time limit (sec)",
        "Correct answer(s)"
    ]);

    // 填入題目數據
    quiz.forEach((q, i) => {
        ws_data.push([
            i + 1,
            q.question,
            q.choices[0] || "",
            q.choices[1] || "",
            q.choices[2] || "",
            q.choices[3] || "",
            time,
            q.answer // 1, 2, 3, or 4
        ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(ws_data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Quiz");

    // 產生檔名
    const fileName = `Kahoot_${document.getElementById("topic").value}.xlsx`;
    XLSX.writeFile(wb, fileName);
}
</script>

</body>
</html>
