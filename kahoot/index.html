<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Kahoot AI Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #46178f; text-align: center; margin-top: 0; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .btn-gen { background: #46178f; color: #fff; }
        .btn-gen:disabled { background: #aaa; cursor: not-allowed; }
        .btn-dl { background: #26890c; color: #fff; display: none; }
        #status { margin-top: 15px; text-align: center; font-size: 14px; min-height: 1.2em; }
        #error-log { color: #d93025; background: #fce8e6; padding: 10px; border-radius: 4px; font-size: 12px; margin-top: 15px; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>Kahoot AI 出題器</h2>
    
    <div class="field">
        <label>主題</label>
        <input id="topic" type="text" placeholder="例如：生活常識、九九乘法">
    </div>
    
    <div class="field">
        <label>生成題數</label>
        <input id="count" type="number" value="5" min="1" max="15">
    </div>

    <div class="field">
        <label>作答秒數</label>
        <input id="time" type="number" value="20">
    </div>

    <button id="genBtn" class="btn-gen" onclick="generate()">生成題目</button>
    <button id="dlBtn" class="btn-dl" onclick="download()">下載 Kahoot Excel</button>

    <div id="status"></div>
    <div id="error-log"></div>
</div>

<script>
// --- 請務必換成你最新的 GAS 網址 ---
const API_URL = "https://script.google.com/macros/s/AKfycbz1Yad7i2Ip6ZJF78ovwtGO7_6xDG3Y1fn5ZaNPdIK3mKQSkzlEFoyqKfKzDQ6rr0x6/exec";

let quizData = [];

async function generate() {
    const topic = document.getElementById("topic").value;
    const count = document.getElementById("count").value;
    const genBtn = document.getElementById("genBtn");
    const dlBtn = document.getElementById("dlBtn");
    const status = document.getElementById("status");
    const errorLog = document.getElementById("error-log");

    if(!topic) { alert("請輸入主題"); return; }
    
    // UI 重置
    genBtn.disabled = true;
    dlBtn.style.display = "none";
    errorLog.style.display = "none";
    status.innerText = "AI 正在思考並出題中...";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ topic, count })
        });

        const result = await response.json();

        if (result.error) {
            throw new Error(`${result.error}: ${result.details || result.message}`);
        }

        quizData = result;
        status.innerText = `成功生成 ${quizData.length} 題！`;
        dlBtn.style.display = "block";

    } catch (e) {
        status.innerText = "生成失敗";
        errorLog.innerText = e.message;
        errorLog.style.display = "block";
        console.error(e);
    } finally {
        genBtn.disabled = false;
    }
}

function download() {
    if (!quizData.length) return;

    const time = document.getElementById("time").value;
    let wsData = [];

    // Kahoot 規定：前 7 列空白
    for (let i = 0; i < 7; i++) wsData.push([]);

    // 第 8 列：標題列 (Kahoot 官方標準)
    wsData.push([
        "No.", 
        "Question", 
        "Answer 1", "Answer 2", "Answer 3", "Answer 4", 
        "Time limit (sec)", 
        "Correct answer(s)"
    ]);

    // 第 9 列開始：題目內容
    quizData.forEach((q, i) => {
        wsData.push([
            i + 1,
            q.question,
            q.choices[0] || "",
            q.choices[1] || "",
            q.choices[2] || "",
            q.choices[3] || "",
            time,
            q.answer.toString()
        ]);
    });

    const worksheet = XLSX.utils.aoa_to_sheet(wsData);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Quiz");

    XLSX.writeFile(workbook, `Kahoot_${document.getElementById("topic").value}.xlsx`);
}
</script>

</body>
</html>
