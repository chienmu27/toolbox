<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Kahoot AI Generator</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,button{width:100%;padding:10px;margin:5px 0}
button{background:#4CAF50;color:#fff;border:none}
</style>
</head>
<body>

<div class="box">
<h2>Kahoot AI 題目生成器（Gemini版）</h2>

<input id="topic" placeholder="題目主題">
<input id="count" type="number" value="5">
<input id="time" type="number" value="20">

<button onclick="generate()">生成題目</button>
<button onclick="download()">下載 Kahoot Excel</button>

<pre id="log"></pre>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwoC39gokDGJ-bZ-45u26HmQZiiGQGb3zZzMFtTX1FEdAgswpciRV7eXGbq7n-jeDmL/exec";

let quiz = [];

async function generate(){
  const topic = document.getElementById("topic").value;
  const count = document.getElementById("count").value;

  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({topic, count})
  });

  quiz = await res.json();

  document.getElementById("log").textContent = JSON.stringify(quiz,null,2);
}

function download(){
  if(!quiz.length){alert("先生成題目");return;}

  const time = document.getElementById("time").value;

  let ws_data = [];

  // 前7列空白（符合模板）
  for(let i=0;i<7;i++) ws_data.push([]);

  // 第8列標題
  ws_data.push([
    "",
    "Question",
    "Answer 1",
    "Answer 2",
    "Answer 3",
    "Answer 4",
    "Time",
    "Correct Answer"
  ]);

  // 題目
  quiz.forEach((q,i)=>{
    ws_data.push([
      i+1,
      q.question,
      q.choices[0],
      q.choices[1],
      q.choices[2],
      q.choices[3],
      time,
      q.answer.toString()
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Quiz");

  XLSX.writeFile(wb, "kahoot.xlsx");
}
</script>

</body>
</html>
