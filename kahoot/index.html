<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot AI 題目生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 600px; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #46178f; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        .btn-generate { background: #46178f; color: white; }
        .btn-generate:hover { background: #35116d; }
        .btn-generate:disabled { background: #ccc; cursor: not-allowed; }
        .btn-download { background: #26890c; color: white; display: none; }
        .btn-download:hover { background: #1e6b0a; }
        #status { text-align: center; margin-top: 15px; color: #666; font-size: 14px; }
        pre { background: #f8f8f8; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 12px; max-height: 200px; border: 1px solid #eee; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>Kahoot AI 題目生成器</h2>
    
    <div class="input-group">
        <label>題目主題</label>
        <input id="topic" placeholder="例如：生活常識、Python 程式設計...">
    </div>
    <div class="input-group">
        <label>生成題數 (建議 1-10 題)</label>
        <input id="count" type="number" value="5" min="1" max="20">
    </div>
    <div class="input-group">
        <label>每題作答秒數</label>
        <input id="time" type="number" value="20">
    </div>

    <button id="genBtn" class="btn-generate" onclick="generate()">開始生成題目</button>
    <button id="dlBtn" class="btn-download" onclick="download()">下載 Kahoot Excel</button>

    <div id="status"></div>
    <pre id="log"></pre>
</div>

<script>
// --- 重要：請在此處替換成你部署後的 GAS 網址 ---
const API_URL = "https://script.google.com/macros/s/AKfycbwoC39gokDGJ-bZ-45u26HmQZiiGQGb3zZzMFtTX1FEdAgswpciRV7eXGbq7n-jeDmL/exec";

let quizData = [];

async function generate() {
    const topic = document.getElementById("topic").value;
    const count = document.getElementById("count").value;
    const genBtn = document.getElementById("genBtn");
    const status = document.getElementById("status");
    const log = document.getElementById("log");

    if (!topic) { alert("請輸入主題內容"); return; }
    if (!API_URL || API_URL.includes("你的_GAS")) { alert("請先在程式碼中設定 API_URL"); return; }

    genBtn.disabled = true;
    genBtn.innerText = "AI 思考中...";
    status.innerText = "正在連線至 Gemini 生成題目，請稍候...";
    log.style.display = "none";
    document.getElementById("dlBtn").style.display = "none";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            mode: "no-cors", // 避免某些瀏覽器 CORS 預檢失敗
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ topic, count })
        });

        // 註：因為 GAS 的 no-cors 模式無法直接讀取 response，
        // 若發生錯誤，通常是因為部署時權限沒設為「所有人」。
        // 我們改用一般的 fetch 試試，如果沒 CORS 問題最理想。
        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ topic, count })
        });
        
        quizData = await res.json();

        if (quizData.error) {
            throw new Error(quizData.error);
        }

        status.innerText = "生成成功！";
        log.style.display = "block";
        log.textContent = JSON.stringify(quizData, null, 2);
        document.getElementById("dlBtn").style.display = "block";

    } catch (e) {
        console.error(e);
        status.innerText = "發生錯誤，請檢查 GAS 部署是否正確。";
        alert("錯誤訊息：" + e.message);
    } finally {
        genBtn.disabled = false;
        genBtn.innerText = "再次生成題目";
    }
}

function download() {
    if (quizData.length === 0) return;

    const timeLimit = document.getElementById("time").value;
    let ws_data = [];

    // Kahoot 模板格式：前 7 欄留空
    for (let i = 0; i < 7; i++) ws_data.push([]);

    // 第 8 欄為標題列
    ws_data.push([
        "No.",
        "Question",
        "Answer 1",
        "Answer 2",
        "Answer 3",
        "Answer 4",
        "Time limit (sec)",
        "Correct answer(s)"
    ]);

    // 填入 AI 生成的題目
    quizData.forEach((item, index) => {
        ws_data.push([
            index + 1,
            item.question,
            item.choices[0],
            item.choices[1],
            item.choices[2],
            item.choices[3],
            timeLimit,
            item.answer // 應為 1, 2, 3 或 4
        ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(ws_data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Quiz");

    const fileName = `Kahoot_${document.getElementById("topic").value || "AI"}.xlsx`;
    XLSX.writeFile(wb, fileName);
}
</script>

</body>
</html>
