<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot AI Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #46178f; text-align: center; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #genBtn { background: #46178f; color: white; }
        #genBtn:disabled { background: #ccc; }
        #dlBtn { background: #26890c; color: white; margin-top: 10px; display: none; }
        .status { margin-top: 15px; text-align: center; font-size: 14px; color: #555; }
        #errorMsg { color: #d93025; background: #fce8e6; padding: 10px; border-radius: 4px; margin-top: 15px; display: none; font-size: 12px; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kahoot AI 出題器</h2>
    
    <label>主題</label>
    <input id="topic" type="text" placeholder="例如：國中歷史、動漫知識">
    
    <label>題目數量</label>
    <input id="count" type="number" value="5" min="1" max="10">
    
    <label>作答時間 (秒)</label>
    <input id="time" type="number" value="20">

    <button id="genBtn" onclick="generate()">生成題目</button>
    <button id="dlBtn" onclick="download()">下載 Kahoot Excel</button>

    <div id="status" class="status"></div>
    <div id="errorMsg"></div>
</div>

<script>
// --- 請替換為你最新的 GAS 部署網址 ---
const API_URL = "https://script.google.com/macros/s/AKfycbwoC39gokDGJ-bZ-45u26HmQZiiGQGb3zZzMFtTX1FEdAgswpciRV7eXGbq7n-jeDmL/exec";

let quizData = [];

async function generate() {
    const topic = document.getElementById("topic").value;
    const count = document.getElementById("count").value;
    const genBtn = document.getElementById("genBtn");
    const status = document.getElementById("status");
    const errorMsg = document.getElementById("errorMsg");
    const dlBtn = document.getElementById("dlBtn");

    if (!topic) { alert("請輸入主題"); return; }
    
    genBtn.disabled = true;
    status.innerText = "AI 正在出題中，請稍候...";
    errorMsg.style.display = "none";
    dlBtn.style.display = "none";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ topic, count })
        });

        const result = await response.json();

        if (result.error) {
            throw new Error(result.error + (result.details ? ": " + result.details : ""));
        }

        quizData = result;
        status.innerText = "生成完畢！共 " + quizData.length + " 題";
        dlBtn.style.display = "block";
    } catch (err) {
        errorMsg.innerText = "錯誤: " + err.message;
        errorMsg.style.display = "block";
        status.innerText = "生成失敗";
    } finally {
        genBtn.disabled = false;
    }
}

function download() {
    if (!quizData.length) return;

    const timeLimit = document.getElementById("time").value;
    let excelRows = [];

    // Kahoot 規定：前 7 列空白
    for (let i = 0; i < 7; i++) excelRows.push([]);

    // 第 8 列：標題
    excelRows.push([
        "No.", "Question", "Answer 1", "Answer 2", "Answer 3", "Answer 4", "Time limit (sec)", "Correct answer(s)"
    ]);

    // 第 9 列開始：題目內容
    quizData.forEach((q, i) => {
        excelRows.push([
            i + 1,
            q.question,
            q.choices[0],
            q.choices[1],
            q.choices[2],
            q.choices[3],
            timeLimit,
            q.answer.toString()
        ]);
    });

    const worksheet = XLSX.utils.aoa_to_sheet(excelRows);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Quiz");

    XLSX.writeFile(workbook, "Kahoot_Quiz.xlsx");
}
</script>

</body>
</html>
