<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM 簡報圖檔下載工具 Pro</title>
    
    <!-- 引入外部資源 -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { 
            --primary-color: #46178f; 
            --secondary-color: #250850; 
            --success-color: #108548; 
            --danger-color: #e21b3c; 
            --bg-color: #f2f2f2;
        }

        body { 
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            min-height: 100vh; 
            margin: 0; 
        }

        .app-container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 95%; 
            max-width: 1200px; 
            margin: 40px auto;
            position: relative; 
            min-height: 600px;
        }

        #authOverlay { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: white; 
            border-radius: 12px; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px; 
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .main-btn { 
            padding: 12px 24px; 
            background-color: var(--primary-color); 
            color: white; border: none; border-radius: 6px; 
            font-size: 1.1rem; cursor: pointer; font-weight: bold; 
        }
        .main-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        .logout-btn { 
            background-color: #fff; 
            color: #d9534f; 
            border: 1px solid #d9534f; 
            padding: 8px 16px; 
            font-size: 0.85rem; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: 0.2s;
        }

        #pdf-render-canvas { display: none; }
        .img-card.selected { border-color: #3b82f6; background-color: #eff6ff; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drag-over { border-color: #3b82f6; background-color: #f0f7ff; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 身份驗證遮罩層 -->
    <div id="authOverlay">
        <h2 id="authMsg" class="text-2xl font-bold mb-4" style="color:var(--primary-color)">正在連線伺服器...</h2>
        <button id="authLoginBtn" class="main-btn hidden">登入 Google 帳號</button>
        
        <!-- 申請表單 -->
        <div id="applyForm" class="hidden w-full max-w-md mt-6">
            <p class="mb-4 text-gray-600">您的帳號尚未獲得授權，請填寫申請資料：</p>
            <div class="mb-4 text-left">
                <label class="block font-bold mb-1">您的 Google 信箱</label>
                <input type="email" id="applyEmail" class="w-full p-2 border rounded" placeholder="example@gmail.com">
            </div>
            <div class="mb-4 text-left">
                <label class="block font-bold mb-1">申請人姓名</label>
                <input type="text" id="applyName" class="w-full p-2 border rounded" placeholder="請輸入姓名">
            </div>
            <button id="applyBtn" class="main-btn w-full">送出使用申請</button>
        </div>
    </div>

    <!-- 登入後顯示的主內容 -->
    <div id="mainContent" class="hidden">
        <div class="nav-header">
            <h1 class="text-2xl font-bold text-gray-800">NotebookLM 簡報圖檔下載工具 Pro</h1>
            <button id="logoutBtn" class="logout-btn">登出帳號</button>
        </div>

        <div class="container mx-auto">
            <header class="text-center mb-10">
                <p class="text-gray-600">支援拖曳上傳、多種畫質選擇與批次打包</p>
            </header>

            <!-- 上傳區 -->
            <div id="upload-section" class="max-w-xl mx-auto bg-white p-12 rounded-xl shadow-md text-center border-2 border-dashed border-gray-300 hover:border-blue-400 transition-all cursor-pointer">
                <input type="file" id="pdf-input" accept="application/pdf" class="hidden">
                <label for="pdf-input" class="cursor-pointer">
                    <svg class="mx-auto h-16 w-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <span class="mt-4 block text-lg font-semibold text-gray-700">點擊上傳 或 將 PDF 拖放到此處</span>
                    <span class="mt-2 block text-sm text-gray-400">NotebookLM 匯出的簡報 PDF 專用</span>
                </label>
            </div>

            <!-- 控制列 -->
            <div id="controls" class="hidden mt-8 bg-white p-4 rounded-lg shadow-sm flex flex-wrap items-center justify-between gap-4 border border-gray-200">
                <div class="flex items-center gap-4">
                    <div class="flex bg-gray-100 p-1 rounded-md">
                        <button id="btn-select-all" class="px-3 py-1.5 hover:bg-white hover:shadow-sm rounded transition text-sm font-medium">全選</button>
                        <button id="btn-deselect-all" class="px-3 py-1.5 hover:bg-white hover:shadow-sm rounded transition text-sm font-medium">取消全選</button>
                    </div>
                    <span class="text-blue-600 font-bold text-lg">
                        已選：<span id="selected-count">0</span> / <span id="total-count">0</span>
                    </span>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2">
                        <label class="text-sm font-medium text-gray-600">格式:</label>
                        <select id="format-select" class="border p-1 rounded text-sm bg-white">
                            <option value="image/jpeg">JPG</option>
                            <option value="image/png">PNG</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-sm font-medium text-gray-600">畫質:</label>
                        <select id="quality-select" class="border p-1 rounded text-sm bg-white">
                            <option value="1.5">一般</option>
                            <option value="2.5" selected>清晰</option>
                            <option value="3.5">極高</option>
                        </select>
                    </div>
                    <button id="btn-export-trigger" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-lg transition">匯出圖片</button>
                    <button id="btn-reset" class="px-4 py-2 bg-gray-100 text-gray-600 hover:bg-red-50 hover:text-red-600 rounded-lg text-sm transition">重置</button>
                </div>
            </div>

            <div id="preview-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-8"></div>
        </div>

        <div class="footer text-center mt-12 text-gray-400 text-xs">
            Powered by pdf.js & JSZip & Puter.js<br>
            © 2026 chienmu.tai 保留所有權利
        </div>
    </div>
</div>

<!-- 載入動畫 -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[1100]">
    <div class="bg-white p-8 rounded-2xl text-center shadow-2xl max-w-xs w-full">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-16 w-16 mb-4 mx-auto"></div>
        <p id="loading-text" class="text-gray-800 font-bold text-lg">正在處理...</p>
    </div>
</div>

<!-- 匯出視窗 -->
<div id="export-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[1101]">
    <div class="bg-white p-8 rounded-2xl max-w-sm w-full shadow-2xl">
        <h3 class="text-xl font-bold mb-4">選擇下載方式</h3>
        <div class="flex flex-col gap-3">
            <button id="btn-download-zip" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">打包成 ZIP 檔</button>
            <button id="btn-download-each" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold">逐張分別下載</button>
            <button id="btn-close-modal" class="w-full py-2 text-gray-500">取消</button>
        </div>
    </div>
</div>

<canvas id="pdf-render-canvas"></canvas>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwHobXSaxivNtdaPynrxehum0cRalWhZrTBQYNO4s0pID4Gb21IE3n5o14S2MHL2L8Eyg/exec"; 
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let userUUID = "";
    let pdfDoc = null;

    // --- 改進後的身份驗證邏輯 ---
    async function initAuth() {
        const authMsg = document.getElementById('authMsg');
        const loginBtn = document.getElementById('authLoginBtn');

        if (!puter.auth.isSignedIn()) {
            authMsg.innerText = "請先登入 Google 帳號以使用工具";
            loginBtn.classList.remove('hidden');
            return;
        }

        try {
            authMsg.innerText = "驗證授權中，請稍候...";
            const user = await puter.auth.getUser();
            userUUID = user.uuid;
            checkPermission(userUUID);
        } catch (err) {
            authMsg.innerText = "系統初始化失敗，請重新整理";
            console.error(err);
        }
    }

    async function checkPermission(uuid) {
        const authMsg = document.getElementById('authMsg');
        const applyForm = document.getElementById('applyForm');
        
        try {
            // 使用 POST 請求，但 Header 設定為 text/plain 以避開預檢 (Preflight)
            // GAS 腳本會收到字串後透過 JSON.parse 處理
            const response = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" }, 
                body: JSON.stringify({ action: "checkStatus", uuid: uuid })
            });

            const result = await response.json();

            if (result.status === "Approved") {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
            } else if (result.status === "Pending") {
                authMsg.innerText = "您的申請正在審核中，請連繫管理員。";
                document.getElementById('authLoginBtn').classList.add('hidden');
            } else {
                authMsg.innerText = "帳號尚未獲得授權";
                document.getElementById('authLoginBtn').classList.add('hidden');
                applyForm.classList.remove('hidden');
            }
        } catch (e) {
            console.error("授權檢查出錯:", e);
            authMsg.innerText = "伺服器回應逾時，請檢查網路後重新整理。";
        }
    }

    document.getElementById('applyBtn').onclick = async () => {
        const email = document.getElementById('applyEmail').value.trim();
        const name = document.getElementById('applyName').value.trim();
        const btn = document.getElementById('applyBtn');
        if(!email || !name) return alert("請填寫完整資料");
        
        btn.disabled = true;
        btn.innerText = "提交中...";
        
        try {
            await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "apply", uuid: userUUID, email: email, name: name })
            });
            document.getElementById('authMsg').innerText = "申請已成功送出！請等待核可。";
            document.getElementById('applyForm').classList.add('hidden');
        } catch (e) {
            alert("提交失敗，請檢查網路連線");
            btn.disabled = false;
            btn.innerText = "送出使用申請";
        }
    };

    document.getElementById('authLoginBtn').onclick = async () => {
        await puter.auth.signIn();
        initAuth();
    };

    document.getElementById('logoutBtn').onclick = () => {
        puter.auth.signOut();
        location.reload();
    };

    // --- NotebookLM 功能邏輯 ---
    const pdfInput = document.getElementById('pdf-input');
    const uploadSection = document.getElementById('upload-section');
    const previewGrid = document.getElementById('preview-grid');
    const controls = document.getElementById('controls');
    const selectedCountLabel = document.getElementById('selected-count');
    const totalCountLabel = document.getElementById('total-count');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');

    uploadSection.onclick = () => pdfInput.click();
    pdfInput.onchange = (e) => { if(e.target.files[0]) processFile(e.target.files[0]); };

    async function processFile(file) {
        showLoading("正在解析 PDF...");
        const reader = new FileReader();
        reader.onload = async function() {
            const data = new Uint8Array(this.result);
            pdfDoc = await pdfjsLib.getDocument({data: data}).promise;
            totalCountLabel.innerText = pdfDoc.numPages;
            renderPreviews();
        };
        reader.readAsArrayBuffer(file);
    }

    async function renderPreviews() {
        previewGrid.innerHTML = '';
        uploadSection.classList.add('hidden');
        controls.classList.remove('hidden');
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            loadingText.innerText = `生成預覽 (${i}/${pdfDoc.numPages})`;
            const page = await pdfDoc.getPage(i);
            const viewport = page.getViewport({ scale: 0.5 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            createCard(canvas.toDataURL('image/jpeg', 0.7), i);
        }
        hideLoading();
        updateCount();
    }

    function createCard(src, idx) {
        const div = document.createElement('div');
        div.className = "img-card bg-white p-3 rounded-xl shadow-sm border-2 border-transparent relative cursor-pointer selected hover:shadow-md transition-all";
        div.innerHTML = `
            <input type="checkbox" checked class="page-checkbox absolute top-4 left-4 w-5 h-5 z-10" data-id="${idx}">
            <img src="${src}" class="w-full rounded-lg">
            <div class="mt-2 text-sm font-bold text-gray-500">Page ${idx}</div>
        `;
        div.onclick = (e) => {
            if(e.target.type !== 'checkbox'){
                const cb = div.querySelector('.page-checkbox');
                cb.checked = !cb.checked;
            }
            div.classList.toggle('selected', div.querySelector('.page-checkbox').checked);
            updateCount();
        };
        previewGrid.appendChild(div);
    }

    function updateCount() {
        selectedCountLabel.innerText = document.querySelectorAll('.page-checkbox:checked').length;
    }

    async function getBlob(idx) {
        const scale = parseFloat(document.getElementById('quality-select').value);
        const format = document.getElementById('format-select').value;
        const page = await pdfDoc.getPage(idx);
        const viewport = page.getViewport({ scale: scale });
        const canvas = document.getElementById('pdf-render-canvas');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
        return new Promise(r => canvas.toBlob(r, format, 0.9));
    }

    document.getElementById('btn-export-trigger').onclick = () => document.getElementById('export-modal').classList.remove('hidden');
    document.getElementById('btn-close-modal').onclick = () => document.getElementById('export-modal').classList.add('hidden');

    document.getElementById('btn-download-zip').onclick = async () => {
        document.getElementById('export-modal').classList.add('hidden');
        const zip = new JSZip();
        const selected = document.querySelectorAll('.page-checkbox:checked');
        if(selected.length === 0) return alert("尚未選取圖片");
        
        const ext = document.getElementById('format-select').value === 'image/png' ? 'png' : 'jpg';
        for(let i=0; i<selected.length; i++) {
            const idx = parseInt(selected[i].dataset.id);
            showLoading(`正在轉檔 (${i+1}/${selected.length})`);
            zip.file(`Page_${idx}.${ext}`, await getBlob(idx));
        }
        showLoading("正在壓縮中...");
        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, "NotebookLM_Slides.zip");
        hideLoading();
    };

    document.getElementById('btn-download-each').onclick = async () => {
        document.getElementById('export-modal').classList.add('hidden');
        const selected = document.querySelectorAll('.page-checkbox:checked');
        const ext = document.getElementById('format-select').value === 'image/png' ? 'png' : 'jpg';
        for(let i=0; i<selected.length; i++) {
            const idx = parseInt(selected[i].dataset.id);
            showLoading(`下載中 (${i+1}/${selected.length})`);
            saveAs(await getBlob(idx), `Page_${idx}.${ext}`);
            await new Promise(r => setTimeout(r, 300));
        }
        hideLoading();
    };

    document.getElementById('btn-select-all').onclick = () => {
        document.querySelectorAll('.page-checkbox').forEach(c => { c.checked = true; c.closest('.img-card').classList.add('selected'); });
        updateCount();
    };
    document.getElementById('btn-deselect-all').onclick = () => {
        document.querySelectorAll('.page-checkbox').forEach(c => { c.checked = false; c.closest('.img-card').classList.remove('selected'); });
        updateCount();
    };
    document.getElementById('btn-reset').onclick = () => location.reload();

    function showLoading(t) { loadingText.innerText = t; loadingOverlay.classList.remove('hidden'); }
    function hideLoading() { loadingOverlay.classList.add('hidden'); }

    // 初始化
    initAuth();
</script>

</body>
</html>
