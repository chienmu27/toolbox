<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM 簡報轉圖工具 - 授權版</title>
    
    <!-- 引入外部資源 (核心邏輯) -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { 
            --primary-color: #46178f; 
            --secondary-color: #250850; 
            --success-color: #108548; 
            --danger-color: #e21b3c; 
            --bg-color: #f2f2f2;
        }

        body { 
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 0; 
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 1200px; 
            position: relative; 
            min-height: 550px;
        }

        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            margin-bottom: 30px; 
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .tab-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 12px;
        }

        .logout-btn { 
            background-color: #fff; 
            color: #d9534f; 
            border: 1px solid #d9534f; 
            padding: 8px 16px; 
            font-size: 0.85rem; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .logout-btn:hover { background-color: #fdf7f7; }

        /* 驗證遮罩層 */
        #authOverlay { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: white; 
            border-radius: 12px; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        .form-group { margin-bottom: 1.2rem; text-align: left; width: 100%; max-width: 400px; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .input-field { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .main-btn { 
            width: 100%; padding: 12px; 
            background-color: var(--primary-color); 
            color: white; border: none; border-radius: 6px; 
            font-size: 1.1rem; cursor: pointer; font-weight: bold; 
            margin-top: 10px; 
        }

        /* NotebookLM 專用樣式 */
        #pdf-render-canvas { display: none; }
        .img-card.selected { border-color: #3b82f6; background-color: #eff6ff; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drag-over { border-color: #3b82f6; background-color: #f0f7ff; }
        .hidden { display: none !important; }

        .footer { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <!-- 身份驗證遮罩層 -->
    <div id="authOverlay">
        <h2 id="authMsg" class="text-xl font-bold mb-4">請先登入 Google 帳號以使用工具</h2>
        <button id="authLoginBtn" class="main-btn" style="width:200px">登入 Google</button>
        
        <div id="applyForm" class="hidden" style="width:100%; max-width: 400px;">
            <p class="mb-4">您的帳號尚未獲得授權，請填寫申請資料：</p>
            <div class="form-group">
                <label>您的 Google 信箱</label>
                <input type="email" id="applyEmail" class="input-field" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>申請人姓名</label>
                <input type="text" id="applyName" class="input-field" placeholder="請輸入姓名">
            </div>
            <button id="applyBtn" class="main-btn">送出申請</button>
        </div>
    </div>

    <!-- 登入後顯示的主內容 -->
    <div id="mainContent" class="hidden">
        <div class="nav-header">
            <div class="tab-title">NotebookLM 轉檔工具</div>
            <button id="logoutBtn" class="logout-btn">登出帳號</button>
        </div>

        <div id="notebookView">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">NotebookLM 簡報轉圖工具</h1>
                <p class="text-gray-600 mt-2">支援拖曳上傳、多種畫質選擇與批次打包</p>
            </header>

            <!-- 上傳區 -->
            <div id="upload-section" class="max-w-xl mx-auto bg-white p-12 rounded-xl shadow-md text-center border-2 border-dashed border-gray-300 hover:border-blue-400 transition-all cursor-pointer">
                <input type="file" id="pdf-input" accept="application/pdf" class="hidden">
                <label for="pdf-input" class="cursor-pointer">
                    <svg class="mx-auto h-16 w-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <span class="mt-4 block text-lg font-semibold text-gray-700">將 PDF 拖放到此處 或 點擊上傳</span>
                    <span class="mt-2 block text-sm text-gray-400">支援 NotebookLM 匯出的簡報 PDF</span>
                </label>
            </div>

            <!-- 控制列 -->
            <div id="controls" class="hidden mt-8 bg-white p-4 rounded-lg shadow-sm flex flex-wrap items-center justify-between gap-4 border border-gray-200">
                <div class="flex items-center gap-4">
                    <div class="flex bg-gray-100 p-1 rounded-md">
                        <button id="btn-select-all" class="px-3 py-1.5 hover:bg-white hover:shadow-sm rounded transition text-sm font-medium">全選</button>
                        <button id="btn-deselect-all" class="px-3 py-1.5 hover:bg-white hover:shadow-sm rounded transition text-sm font-medium">取消全選</button>
                    </div>
                    <span class="text-blue-600 font-bold text-lg">
                        已選取：<span id="selected-count">0</span> / <span id="total-count">0</span>
                    </span>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2">
                        <label class="text-sm font-medium text-gray-600">格式:</label>
                        <select id="format-select" class="border p-2 rounded text-sm bg-white">
                            <option value="image/jpeg">JPG</option>
                            <option value="image/png">PNG</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-sm font-medium text-gray-600">輸出畫質:</label>
                        <select id="quality-select" class="border p-2 rounded text-sm bg-white">
                            <option value="1.5">標準畫質 (~300KB/張)</option>
                            <option value="2.5" selected>高畫質 (~800KB/張)</option>
                            <option value="3.5">超高畫質 (~1.5MB/張)</option>
                            <option value="5.0">極致畫質 (~3.0MB/張)</option>
                        </select>
                    </div>
                    <button id="btn-export-trigger" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-lg transition">匯出選取圖片</button>
                    <button id="btn-reset" class="px-4 py-2 bg-gray-100 text-gray-600 hover:bg-red-50 hover:text-red-600 rounded-lg text-sm transition">重置</button>
                </div>
            </div>

            <!-- 圖片顯示區 -->
            <div id="preview-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-8"></div>
        </div>

        <div class="footer">
            Powered by PDF.js & Puter.js & JSZip<br>
            © 2026 chienmu.tai 保留所有權利
        </div>
    </div>
</div>

<!-- 載入中狀態 (獨立層級) -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[2000]">
    <div class="bg-white p-8 rounded-2xl text-center shadow-2xl max-w-xs w-full">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-16 w-16 mb-4 mx-auto"></div>
        <p id="loading-text" class="text-gray-800 font-bold text-lg">正在處理...</p>
        <p class="text-gray-500 text-sm mt-2">請勿關閉視窗</p>
    </div>
</div>

<!-- 匯出彈窗 (獨立層級) -->
<div id="export-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[2001]">
    <div class="bg-white p-8 rounded-2xl max-w-sm w-full shadow-2xl">
        <h3 class="text-xl font-bold mb-2 text-gray-800">選擇匯出方式</h3>
        <p class="text-sm text-gray-500 mb-6">將根據您選擇的畫質進行轉檔</p>
        <div class="flex flex-col gap-3">
            <button id="btn-download-zip" class="w-full py-4 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-bold transition flex items-center justify-center gap-2">
                打包成 ZIP 檔
            </button>
            <button id="btn-download-each" class="w-full py-4 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 font-bold transition">逐張分別下載</button>
            <button id="btn-close-modal" class="w-full py-3 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition">取消</button>
        </div>
    </div>
</div>

<!-- 隱藏的 Canvas 用於渲染 PDF -->
<canvas id="pdf-render-canvas"></canvas>

<script>
    // --- 授權驗證與登入邏輯 (保留) ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwUMawcsle5jrve_w-LbAhG7-OZyVIArf6SZqbrL4yGq2nROfty6dnAFX2xsIy-ZW0f/exec"; 
    let userUUID = "";

    async function initAuth() {
        if (!puter.auth.isSignedIn()) {
            document.getElementById('authOverlay').classList.remove('hidden');
            return;
        }
        const user = await puter.auth.getUser();
        userUUID = user.uuid; 
        checkPermission(userUUID);
    }

    async function checkPermission(uuid) {
        document.getElementById('authMsg').innerText = "驗證授權中...";
        try {
            const resp = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "checkStatus", uuid: uuid })
            });
            const result = await resp.json();
            if (result.status === "Approved") {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
            } else if (result.status === "Pending") {
                document.getElementById('authMsg').innerText = "申請審核中，請稍候。";
                document.getElementById('authLoginBtn').classList.add('hidden');
            } else {
                document.getElementById('authMsg').innerText = "帳號尚未獲得授權";
                document.getElementById('authLoginBtn').classList.add('hidden');
                document.getElementById('applyForm').classList.remove('hidden');
            }
        } catch (e) { console.error(e); }
    }

    document.getElementById('applyBtn').onclick = async () => {
        const email = document.getElementById('applyEmail').value.trim();
        const name = document.getElementById('applyName').value.trim();
        if(!email || !name) return alert("請填寫完整資料");
        document.getElementById('applyBtn').disabled = true;
        try {
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "apply", uuid: userUUID, email: email, name: name })
            });
            document.getElementById('authMsg').innerText = "申請已送出！請等待管理員審核。";
            document.getElementById('applyForm').classList.add('hidden');
        } catch (e) { alert("提交失敗"); }
    };

    document.getElementById('authLoginBtn').onclick = async () => {
        await puter.auth.signIn();
        initAuth();
    };

    document.getElementById('logoutBtn').onclick = () => {
        puter.auth.signOut();
        location.reload();
    };

    // --- NotebookLM 轉檔工具邏輯 (保留並整合) ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const pdfInput = document.getElementById('pdf-input');
    const uploadSection = document.getElementById('upload-section');
    const previewGrid = document.getElementById('preview-grid');
    const controls = document.getElementById('controls');
    const selectedCountLabel = document.getElementById('selected-count');
    const totalCountLabel = document.getElementById('total-count');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const exportModal = document.getElementById('export-modal');

    let pdfDoc = null;
    let pdfFileData = null;

    // 防止拖曳預設行為
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        document.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
    });

    uploadSection.addEventListener('dragover', () => uploadSection.classList.add('drag-over'));
    uploadSection.addEventListener('dragleave', () => uploadSection.classList.remove('drag-over'));
    uploadSection.addEventListener('drop', (e) => {
        uploadSection.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') processFile(file);
        else alert("請上傳 PDF 檔案");
    });

    pdfInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) processFile(file);
    });

    async function processFile(file) {
        showLoading("正在解析 PDF...");
        const reader = new FileReader();
        reader.onload = async function() {
            pdfFileData = new Uint8Array(this.result);
            pdfDoc = await pdfjsLib.getDocument({data: pdfFileData}).promise;
            totalCountLabel.innerText = pdfDoc.numPages;
            await renderPreviews();
        };
        reader.readAsArrayBuffer(file);
    }

    async function renderPreviews() {
        previewGrid.innerHTML = '';
        uploadSection.classList.add('hidden');
        controls.classList.remove('hidden');

        for (let i = 1; i <= pdfDoc.numPages; i++) {
            loadingText.innerText = `生成預覽中 (${i} / ${pdfDoc.numPages})`;
            const page = await pdfDoc.getPage(i);
            const viewport = page.getViewport({ scale: 0.6 }); 
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            const thumbUrl = canvas.toDataURL('image/jpeg', 0.6);
            createImageCard(thumbUrl, i);
        }
        hideLoading();
        updateSelectionCount();
    }

    function createImageCard(src, index) {
        const div = document.createElement('div');
        div.className = "img-card bg-white p-3 rounded-xl shadow-sm border-2 border-transparent transition-all relative group cursor-pointer hover:shadow-md";
        div.innerHTML = `
            <input type="checkbox" checked class="page-checkbox absolute top-4 left-4 w-6 h-6 z-10 cursor-pointer accent-blue-600" data-id="${index}">
            <img src="${src}" class="w-full h-auto rounded-lg mb-3">
            <div class="flex justify-between items-center">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-wider">Page ${index}</span>
                <button onclick="downloadSingle(${index})" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-md text-xs font-bold hover:bg-blue-600 hover:text-white transition">下載單張</button>
            </div>
        `;
        div.onclick = (e) => {
            if(e.target.type !== 'checkbox' && e.target.tagName !== 'BUTTON') {
                const cb = div.querySelector('.page-checkbox');
                cb.checked = !cb.checked;
                updateSelectionUI(div, cb.checked);
            }
        };
        div.querySelector('.page-checkbox').onchange = (e) => updateSelectionUI(div, e.target.checked);
        previewGrid.appendChild(div);
        updateSelectionUI(div, true);
    }

    function updateSelectionUI(element, isChecked) {
        if (isChecked) element.classList.add('selected');
        else element.classList.remove('selected');
        updateSelectionCount();
    }

    function updateSelectionCount() {
        const selected = document.querySelectorAll('.page-checkbox:checked').length;
        selectedCountLabel.innerText = selected;
    }

    async function getHighQualityBlob(index) {
        const scale = parseFloat(document.getElementById('quality-select').value);
        const format = document.getElementById('format-select').value;
        const page = await pdfDoc.getPage(index);
        const viewport = page.getViewport({ scale: scale });
        const canvas = document.getElementById('pdf-render-canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        return new Promise(resolve => { canvas.toBlob((blob) => resolve(blob), format, 0.92); });
    }

    window.downloadSingle = async function(index) {
        showLoading(`正在產出高品質圖檔...`);
        const format = document.getElementById('format-select').value;
        const ext = format === 'image/png' ? 'png' : 'jpg';
        const blob = await getHighQualityBlob(index);
        saveAs(blob, `Slide_${index}.${ext}`);
        hideLoading();
    };

    document.getElementById('btn-download-each').onclick = async () => {
        exportModal.classList.add('hidden');
        const selectedCbs = Array.from(document.querySelectorAll('.page-checkbox:checked'));
        const format = document.getElementById('format-select').value;
        const ext = format === 'image/png' ? 'png' : 'jpg';
        for (let i = 0; i < selectedCbs.length; i++) {
            const id = parseInt(selectedCbs[i].dataset.id);
            showLoading(`正在處理第 ${i+1} / ${selectedCbs.length} 張...`);
            const blob = await getHighQualityBlob(id);
            saveAs(blob, `Slide_${id}.${ext}`);
            await new Promise(r => setTimeout(r, 400));
        }
        hideLoading();
    };

    document.getElementById('btn-download-zip').onclick = async () => {
        exportModal.classList.add('hidden');
        const zip = new JSZip();
        const selectedCbs = Array.from(document.querySelectorAll('.page-checkbox:checked'));
        const format = document.getElementById('format-select').value;
        const ext = format === 'image/png' ? 'png' : 'jpg';
        for (let i = 0; i < selectedCbs.length; i++) {
            const id = parseInt(selectedCbs[i].dataset.id);
            showLoading(`打包中: ${i+1} / ${selectedCbs.length}`);
            const blob = await getHighQualityBlob(id);
            zip.file(`Slide_${id}.${ext}`, blob);
        }
        showLoading("正在壓縮檔案...");
        const content = await zip.generateAsync({type: "blob"});
        saveAs(content, "NotebookLM_HighQuality_Slides.zip");
        hideLoading();
    };

    document.getElementById('btn-select-all').onclick = () => {
        document.querySelectorAll('.page-checkbox').forEach(cb => { cb.checked = true; cb.closest('.img-card').classList.add('selected'); });
        updateSelectionCount();
    };

    document.getElementById('btn-deselect-all').onclick = () => {
        document.querySelectorAll('.page-checkbox').forEach(cb => { cb.checked = false; cb.closest('.img-card').classList.remove('selected'); });
        updateSelectionCount();
    };

    document.getElementById('btn-reset').onclick = () => {
        previewGrid.innerHTML = '';
        uploadSection.classList.remove('hidden');
        controls.classList.add('hidden');
    };

    document.getElementById('btn-export-trigger').onclick = () => {
        if (document.querySelectorAll('.page-checkbox:checked').length === 0) return alert("請至少選取一張圖片");
        exportModal.classList.remove('hidden');
    };

    document.getElementById('btn-close-modal').onclick = () => exportModal.classList.add('hidden');

    function showLoading(text) {
        loadingText.innerText = text;
        loadingOverlay.classList.remove('hidden');
    }

    function hideLoading() {
        loadingOverlay.classList.add('hidden');
    }

    // 啟動身份驗證
    initAuth();
</script>

</body>
</html>
