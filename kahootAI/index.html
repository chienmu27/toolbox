<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot 題目 AI 自動生成器</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #46178f;
            --secondary-color: #250850;
            --success-color: #108548;
            --danger-color: #e21b3c;
            --warning-color: #f39c12;
        }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f2f2;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%; max-width: 600px; position: relative;
        }
        .auth-box { position: absolute; top: 10px; right: 10px; }
        .logout-btn {
            background: transparent; color: #666; border: 1px solid #ccc;
            padding: 5px 10px; font-size: 0.75rem; border-radius: 4px; cursor: pointer;
        }
        h1 { color: var(--primary-color); text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, select, textarea {
            width: 100%; padding: 10px; border: 2px solid #ddd;
            border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }
        .main-btn {
            width: 100%; padding: 12px; background-color: var(--primary-color);
            color: white; border: none; border-radius: 6px; font-size: 1.1rem;
            cursor: pointer; font-weight: bold; transition: background 0.3s; margin-top: 10px;
        }
        .main-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .download-again-btn {
            width: 100%; padding: 12px; background-color: var(--success-color);
            color: white; border: none; border-radius: 6px; font-size: 1.1rem;
            cursor: pointer; font-weight: bold; margin-top: 10px; display: none;
        }
        .apply-btn {
            width: 100%; padding: 12px; background-color: var(--warning-color);
            color: white; border: none; border-radius: 6px; font-size: 1.1rem;
            cursor: pointer; font-weight: bold;
        }
        #status { margin-top: 1rem; text-align: center; color: #555; font-size: 0.9rem; }
        #access-control {
            background: #fff3cd; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; border: 1px solid #ffeeba; text-align: center;
        }
        .footer { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #888; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-box">
        <button id="logoutBtn" class="logout-btn">登出 AI 帳號</button>
    </div>

    <h1>Kahoot AI 生成器</h1>

    <!-- 權限控制區塊 -->
    <div id="access-section">
        <div id="access-control">
            <p id="access-msg">正在驗證您的 Google 帳號權限...</p>
            <button id="applyBtn" class="apply-btn hidden">申請使用權限</button>
        </div>
    </div>

    <!-- 主功能區塊 (預設隱藏) -->
    <div id="main-content" class="hidden">
        <p style="text-align:right; font-size:0.8rem; color:var(--success-color)">
            累計使用次數：<span id="usage-count">0</span>
        </p>
        <div class="form-group">
            <label for="topic">題目主題</label>
            <input type="text" id="topic" placeholder="例如：自然科學、社會、英語..." />
        </div>
        <div class="form-group">
            <label for="hint">出題提示語 / 額外要求 (選填)</label>
            <textarea id="hint" rows="3" placeholder="例如：國小中年級、難度要深一點..."></textarea>
        </div>
        <div class="form-group">
            <label for="count">題數 (建議 1-20)</label>
            <input type="number" id="count" value="5" min="1" max="50" />
        </div>
        <div class="form-group">
            <label for="timeLimit">每題答題時間</label>
            <select id="timeLimit">
                <option value="5">5 秒</option><option value="10">10 秒</option>
                <option value="15">15 秒</option><option value="20" selected>20 秒</option>
                <option value="30">30 秒</option><option value="45">45 秒</option>
                <option value="60">1 分鐘</option><option value="90">1 分鐘 30 秒</option>
                <option value="120">2 分鐘</option>
            </select>
        </div>
        <button id="generateBtn" class="main-btn">開始 AI 生成題目</button>
        <button id="reDownloadBtn" class="download-again-btn">再次下載最後產出的 Excel 檔</button>
    </div>
    
    <div id="status">準備就緒</div>

    <div class="footer">
        Powered by Google Gemini (via Puter.js) <br>
        管理員核可制 | 使用次數追蹤機制 <br>
        © 2026 chienmu.tai 保留所有權利
    </div>
</div>

<script>
    // ⚠️ 請在此填入您的 GAS 部署網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyuyICDaUCDGPkgaZPcycqnxmOKZQnSVZIsY7yUzWNCquWf1ChOlIZqySXgWozAASoFmg/exec";

    const generateBtn = document.getElementById('generateBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const reDownloadBtn = document.getElementById('reDownloadBtn');
    const applyBtn = document.getElementById('applyBtn');
    const statusDiv = document.getElementById('status');
    const mainContent = document.getElementById('main-content');
    const accessMsg = document.getElementById('access-msg');
    const usageSpan = document.getElementById('usage-count');

    let userEmail = "";
    let lastGeneratedQuestions = null;
    let lastTimeLimit = null;
    let lastTopic = "";

    // 初始化：檢查登入狀態與權限
    async function init() {
        if (!puter.auth.isSignedIn()) {
            accessMsg.innerText = "請先登入 Google 帳號以驗證權限。";
            await puter.auth.signIn();
        }
        
        const user = await puter.auth.getUser();
        userEmail = user.username; // Puter.js 的 username 通常即為信箱
        checkPermission(userEmail);
    }

    async function checkPermission(email) {
        try {
            const resp = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "checkStatus", email: email })
            });
            const data = await resp.json();

            if (data.status === "approved") {
                document.getElementById('access-section').classList.add('hidden');
                mainContent.classList.remove('hidden');
                usageSpan.innerText = data.count || 0;
            } else if (data.status === "pending") {
                accessMsg.innerText = "您的申請正在審核中，請稍候。";
                applyBtn.classList.add('hidden');
            } else {
                accessMsg.innerText = "您尚未獲得使用授權。";
                applyBtn.classList.remove('hidden');
            }
        } catch (e) {
            statusDiv.innerText = "權限系統連線失敗。";
        }
    }

    // 申請權限
    applyBtn.onclick = async () => {
        applyBtn.disabled = true;
        accessMsg.innerText = "正在傳送申請給管理員...";
        await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "requestAccess", email: userEmail })
        });
        accessMsg.innerText = "申請已送出！管理員核可後即可使用。";
    };

    logoutBtn.onclick = async () => {
        puter.auth.signOut();
        window.location.reload();
    };

    reDownloadBtn.onclick = () => {
        if (lastGeneratedQuestions) downloadKahootExcel(lastGeneratedQuestions, lastTimeLimit, lastTopic);
    };

    generateBtn.onclick = async () => {
        const topic = document.getElementById('topic').value.trim();
        const hint = document.getElementById('hint').value.trim();
        const count = document.getElementById('count').value;
        const timeLimit = document.getElementById('timeLimit').value;

        if (!topic) return alert('請輸入主題！');

        generateBtn.disabled = true;
        reDownloadBtn.style.display = 'none';
        statusDiv.innerText = "AI 正在思考題目中，請稍候...";

        try {
            const prompt = `你是一位專業出題老師。出 ${count} 題關於「${topic}」的選擇題用於 Kahoot。${hint ? "\n要求：" + hint : ""}\n務必以 JSON 格式回傳，欄位：q, a1, a2, a3, a4, ans(1-4)。`;
            const response = await puter.ai.chat(prompt);
            let rawData = response.toString().replace(/```json/g, '').replace(/```/g, '').trim();
            const questions = JSON.parse(rawData);
            
            lastGeneratedQuestions = questions;
            lastTimeLimit = timeLimit;
            lastTopic = topic;

            // 記錄次數到 GAS
            const countResp = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "addCount", email: userEmail })
            });
            const countData = await countResp.json();
            usageSpan.innerText = countData.count;

            downloadKahootExcel(questions, timeLimit, topic);
            statusDiv.innerText = "Excel 已下載！";
            reDownloadBtn.style.display = 'block';
        } catch (error) {
            statusDiv.innerText = "發生錯誤：" + error.message;
        } finally {
            generateBtn.disabled = false;
        }
    };

    function downloadKahootExcel(questions, timeLimit, topicName) {
        const header = [
            ["Quiz template", "", "", "", "", "", ""],
            ["Add questions, at least two answer alternatives, time limit and choose correct answers (at least one). Have fun creating your awesome quiz!", "", "", "", "", "", ""],
            ["Remember: questions have a limit of 95 characters and answers can have 60 characters max.", "", "", "", "", "", ""],
            ["See an example question below (don't forget to overwrite this with your first question!)", "", "", "", "", "", ""],
            ["", "", "", "", "", "", ""],
            ["", "", "", "", "", "", ""],
            ["", "", "", "", "", "", ""],
            ["Question - max 95 characters", "Answer 1 - max 60 characters", "Answer 2 - max 60 characters", "Answer 3 - max 60 characters", "Answer 4 - max 60 characters", "Time limit (sec) – 5, 10, 20, 30, 60, 90, 120, or 240 secs", "Correct answer(s) - choose at least one"]
        ];
        const rows = questions.map(q => [q.q, q.a1, q.a2, q.a3, q.a4, parseInt(timeLimit), q.ans.toString()]);
        const fullData = header.concat(rows);
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(fullData);
        ws['!cols'] = [{ wch: 40 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 15 }, { wch: 15 }];
        XLSX.utils.book_append_sheet(wb, ws, "Questions");
        XLSX.writeFile(wb, `Kahoot_${topicName}.xlsx`);
    }

    init();
</script>
</body>
</html>
