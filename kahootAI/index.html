<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot 題目 AI 自動生成器</title>
    <!-- 引入外部函式庫 -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #46178f;
            --secondary-color: #250850;
            --success-color: #108548;
            --danger-color: #e21b3c;
            --warning-color: #f39c12;
        }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            position: relative;
        }
        .auth-box {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #userEmailDisplay {
            font-size: 0.7rem;
            color: #777;
        }
        .logout-btn {
            background-color: transparent;
            color: #666;
            border: 1px solid #ccc;
            padding: 5px 10px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
        }
        .logout-btn:hover {
            background-color: #f0f0f0;
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
            font-family: inherit;
        }
        .main-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .main-btn:hover {
            background-color: var(--secondary-color);
        }
        .download-again-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
            margin-top: 10px;
            display: none;
        }
        .main-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 1rem;
            text-align: center;
            color: #555;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 5px;
        }
        .pending-status { background-color: #fff3cd; color: #856404 !important; }
        .approved-status { background-color: #d4edda; color: #155724 !important; }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-box">
        <span id="userEmailDisplay">尚未登入</span>
        <button id="logoutBtn" class="logout-btn">登出</button>
    </div>

    <h1>Kahoot AI 生成器</h1>
    
    <div id="appContent" style="display: none;">
        <div class="form-group">
            <label for="topic">題目主題</label>
            <input type="text" id="topic" placeholder="例如：自然科學、數學、社會、英語..." />
        </div>

        <div class="form-group">
            <label for="hint">出題提示語 / 額外要求 (選填)</label>
            <textarea id="hint" rows="3" placeholder="例如：國小中年級、繁體中文、著重於歷史事件..."></textarea>
        </div>

        <div class="form-group">
            <label for="count">題數 (建議 1-20)</label>
            <input type="number" id="count" value="5" min="1" max="50" />
        </div>

        <div class="form-group">
            <label for="timeLimit">每題答題時間</label>
            <select id="timeLimit">
                <option value="5">5 秒</option>
                <option value="10">10 秒</option>
                <option value="15">15 秒</option>
                <option value="20" selected>20 秒</option>
                <option value="30">30 秒</option>
                <option value="45">45 秒</option>
                <option value="60">1 分鐘</option>
                <option value="90">1 分鐘 30 秒</option>
                <option value="120">2 分鐘</option>
            </select>
        </div>

        <button id="generateBtn" class="main-btn" disabled>檢查授權中...</button>
        <button id="reDownloadBtn" class="download-again-btn">再次下載最後產出的 Excel 檔</button>
    </div>

    <div id="loginPrompt" style="text-align: center; padding: 20px;">
        <p>請先登入 Google 帳號以驗證使用權限</p>
        <button id="loginBtn" class="main-btn">登入 Google 帳號</button>
    </div>
    
    <div id="status">準備就緒</div>

    <div class="footer">
        Powered by Google Gemini (via Puter.js) <br>
        管理員核准制 | 避免資源濫用 <br>
        © 2026 chienmu.tai 保留所有權利
    </div>
</div>

<script>
    // ⚠️ 請在此處貼入您的 Google Apps Script 部署網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyuyICDaUCDGPkgaZPcycqnxmOKZQnSVZIsY7yUzWNCquWf1ChOlIZqySXgWozAASoFmg/exec";

    const generateBtn = document.getElementById('generateBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginBtn = document.getElementById('loginBtn');
    const reDownloadBtn = document.getElementById('reDownloadBtn');
    const statusDiv = document.getElementById('status');
    const appContent = document.getElementById('appContent');
    const loginPrompt = document.getElementById('loginPrompt');
    const userEmailDisplay = document.getElementById('userEmailDisplay');

    let lastGeneratedQuestions = null;
    let lastTimeLimit = null;
    let lastTopic = "";

    // 初始化：檢查登入狀態
    async function init() {
        if (puter.auth.isSignedIn()) {
            const user = await puter.auth.getUser();
            userEmailDisplay.innerText = user.email;
            loginPrompt.style.display = 'none';
            appContent.style.display = 'block';
            checkAccess(user.email);
        } else {
            loginPrompt.style.display = 'block';
            appContent.style.display = 'none';
        }
    }

    // 檢查管理員許可
    async function checkAccess(email) {
        statusDiv.innerText = "正在驗證授權狀態...";
        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ email: email })
            });
            const result = await response.json();

            if (result.status === "approved") {
                statusDiv.innerText = "驗證成功！歡迎使用。";
                statusDiv.className = "approved-status";
                generateBtn.disabled = false;
                generateBtn.innerText = "開始 AI 生成題目";
            } else if (result.status === "pending" || result.status === "requested") {
                statusDiv.innerText = "您的存取申請已提交。請聯絡管理員開通權限。";
                statusDiv.className = "pending-status";
                generateBtn.disabled = true;
                generateBtn.innerText = "等待管理員許可中...";
            }
        } catch (e) {
            statusDiv.innerText = "連線授權伺服器失敗，請檢查網址或稍後再試。";
        }
    }

    loginBtn.onclick = async () => {
        await puter.auth.signIn();
        init();
    };

    logoutBtn.addEventListener('click', () => {
        puter.auth.signOut();
        location.reload();
    });

    reDownloadBtn.addEventListener('click', () => {
        if (lastGeneratedQuestions) {
            downloadKahootExcel(lastGeneratedQuestions, lastTimeLimit, lastTopic);
        }
    });

    generateBtn.addEventListener('click', async () => {
        const topic = document.getElementById('topic').value.trim();
        const hint = document.getElementById('hint').value.trim();
        const count = document.getElementById('count').value;
        const timeLimit = document.getElementById('timeLimit').value;

        if (!topic) {
            alert('請輸入主題！');
            return;
        }

        generateBtn.disabled = true;
        reDownloadBtn.style.display = 'none';
        statusDiv.innerText = "AI 正在思考題目中，請稍候...";
        statusDiv.className = "";

        try {
            let customRequirement = hint ? `\n額外的自訂要求如下：\n${hint}\n` : "";
            const prompt = `
                你是一位專業的出題老師。請幫我出 ${count} 題關於「${topic}」的選擇題，這要用於 Kahoot。
                ${customRequirement}
                請務必以 JSON 陣列格式回傳，不要有任何多餘的解釋文字。
                JSON 格式應為：
                [
                  {
                    "q": "題目內容(限制95字內)",
                    "a1": "選項1(限制60字內)",
                    "a2": "選項2(限制60字內)",
                    "a3": "選項3(限制60字內)",
                    "a4": "選項4(限制60字內)",
                    "ans": "正確答案編號(只能是1, 2, 3, 或 4)"
                  }
                ]
            `;

            const response = await puter.ai.chat(prompt);
            let rawData = response.toString();
            rawData = rawData.replace(/```json/g, '').replace(/```/g, '').trim();
            const questions = JSON.parse(rawData);
            
            lastGeneratedQuestions = questions;
            lastTimeLimit = timeLimit;
            lastTopic = topic;

            statusDiv.innerText = "題目生成成功！正在建立 Excel...";
            downloadKahootExcel(questions, timeLimit, topic);
            
            statusDiv.innerText = "Excel 已下載！";
            reDownloadBtn.style.display = 'block';
            
        } catch (error) {
            console.error(error);
            statusDiv.innerText = "發生錯誤：" + error.message;
        } finally {
            generateBtn.disabled = false;
        }
    });

    function downloadKahootExcel(questions, timeLimit, topicName) {
        const header = [
            ["Quiz template", "", "", "", "", "", ""],
            ["Add questions, at least two answer alternatives, time limit and choose correct answers (at least one). Have fun creating your awesome quiz!", "", "", "", "", "", ""],
            ["Remember: questions have a limit of 95 characters and answers can have 60 characters max.", "", "", "", "", "", ""],
            ["See an example question below (don't forget to overwrite this with your first question!)", "", "", "", "", "", ""],
            ["", "", "", "", "", "", ""],
            ["", "", "", "", "", "", ""],
            ["", "", "", "", "", "", ""],
            ["Question - max 95 characters", "Answer 1 - max 60 characters", "Answer 2 - max 60 characters", "Answer 3 - max 60 characters", "Answer 4 - max 60 characters", "Time limit (sec) – 5, 10, 20, 30, 60, 90, 120, or 240 secs", "Correct answer(s) - choose at least one"]
        ];

        const rows = questions.map(q => [
            q.q, q.a1, q.a2, q.a3, q.a4, parseInt(timeLimit), q.ans.toString()
        ]);

        const fullData = header.concat(rows);
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(fullData);
        ws['!cols'] = [{ wch: 40 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 15 }, { wch: 15 }];
        XLSX.utils.book_append_sheet(wb, ws, "Questions");
        XLSX.writeFile(wb, `Kahoot_${topicName || 'Quiz'}.xlsx`);
    }

    // 啟動程式
    init();
</script>

</body>
</html>
